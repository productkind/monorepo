script: |-
  Humans have been chasing intelligent machines for centuries, with varying degrees of honesty. In 1770, a Hungarian inventor toured Europe with the Mechanical Turk, a chess-playing cabinet that beat Napoleon and Benjamin Franklin. He forgot to mention the chess master folded inside, doing all the actual chess.

  Today's most common attempt looks very different. It's the Large Language Model.

  To understand LLMs, start with what a model is. A model is a mathematical mechanism that learns from data. Traditional software follows rules that a person wrote. A model is created differently. Making one involves showing it enormous piles of examples until it finds patterns in them. Once the model is finished, it uses those patterns to answer new questions.

  The process of teaching a model those patterns is called machine learning.

  If you would like to keep learning how AI works, calmly, follow along.
caption: |-
  For centuries, humans have been building things they hoped would think for them. In 1770 a Hungarian inventor toured Europe with the Mechanical Turk, a chess-playing cabinet that beat Napoleon and Benjamin Franklin. It later turned out there was a chess master smuggled into the box.

  Today's version is more honest. Nothing hidden inside. But the women in our Little Parrot community keep telling us the same thing: nobody has ever explained what a language model is. Only what to type into one.

  Here is the shape of it. A traditional program follows rules that a person wrote. A model is different. Making one involves showing it enormous piles of examples until it finds patterns in them. Only then, once the model is finished, can it use those patterns to answer new questions. That process of showing it examples is called machine learning.

  You do not need the maths to use AI well. But knowing that a model has two phases, one for finding patterns and one for using them, changes how the whole thing reads.
title: "What a language model actually is"
