script: |-
  Ask most people what AI is, and they picture a chat assistant like ChatGPT, Claude or Gemini. But that is a very recent association. The idea is far older than these tools.

  The first systems that we called AI go back to the 1950s. Back then, people tried all sorts of ways to build machines that seemed intelligent. Some programs reproduced patterns in text. Others followed strict sets of rules. Some even loosely copied how the human brain works.

  The AI inside today's chat assistants is called an LLM. Short for Large Language Model. It blends two of those older ideas: the brain-inspired one and the text-pattern one.

  More on understanding LLMs in the next video.
caption: |-
  People in our Little Parrot community keep telling us they feel late to AI. We know the feeling. It usually comes from thinking AI is much younger than it is.

  AI as a field is over seventy years old. The chat-assistant version, ChatGPT and Claude and Gemini, is about three. Long before Silicon Valley, engineers were building machines that reproduced patterns in text, followed logical rules, or loosely mimicked how a brain works.

  Today's chat assistants are the current chapter, not the whole field. LLMs, short for Large Language Models, blend two of those older ideas: the brain-inspired approach and the text-pattern approach.

  You are one chapter into a seventy-year-old story. So is everyone else.
title: "You are not late to AI"
