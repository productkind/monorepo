script: |-
  Chat assistants build their replies one token at a time.

  Once your message has been chopped into tokens, the model looks at everything so far and asks a single question: what token should come next?

  It ranks all the possible next tokens by probability, picks from the top few, and writes it. Then it looks at what it has just written, and asks the same question again. And again.

  By stringing these predictions together, one token at a time, it builds you a full reply.

  There is no bigger plan. The model does not decide the sentence before starting it, or the paragraph before starting it. It is guessing what should come next, then guessing again.

  The finished answer often looks planned. That is because the model was trained on planned writing.

  More in the next video on what else the model sees when it does this. Follow us, so you won't miss it.
caption: |-
  Chat assistants build their replies one token at a time.

  Once your message has been split into tokens, the model looks at everything so far and asks one question: what token should come next? It ranks the possible options by probability, picks from the top few, and writes one. Then it looks at what it has just written and asks the same question again. And again.

  String those predictions together and you get a full reply.

  There is no bigger plan behind it. The model does not decide the sentence before it starts, or the paragraph before it starts. It guesses the next token, then guesses again.

  The finished answer often looks carefully planned. That is because the model was trained on writing that was planned. It has picked up the shape of thought-through prose without doing the thinking first.

  This is the kind of thing we walk through with the women in our Little Parrot courses, because once you know a reply is built one guess at a time, it gets easier to see where AI is strong and where it needs a second pair of eyes.

  Follow along for more of these, and save this for the next time a chat assistant sounds more sure than it should.
title: "How AI writes a sentence"
