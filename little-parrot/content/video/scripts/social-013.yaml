script: |-
  Ever noticed how a chat assistant will apologise the second you correct it, and only then give you the right answer? The mechanism is simpler than it looks.

  A language model is essentially a glorified autocomplete. It predicts the next word based on what came before. When you type "you are wrong, the actual answer is..." the model looks at everything so far and asks: what would a human typically say next?

  The most likely continuation, based on the entire internet, is a polite apology followed by a corrected answer. So that is what you get.

  The model does not know it was wrong. It does not remember being wrong. It is just predicting what a helpful person would say after being corrected. And a helpful person usually starts with "You're right, I apologise..."

  Once you see this, chat assistants stop feeling like they are learning from you. They are just very good at predicting what humans say next.

  More like this coming up. Follow along.
caption: |-
  Have you noticed how a chat assistant will apologise the second you correct it, and only then give you the right answer? The women in our Little Parrot community ask us about this all the time. The reason is simpler than it looks.

  A language model is essentially a very capable autocomplete. It predicts the next word based on what came before. So when you type "you are wrong, the actual answer is...", the model looks at everything so far and asks what a human would typically say next.

  Based on the entire internet, the most likely continuation is a polite apology followed by a corrected answer. So that is what you get.

  The model does not know it was wrong. It does not remember being wrong. It is predicting what a helpful person would say after being corrected, and a helpful person usually opens with "You're right, I apologise".

  Once you see this, chat assistants stop feeling like they are learning from you in the moment. They are simply very good at predicting what people say next.

  Follow along for more on how AI really works, and save this for the next time a chat assistant says sorry.
title: "Why AI apologises the moment you correct it"
