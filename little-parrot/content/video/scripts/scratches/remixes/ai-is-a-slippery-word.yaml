script: |-
  "AI" is one of the most overloaded words in tech. Depending on who is saying it, it can mean any of at least five different things.

  An old rule-based expert system from the 1980s. A machine learning classifier that flags spam. A neural network that generates images. A large language model that chats with you. Or an AI agent that changes files in your project.

  These are all called AI. They work in wildly different ways. They have wildly different risks and benefits.

  When someone tells you "AI will replace X" or "AI cannot do Y", the first question is: which AI? Because a sentence about ChatGPT is different from a sentence about DALL-E, and a sentence about Claude Code is different from a sentence about Google Translate.

  The word does a lot of work. Sometimes that work is deliberate blurring, especially in the parts of the internet trying to sell you something.

  More like this coming up. Follow along.
