script: |-
  In 1950, a British mathematician named Alan Turing published a short paper with a big idea. He argued that instead of debating whether machines can think, we should check whether they can hold a conversation.

  If a machine could convince a human, in text chat, that it was also human, we should call it intelligent. That test became known as the Turing Test.

  For seventy years, it was the finish line. If a machine ever passed, we would have real AI.

  Modern chat assistants pass it constantly. Turing's test turned out to be easier than he expected. Language patterns are enough to fool people in short conversations, even without the machine understanding anything.

  So the finish line moved. Which is worth remembering next time a headline claims some new AI just "passed the Turing Test". Most models since 2020 have, in some sense. It says less than it used to.

  More like this coming up. Follow along.
