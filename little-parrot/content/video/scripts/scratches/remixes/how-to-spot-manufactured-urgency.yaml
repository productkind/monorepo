script: |-
  Not every AI post is trying to manipulate you, but a lot of them are. Once you know the shape, they get easier to spot.

  Manufactured urgency has a few tells.

  The timeline is unusually short. Real skill takes months.

  The transformation is disproportionate to the effort. Zero to expert in three days reads more like a story than data.

  There is usually a product being sold, sometimes obviously, sometimes further down the funnel.

  And the emotional register is "you are behind right now", rather than "here is what I learned".

  Once you clock these signals, most AI content starts to look like advertising in disguise. That does not mean it is worthless. It just means you should read it the same way you read an advert.

  More like this coming up. Follow along.
