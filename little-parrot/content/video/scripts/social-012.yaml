script: |-
  Language models borrow their basic idea from the brain. Emphasis on "basic".

  Your brain does its thinking with neurons. Each is a cell with a long tail that connects to others. It receives signals from the neurons before it, and it decides whether to fire a signal onwards.

  An artificial neuron in an LLM works in a similar way, only with maths instead of biology. It takes the numbers coming in. It multiplies each by its own weight. It adds them all up. If the total is bigger than a certain other number, called a bias, it sends a signal onwards. If not, it stays silent.

  That is one neuron. A language model has billions of them, stacked in layers, all passing signals along.

  The weights and biases are the model's parameters. They are what training adjusts. The more neurons you have, the more subtle the patterns the model can pick up.

  More like this coming up. Follow along.
caption: |-
  Language models borrow their basic idea from the brain. Emphasis on basic.

  Your brain does its thinking with neurons. Each one is a cell with a long tail that connects to others. It takes in signals from the neurons before it and decides whether to fire a signal onward.

  An artificial neuron in a language model works in a similar way, only with maths instead of biology. It takes the numbers coming in, multiplies each by its own weight, and adds them all up. If the total is bigger than a certain value, called a bias, it sends a signal onward. If not, it stays quiet.

  That is one neuron. A language model has billions of them, stacked in layers, all passing signals along.

  The weights and biases are the model's parameters, and they are what training adjusts. The more neurons a model has, the more subtle the patterns it can pick up.

  None of this asks you to do the maths yourself. But knowing the shape of a single neuron makes the phrase "billions of parameters" mean something real.

  It is the kind of thing we walk through with the women in our Little Parrot courses, no maths required.

  Follow along for more of these, no maths needed, and save this for the next time you hear a model described by its number of parameters.
title: "How an artificial neuron works"
