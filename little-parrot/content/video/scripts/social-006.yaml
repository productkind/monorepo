script: |-
  When you send a message to a chat assistant, it does not see your words the way you do. It sees tokens.

  A token is a small chunk of text. Sometimes it is a whole word. Sometimes it is a piece of one. Common words like "hello" are usually a single token. Longer or less common words like "hippopotamus" get split into two or three.

  Punctuation and spaces get their own tokens too.

  Why chop things up like this? Because the model works with numbers, not letters. Every possible token has its own number in the model's vocabulary. Splitting text into tokens is how it turns what you wrote into something it can do maths on.

  If you have ever seen chat assistants priced "per million tokens", this is what they mean. It is not the same as words. Roughly, a hundred tokens is about seventy-five words in English.

  More on how the model uses these tokens in the next video. Follow us, so you won't miss it.




  KL approved
caption: |-
  When you send a message to a chat assistant, it does not read your words the way you do. It reads tokens.

  A token is a small chunk of text. Sometimes it is a whole word, sometimes a piece of one. Common words like "hello" tend to be a single token. Longer or rarer words like "hippopotamus" get split into two or three. Punctuation and spaces get their own tokens too.

  Why chop text up like this? Because the model works with numbers, not letters. Every token has its own number in the model's vocabulary, and splitting your message into tokens is how it turns what you wrote into something it can do maths on.

  This is also what those "per million tokens" prices mean when you see chat assistants charged that way. Tokens are not the same as words. As a rough guide, a hundred tokens is about seventy-five words in English.

  Once you picture your message as tokens rather than sentences, a lot of how AI behaves starts to make more sense.
title: "What a token actually is"
