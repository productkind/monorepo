script: |-
  Training a language model needs data. A lot of data.

  The pile of text used to train a model is called a corpus. It can be almost anything written down: books, articles, websites, code, forum posts, Wikipedia, product reviews, film scripts. The more variety, the better the model gets at handling questions across different topics.

  Before any of it is fed to the model, the corpus has to be cleaned. Duplicates get removed. Low-quality text gets thrown out. Anything that would confuse or mislead the model gets pulled aside.

  Anthropic and OpenAI rarely gather all this data themselves. They buy most of it. A whole industry of data brokers hoovers up huge chunks of the internet, cleans it, packages it, and sells the finished corpus to whoever is training a model. One of the least visible, most consequential industries in AI.

  If you would like to learn more, follow along.
caption: |-
  Training a language model takes data. An enormous amount of it.

  The pile of text used to train a model is called a corpus, and it can be almost anything written down: books, articles, websites, code, forum posts, Wikipedia, product reviews, film scripts. The more variety in the pile, the better the model copes with questions across different topics.

  Before any of it reaches the model, the corpus has to be cleaned. Duplicates are removed. Low-quality text is thrown out. Anything that would confuse or mislead the model is pulled aside.

  Most people never hear the next part. Anthropic and OpenAI rarely gather all this data themselves. They buy most of it. A whole industry of data brokers hoovers up huge chunks of the internet, cleans it, packages it, and sells the finished corpus to whoever is training a model.

  It is one of the least visible and most consequential corners of the AI world, and almost nobody outside it knows the industry exists.

  We think the women in our Little Parrot courses deserve to know this part too, not just how to type a prompt.

  Follow along for more of the parts of AI nobody explains, and save this for the next time someone asks where AI gets its data.
title: "Where AI training data comes from"
