script: |-
  Inside every language model is a very large pile of numbers. GPT-4 has around a trillion of them.

  These numbers are called weights, or parameters. The model is essentially a giant calculator that runs your input through all of them and produces an output.

  The interesting bit is how someone convinced a trillion numbers to seem clever together. That process is called training.

  During training, the model is shown examples one by one. It uses its numbers to make a guess. That guess gets compared to the expected answer, and the numbers get nudged so the next guess lands closer to right.

  Repeat until it works.

  Eventually, the model starts to seem clever. Then training stops and the numbers freeze. From that day on, no matter how many times you correct it in the chat, the model will not remember. It does not learn anymore. It has left school and refuses to re-enrol.

  More on how this changes what you can expect from AI in the next video.
