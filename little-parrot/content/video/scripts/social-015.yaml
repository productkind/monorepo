script: |-
  Science-fiction AI does not talk like ChatGPT. HAL, Skynet, C-3PO, the ship's computer on the Enterprise. They are precise, literal, occasionally menacing. Never rambly.

  Today's chat assistants are the opposite. They will happily invent a fake court case, misremember a date, or apologise five times for something you did not ask about. Creative slop, essentially.

  The reason is that those sci-fi books were written in the sixties and seventies, when everyone assumed AI would be built by giving a machine an enormous set of rules to follow. Rule-based reasoning. Cold, careful, exact.

  That is not how it went. The AI that broke through was the pattern-matching kind. A model that has read most of the internet and is guessing what word should come next. Warm, verbose, and occasionally making things up.

  If your idea of AI still comes from those books, no wonder the real thing feels strange. It was built from a different assumption.

  More like this coming up. Follow along.
caption: |-
  Science-fiction AI does not talk like ChatGPT. HAL, Skynet, C-3PO, the ship's computer on the Enterprise. They are precise, literal, occasionally menacing. Never rambly.

  Today's chat assistants are the opposite. They will happily invent a fake court case, misremember a date, or apologise five times for something you never asked about.

  The reason sits in when those stories were written. The classic science fiction came from the sixties and seventies, when almost everyone assumed AI would be built by handing a machine an enormous set of rules to follow. Rule-based reasoning. Cold, careful, exact.

  That is not how it turned out. The AI that broke through was the pattern-matching kind: a model that has read most of the internet and is guessing which word should come next. Warm, wordy, and every so often making things up.

  So if your mental picture of AI still comes from those books and films, no wonder the real thing feels strange. It was built from a completely different idea of how a machine would think.

  We love starting here with the women in our Little Parrot courses, because it resets what you expect AI to be.

  Follow along for more on how AI really works, and save this for the next time the real thing feels stranger than the movies.
title: "Why real AI is nothing like the movies"
