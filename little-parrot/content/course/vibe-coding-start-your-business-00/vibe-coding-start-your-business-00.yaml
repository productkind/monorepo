    - title: Listen to Your First Users
      isFree: false
      skills:
        - User Feedback
        - Testimonial Collection
        - Product Improvement
      description: Turn early visitors into a conversation that improves your product and builds social proof.
      completionTime: '10:00'
      steps:
        - type: text
          title: Traffic is a conversation, not a number
          content:
            body: |-
              You have visitors. Your Posthog dashboard shows real sessions, real pageviews, and real events. Your wait list has email addresses from people you've never met.

              But numbers alone don't tell you **why**. Why did someone sign up? Why did someone leave after 30 seconds? Why did someone create an account but never come back?

              To answer the "why," you need to talk to your users. This challenge is about turning one-way traffic into a two-way conversation.
          subtitle: Numbers tell you what. People tell you why.
        - type: text
          title: Add a feedback feature
          content:
            body: |-
              The simplest way to start a conversation is to **make it easy for visitors to talk to you**. Add a small "Send feedback" or "Report a bug" button to your product.

              This doesn't need to be complex. A button that opens a simple form with one text field ("Tell us what you think" or "Something not working? Let us know") is enough.

              You can prompt your AI app builder to add this. Something like:

              *"Add a small 'Send feedback' button in the bottom-right corner. When clicked, it opens a simple form with a text area and a submit button. When submitted, send the feedback to [your email address]."*

              Every piece of feedback is a gift. Someone took time to tell you what's working or what's broken. That's more valuable than any analytics dashboard.
          subtitle: Make it easy for visitors to talk to you
        - type: text
          title: How to ask for feedback directly
          content:
            body: |-
              Don't wait for people to find the feedback button. Reach out directly to people who have used your product.

              A short email is enough:

              *"Hi [name], I saw you signed up for [product]. I'd love to hear how it went. Two quick questions: What did you use it for? What was confusing?"*

              **When to ask:** after someone has used your product at least once or twice. Not on their first visit. Give them time to form an opinion.

              **What to listen for:** patterns. If three people mention the same confusing step, that's a clear signal. If one person has a unique complaint, note it but don't rush to fix it.
          subtitle: Two questions that tell you everything
        - type: text
          title: Combine feedback with analytics
          content:
            body: |-
              Here's where your Posthog data from Challenge 4 becomes powerful.

              **Feedback tells you *why* something is confusing.** A user writes: "I couldn't figure out how to add a second book."

              **Analytics tells you *where* people get stuck.** Posthog shows that 80% of visitors create a book club but never add a second book suggestion.

              Together, they give you the full picture: you know **what's broken** (the "add a book" flow) and **why it's broken** (the interface is confusing). One prompt to your AI builder and it's fixed.

              Check your Posthog data and your feedback side by side. The overlaps are where you'll find the biggest improvements.
          subtitle: Feedback says why. Analytics says where.
        - type: text
          title: Collecting real testimonials
          content:
            body: |-
              When someone shares something positive in their feedback, ask if you can use it on your landing page.

              A simple follow-up: *"That's great to hear! Would you mind if I used your words on our website? I can use just your first name."*

              Most people say yes. One honest sentence from a real user is worth more than ten polished quotes you wrote yourself.

              **Do not generate fake testimonials with AI.** It's tempting, but it undermines trust the moment anyone suspects they're not real. And people can usually tell. Start with one real testimonial. It's enough.

              **When to ask:** after someone has expressed genuine satisfaction. Not after their first visit. Not in an automated email. After a real exchange where they've told you something positive.
          subtitle: One real sentence beats ten fake ones
        - type: text
          title: "Dalmie listens to her users"
          content:
            body: |-
              Dalmie added a small "Send feedback" button to the Book Club Organiser. She also emailed five book club organisers who signed up through her wait list.

              Three replied:
              - *"Love the idea but I couldn't figure out how to add a second book."*
              - *"The voting feature is great. Can you add deadlines?"*
              - *"We finally stopped arguing in the group chat about what to read next."*

              Her Posthog data confirmed the first complaint: most visitors created a book club but never added a second book suggestion. The "add a book" flow was confusing.

              She fixed it with one prompt to Lovable. Usage jumped the following week.

              The third reply? That became her first testimonial. She asked permission and added it to her landing page: *"We finally stopped arguing in the group chat about what to read next."*
          subtitle: Three emails, one fix, and a testimonial
        - type: quiz-question
          title: "Quiz: Collecting testimonials"
          content:
            question: When is the right time to ask a user for a testimonial?
            options:
              - Immediately after they sign up
              - After they've used your product and expressed genuine satisfaction
              - Before they've tried the product, to build anticipation
              - Never. You should write testimonials yourself based on what you think users would say.
            correctAnswer: 1
            explanation: Ask for a testimonial after a real exchange where the user has expressed genuine satisfaction. They need to have experienced your product before they can honestly recommend it.
        - type: quiz-question
          title: "Quiz: Feedback and analytics"
          content:
            question: How do user feedback and Posthog analytics complement each other?
            options:
              - They don't. You only need one or the other.
              - Feedback tells you where people get stuck, analytics tells you why
              - Feedback tells you why something is confusing, analytics tells you where people get stuck
              - Analytics replaces the need for user feedback entirely
            correctAnswer: 2
            explanation: Feedback gives you the "why" (users explain what confused them), while analytics gives you the "where" (data shows where people drop off). Together, they point you to the biggest improvements.
        - type: reflection
          title: Plan your feedback approach
          content:
            description: How will you collect feedback from your first users? Think about what feedback feature you'll add to your product, and draft the short email you'll send to your first sign-ups.
            placeholder: |-
              Feedback feature: I'll add...

              My feedback email draft:
              Hi [name], I saw you signed up for...
            subDescription: "You don't need many replies to find useful patterns. Even three responses can reveal what needs fixing."
        - type: challenge-end
          title: "You're learning from real users! \U0001F4AC"
          content:
            nextModule: "**Next challenge:** Now that you know what people value, it's time to figure out what they'd pay for."
            description: You know how to collect feedback, combine it with analytics, and earn real testimonials.
            subDescription: "Add a feedback feature to your product. Reach out to at least three people who have used it. Listen for patterns, not individual opinions. And if someone says something positive, ask to use it."

    - title: Decide What to Charge
      isFree: false
      skills:
        - Pricing Strategy
        - Pricing Psychology
        - Data-Informed Decisions
      description: Choose a pricing model informed by real usage data and user feedback.
      completionTime: '8:00'
      steps:
        - type: text
          title: You've earned this decision
          content:
            body: |-
              Pricing is the part where many first-time founders freeze. It feels like a huge, irreversible decision.

              But you're not guessing. You have **real data** from Posthog showing which features people use most. You have **real feedback** from users telling you what they value. This makes pricing much less scary, because you're basing it on evidence, not hope.

              The pricing model you choose now isn't permanent. You can change it later. What matters is picking something reasonable and moving forward.
          subtitle: You have the data. Now use it.
        - type: text
          title: "Three pricing models for a first product"
          content:
            body: |-
              **Free:** Everyone can use everything. You make money later (or not at all). Good for building an audience fast. Risky if you never find a way to charge.

              **Freemium:** A free version with limits, and a paid version with more. Good for products where the free version gives real value but power users want more. This is the most common model for early-stage products.

              **Paid only:** Everyone pays from day one. Good if your product saves people significant time or money. Harder to get initial adoption because there's no free way to try it.

              For most first products, **freemium** is the safest starting point. It lets people try before they buy, and the free tier acts as marketing.
          subtitle: Free, freemium, or paid
        - type: text
          title: Pricing psychology basics
          content:
            body: |-
              A few psychological principles that help you pick a price:

              **Anchoring:** People judge a price relative to the first number they see. If you show a $15/month plan next to a $5/month plan, the $5 feels like a bargain. If you only show the $5 plan, people have nothing to compare it to.

              **Decoy pricing:** Offer three tiers where the middle one is the best value. People tend to avoid the cheapest (feels too basic) and the most expensive (feels excessive) and pick the middle.

              **Round numbers feel like estimates. Specific numbers feel researched.** $5/month feels like you picked a round number. $4.99/month feels like you calculated it. Neither is wrong, but be intentional about which signal you're sending.

              **Start lower than you think.** You can always raise prices later. It's much harder to lower them. Your first users are taking a risk on an unproven product, so give them a price that feels easy to say yes to.
          subtitle: How people make decisions about money
        - type: text
          title: Let your data inform your pricing
          content:
            body: |-
              Look at your Posthog data and feedback together:

              - **Which features do people use most?** These are the features worth paying for. Put them in the paid tier.
              - **Where do people drop off?** If many people leave before reaching the valuable features, your free tier might need to include more so people experience the value.
              - **What did users say they wanted?** Requested features can become premium additions.

              The goal is to make the free version useful enough that people experience the value, and the paid version compelling enough that power users upgrade.
          subtitle: Which features are worth paying for?
        - type: text
          title: "Dalmie's pricing decision"
          content:
            body: |-
              Dalmie looked at her Posthog data and feedback. The voting feature and reading deadlines were what people used most. The "add book suggestions" feature was the entry point.

              She chose a **freemium model:**
              - **Free:** Book clubs with up to 3 members. Includes book suggestions and basic voting.
              - **$5/month:** Unlimited members, reading deadlines, reading stats, and priority support.

              Why $5? Her target users (casual book club organisers) aren't paying for expensive software. $5 feels easy to say yes to, and she can always increase it later when she has more features and more proof of value.

              She chose the $5 price point deliberately, not $4.99. Her audience values simplicity and honesty over corporate pricing tricks.
          subtitle: Free for small clubs, $5/month for everything
        - type: quiz-question
          title: "Quiz: Pricing models"
          content:
            question: Why is freemium often the best starting model for a first product?
            options:
              - Because free products always make more money in the long run
              - Because it lets people experience value before paying, and the free tier acts as marketing
              - Because investors prefer freemium businesses
              - Because it's easier to build than a paid product
            correctAnswer: 1
            explanation: Freemium lets people try your product risk-free. The free tier acts as marketing because happy free users tell others. And people who experience real value are more likely to upgrade.
        - type: quiz-question
          title: "Quiz: Anchoring"
          content:
            question: What is anchoring in pricing psychology?
            options:
              - Setting your price to match competitors
              - Making people judge a price relative to the first number they see
              - Offering a free trial before charging
              - Pricing your product based on how much it cost to build
            correctAnswer: 1
            explanation: Anchoring means people judge a price based on comparison. Showing a higher-priced plan alongside a lower-priced plan makes the lower one feel like a better deal.
        - type: free-text-exercise
          title: Write your pricing model
          content:
            description: |-
              Based on what you've learned from your analytics and user feedback, write down your pricing model:

              1. **Which model?** Free, freemium, or paid?
              2. **If freemium:** What's in the free tier? What's in the paid tier? What's the price?
              3. **Why this price?** Connect it to what you've learned about your users.
            placeholder: |-
              Pricing model:

              Free tier includes:

              Paid tier ($X/month) includes:

              Why this price:
            systemPrompt: 'You are a business mentor helping a learner choose a pricing model for their first product. They should explain their model, what is free vs paid, the price, and why they chose it. Provide friendly, concise feedback (max 5 bullet points) in British English. Check that the pricing connects to user data or feedback (not arbitrary). If the price seems too high for a first product, gently suggest starting lower. If the free tier gives away too much, flag it. End with encouragement.'
            checkerPrompt: 'Check if the user has described a pricing model, explained what is free vs paid, chosen a price, and connected it to what they know about their users. This is their pricing model:'
        - type: challenge-end
          title: "You've got a pricing model! \U0001F4B0"
          content:
            nextModule: "**Next challenge:** The final step. Let's set up the financial and legal basics so you can accept your first payment."
            description: You've chosen a pricing model based on real data, not guesswork.
            subDescription: "Your pricing isn't set in stone. Start with what feels right based on your data and feedback, then adjust as you learn more. The important thing is that you have a model and a number."

    - title: Get Ready to Accept Payment
      isFree: false
      skills:
        - Payment Setup
        - Legal Basics
        - Business Planning
      description: Set up the financial and legal basics so you can receive your first payment.
      completionTime: '10:00'
      steps:
        - type: text
          title: The final step
          content:
            body: |-
              You've come a long way. You have a tested pitch, a professional domain, an audience, analytics, real traffic, user feedback, testimonials, and a pricing model.

              This final challenge covers the practical steps to actually accept money: payment processing, banking, and the legal basics. None of this needs to be expensive or complicated at this stage.
          subtitle: From product to business
        - type: text
          title: What is Stripe?
          content:
            body: |-
              **Stripe** is a payment processing service. It handles the technical and financial complexity of accepting credit card payments online, so you don't have to.

              When a customer pays through Stripe, the money goes to your Stripe account. You then transfer it to your bank account. Stripe takes a small fee per transaction (typically around 2.9% + a fixed amount per transaction).

              To set up Stripe, you'll need:
              - An email address
              - Your personal details (name, address, date of birth)
              - A bank account to receive payouts
              - Depending on your location, a tax identification number

              Integrating Stripe into your product is a topic on its own. We'll cover that in a separate course. For now, the goal is to **create your Stripe account** so it's ready when you need it.
          subtitle: The tool that handles payments for you
        - type: text
          title: Simple banking solutions
          content:
            body: |-
              You need a bank account that can receive payments from Stripe. If you don't want to use your personal bank account (or if your bank charges high fees for international transactions), two free options work well:

              **Wise** (wise.com) — Great for receiving payments in multiple currencies with low fees. Especially useful if your customers are international.

              **Revolut** (revolut.com) — A free business account that's easy to set up. Good for keeping your business finances separate from your personal ones.

              Both are free to open. You don't need a registered company to use them (personal accounts work fine at this stage).

              Having a separate account for your product's income makes it much easier to track how your business is doing, and your accountant will thank you later.
          subtitle: Keep business money separate from personal money
        - type: text
          title: Legal basics (keep it simple)
          content:
            body: |-
              Here's what many first-time founders get wrong: they spend weeks researching company structures before they've earned their first pound.

              **The rule:** only register a company when you have solid revenue or a specific deal requires it. Setting up and operating a company costs money (registration fees, annual filings, accountant fees). Until you're earning enough to justify those costs, keep it simple.

              In most countries, you can operate as a **sole trader** (also called sole proprietor or self-employed) to start. This means you're personally responsible for the business, but there's minimal paperwork and cost.

              **What you should do now:**
              - Research the simplest legal framework for your location
              - Book a one-hour call with an accountant to understand your tax obligations
              - Keep records of your income and expenses from day one

              An accountant can tell you exactly what structure makes sense for your situation and location. A one-hour consultation is a small investment that can save you from expensive mistakes.
          subtitle: Don't register a company until you need one
        - type: text
          title: When to invest more (and when to keep your day job)
          content:
            body: |-
              A common question at this stage: **should I go all in?**

              Base this decision on traction, not hope:

              - **Keep it as a side project** if you have fewer than 50 active users and no paying customers. Dedicate a few hours a week and keep growing steadily.
              - **Consider investing more time** when you have paying customers and can see a path to covering your basic expenses. Maybe go part-time at your day job.
              - **Consider going full-time** when your product revenue can cover your living expenses for at least 6 months, or you have savings to bridge the gap.

              There's no rush. Many successful products started as side projects that grew slowly over months or years. Small, consistent effort each week can get you further than you expect.
          subtitle: Decisions based on traction, not hope
        - type: text
          title: "Dalmie's next steps"
          content:
            body: |-
              Dalmie signed up for Stripe and connected a Wise account to keep her business finances separate.

              She didn't register a company. Instead, she booked a one-hour call with an accountant to understand her tax obligations and registered as a sole trader.

              She keeps her day job and dedicates five hours a week to growing the Book Club Organiser. She knows that if she reaches 100 paying users at $5/month, that's $500/month in revenue, not enough to quit her job, but enough to justify investing more time and maybe some money into marketing.

              One step at a time.
          subtitle: Stripe, Wise, accountant, five hours a week
        - type: quiz-question
          title: "Quiz: When to register a company"
          content:
            question: When should you register a company for your product?
            options:
              - Before you start building the product
              - As soon as you have the idea
              - When you have solid revenue or a specific deal requires it
              - After your first visitor
            correctAnswer: 2
            explanation: Company registration costs money and creates ongoing obligations. Until you have revenue that justifies those costs, operating as a sole trader is simpler and cheaper.
        - type: quiz-question
          title: "Quiz: Going full-time"
          content:
            question: What's the best signal that it might be time to invest more time in your product?
            options:
              - You've had the idea for more than a year
              - You have paying customers and can see a path to covering basic expenses
              - Your friends think it's a great idea
              - You've listed it on five directories
            correctAnswer: 1
            explanation: Paying customers and a clear revenue path are concrete signals. Friends' enthusiasm and time spent thinking about the idea are not reliable indicators of business viability.
        - type: reflection
          title: Your business next steps
          content:
            description: |-
              What are the three most important next steps for your product right now? Think about what you've learned across all eight challenges: your pitch, your domain, your audience, your analytics, your traffic, your feedback, your pricing, and your payment setup.
