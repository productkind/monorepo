  challenges:
    - title: Find Your One-Line Pitch
      isFree: true
      skills:
        - Message Testing
        - Pitch Writing
        - Validation
      description: Discover the words that make people say "I need that" by testing your message on real people.
      completionTime: '10:00'
      steps:
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-00.png
            altText: |-
              Dalmie, a dalmatian dog wearing a red shirt, sits at a desk looking at the Book Club
              Organiser app on a laptop screen. A friend sits next to Dalmie and says, "This app is
              great! You should charge for it." Dalmie looks surprised and says, "Wait... could this
              actually become a business?"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-01.png
            altText: |-
              Dalmie stands overwhelmed in front of a whiteboard covered with sticky notes that read
              things like "domain?", "setting up a company??", "trademarking", "investors?", "payment?",
              "branding". Dalmie has exhausted eyes and says, "What is even necessary to turn this into a real business??"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-02.png
            altText: |-
              Little Parrot, the brightly coloured bird, appears next to Dalmie at the whiteboard.
              Little Parrot starts rearranging the sticky notes into a clear sequence and says,
              "One step at a time! First, let's find the right words to describe what you've built.
              Then we'll set up everything you need before your first visitor arrives."
        - type: text
          title: You already have something valuable
          content:
            body: |-
              You've built a digital product. It works. People around you have used it and found it helpful.

              Now you're wondering: could this become a real business?

              The answer starts with one question: **can you describe what you built in a way that makes someone who's never seen it say, "I need that"?**

              Most people struggle with this. They describe their product in terms of what it does ("it's a book club app") instead of what problem it solves. And that's the difference between a polite nod and someone asking for the link.

              In this challenge, you'll get a formula to find the right words, and a method to test which version works best.
          subtitle: From hobby project to business starts with the right words
        - type: text
          title: The pitch test formula
          content:
            body: |-
              Here's a simple formula for describing your product:

              **"I built [product] that helps [who] do [what] without [pain point]."**

              This formula works because it packs four things into one sentence:
              - **What it is** (so people can picture it)
              - **Who it's for** (so the right people recognise themselves)
              - **What it does** (so people understand the value)
              - **What pain it removes** (so people feel the relief)

              The trick is: you won't nail it on the first try. You need to test different versions and see which one makes people react.
          subtitle: Four elements in one sentence
        - type: text
          title: "Dalmie's three pitches"
          content:
            body: |-
              Dalmie tried three versions of her pitch for the Book Club Organiser:

              **Version 1:** "I built a book club app."
              *Reaction: polite nods. "Oh, cool." End of conversation.*

              **Version 2:** "I built a tool for book clubs to manage their reading lists."
              *Reaction: some interest. "What does it do exactly?"*

              **Version 3:** "I built an app that helps book clubs pick their next read without endless WhatsApp debates."
              *Reaction: eyes light up. "Oh, we need that! How does it work?"*

              Version 3 won because it named the specific pain point ("endless WhatsApp debates") that book club organisers instantly recognise. The first two were too vague to trigger that recognition.
          subtitle: Same product, different reactions
        - type: text
          title: How to run a pitch test
          content:
            body: |-
              Here's how to test your pitch:

              1. Write three versions of your pitch using the formula.
              2. Tell five people what your product does, one-on-one. Use a different version each time.
              3. After each conversation, write down their **exact reaction**. Did they ask a follow-up question? Did they change the subject? Did their eyes light up?
              4. The version that made someone ask "How does it work?" or "Can I try it?" is your winner.

              You don't need a focus group or a survey. Five casual conversations will tell you more than you expect.

              **What if none of them work?** That's useful information too. It might mean the problem you're solving isn't painful enough, or you haven't found the right audience yet.
          subtitle: Five conversations, three versions, one winner
        - type: text
          title: What you don't need (yet)
          content:
            body: |-
              Before we go further, let's clear something up. To start a business from your product, you **don't need:**

              - A registered company
              - Investors
              - A perfect product
              - A business plan
              - A logo designed by a professional

              What you **do need** is people getting value from what you built. That's it. Everything else comes later, when you have evidence it's working.

              If you want to go deeper on making sure your product solves a real problem, check out our [Build a Valuable Product](https://littleparrot.app) course.
          subtitle: Permission to start small
        - type: quiz-question
          title: "Quiz: What makes a pitch work?"
          content:
            question: Why did Dalmie's third pitch get the best reaction?
            options:
              - It was the shortest version
              - It named a specific pain point the audience recognised
              - It mentioned more features than the other versions
              - It used more professional language
            correctAnswer: 1
            explanation: The third pitch worked because it named a specific, relatable pain point ("endless WhatsApp debates") that book club organisers immediately recognised as their own struggle.
        - type: quiz-question
          title: "Quiz: Testing your pitch"
          content:
            question: What's the best sign that your pitch is working?
            options:
              - The person says "that sounds interesting"
              - The person nods politely
              - The person asks a follow-up question like "how does it work?"
              - The person says "good luck with that"
            correctAnswer: 2
            explanation: A follow-up question means the person is engaged and wants to know more. Polite nods and generic encouragement often mean the pitch didn't land.
        - type: free-text-exercise
          title: Write your three pitch versions
          content:
            description: |-
              Write three versions of your pitch using the formula:

              **"I built [product] that helps [who] do [what] without [pain point]."**

              Try different angles. Change who it's for, what it does, or what pain it removes. The goal is to find the version that sparks the most interest.
            placeholder: |-
              Version 1: I built...

              Version 2: I built...

              Version 3: I built...
            systemPrompt: 'You are a business mentor helping a learner refine their product pitch. They were given the formula "I built [product] that helps [who] do [what] without [pain point]" and asked to write three versions. Provide friendly, concise feedback (max 5 bullet points) in British English. Check if each version includes all four elements (what, who, value, pain point). If a version is too vague, suggest how to make it more specific. Highlight which version feels strongest and why. End with encouragement.'
            checkerPrompt: 'Check if the user has written three distinct versions of their pitch, and whether each version includes a product, a target audience, a value, and a pain point. This is what they wrote:'
        - type: challenge-end
          title: "You've found your words! \U0001F4AC"
          content:
            nextModule: "**Next challenge:** Now that you can describe your product, let's give it a proper home online."
            description: You now have a tested pitch that makes people lean in.
            subDescription: "This pitch will come back again and again throughout the course: in your directory listings, community posts, and landing page. Keep refining it as you learn more about your audience."

    - title: Choose Your Domain
      isFree: false
      skills:
        - Domain Selection
        - Professional Presence
        - Budget Management
      description: Pick the right name and set up a professional online presence without overspending.
      completionTime: '10:00'
      steps:
        - type: text
          title: Your product needs an address
          content:
            body: |-
              Before you start telling people about your product, you need a place to send them. Your domain is the address people will see in directories, community posts, and emails. It's one of the first things that signals whether your product is a hobby project or something to take seriously.

              Getting this right doesn't need to cost much. But getting it in place **before** you start driving traffic matters, because every link you share will carry this address.
          subtitle: Why this comes before anything else
        - type: text
          title: How to choose a good domain name
          content:
            body: |-
              A few rules of thumb:

              - **Keep it short and memorable.** If someone hears it once, can they type it from memory?
              - **Make it easy to spell.** Avoid words people commonly misspell.
              - **Avoid hyphens and numbers.** They're confusing when spoken aloud. "Is that a dash or...?"
              - **Match your product name if possible.** Consistency between your product name and domain builds trust.

              Don't overthink it. A good-enough domain that you own today is better than the perfect domain you spend weeks debating.
          subtitle: Short, memorable, easy to spell
        - type: text
          title: Top-level domain trade-offs
          content:
            body: |-
              The part after the dot matters more than you might think:

              - **.com** is the most recognised and trusted. People type it out of habit. But good .com names are often taken or expensive.
              - **.co** is a popular alternative. Cheaper than .com, feels modern. Some people might accidentally type .com instead.
              - **.app** signals that you've built software. Slightly more technical feel. Good for tech-savvy audiences.
              - **.io** is popular in the tech world but less familiar to non-technical audiences.

              Head to a domain registrar like GoDaddy and search for your product name. Compare what's available across different extensions and what fits your budget.

              For most first products aimed at a non-technical audience, **.com is the safest bet** if you can get one at a reasonable price.
          subtitle: ".com, .co, .app, .io: what's the difference?"
        - type: text
          title: Set up a professional email
          content:
            body: |-
              Once you have a domain, set up a professional email address. Sending emails from **hello@yourproduct.com** instead of **yourname123@gmail.com** makes a noticeable difference in how people perceive your product.

              **Google Workspace** lets you create email addresses on your own domain. It costs around $6-7/month, which is worth it when you start emailing customers, responding to feedback, or reaching out to communities.

              The technical setup (connecting your domain to Google Workspace, configuring email settings) can feel intimidating. We've included a **step-by-step setup guide in the toolkit** for this course that walks you through every click.
          subtitle: Trust starts in the inbox
        - type: text
          title: Register on Google Business Profile
          content:
            body: |-
              While you're setting things up, register your product on **Google Business Profile** (business.google.com). It's free and helps your product appear in Google search results.

              You don't need a physical office. Digital products can register with a service area. Fill in your product name, website, and a brief description (use your pitch from Challenge 1).

              This is a small step that takes five minutes but can improve your visibility in search over time.
          subtitle: A free way to improve your search visibility
        - type: text
          title: "Dalmie's domain decision"
          content:
            body: |-
              Dalmie searched for domains and found two options:

              - **bookclub.app** at $14/year
              - **bookcluborganiser.com** at $12/year

              She went with the **.com** because her audience (book club organisers) isn't particularly technical, and .com feels more familiar to them. She set up **hello@bookcluborganiser.com** through Google Workspace and registered her Google Business Profile.

              **Total cost: under $25.**

              She could have spent days agonising over the perfect name. Instead, she picked something clear and moved on. The domain can always be changed later if needed, but momentum can't.
          subtitle: Under $25 for a professional presence
        - type: quiz-question
          title: "Quiz: Choosing a domain"
          content:
            question: Which domain would be the best choice for a recipe-sharing app aimed at home cooks?
            options:
              - recipe-sharing-app-2024.io
              - recipeshare.com
              - rs.app
              - my-recipes.co.uk
            correctAnswer: 1
            explanation: It's short, memorable, easy to spell, has no hyphens or numbers, and uses .com which is the most recognised extension for a non-technical audience.
        - type: quiz-question
          title: "Quiz: Professional email"
          content:
            question: Why does sending emails from hello@yourproduct.com matter?
            options:
              - It's technically required for sending bulk emails
              - It makes your emails load faster
              - It signals professionalism and builds trust with customers
              - It prevents your emails from going to spam
            correctAnswer: 2
            explanation: A professional email on your own domain signals that your product is serious. It builds trust when you're reaching out to potential users, responding to feedback, or sending updates.
        - type: reflection
          title: Research your domain options
          content:
            description: Search for available domains for your product on a registrar like GoDaddy. Compare at least two top-level domain options (.com, .co, .app, etc.) on price and fit. Which one will you go with, and why?
            placeholder: "I searched for... The options I found were... I'm going with... because..."
            subDescription: "Remember: a good-enough domain you own today is better than the perfect one you debate for weeks."
        - type: challenge-end
          title: "Your product has a home! \U0001F3E0"
          content:
            nextModule: "**Next challenge:** Before you send anyone to your new domain, let's make sure you can capture every visitor."
            description: You've chosen a domain and set up a professional presence.
            subDescription: "Your domain, email, and Google Business Profile are the foundation of your online presence. With these in place, everything you share from now on looks professional. Check the toolkit for the technical setup guide if you haven't configured your email yet."

    - title: Build Your Audience Before You Launch
      isFree: false
      skills:
        - Email Capture
        - Lead Magnets
        - Audience Building
      description: Set up email capture and a lead magnet so you're ready to keep in touch with every visitor.
      completionTime: '10:00'
      steps:
        - type: text
          title: Set up the net before you fish
          content:
            body: |-
              You're about to start sending people to your product. But before you do, ask yourself: **if someone visits your site today and likes what they see, can they stay in touch with you?**

              If the answer is no, every visitor is a lost opportunity. They come, they look around, they leave, and you have no way to reach them again.

              This challenge is about setting up your email capture **before** you drive traffic, so that when visitors arrive, you're ready.
          subtitle: Why this comes before getting traffic
        - type: text
          title: Start with email capture
          content:
            body: |-
              The simplest version of email capture is a **wait list or sign-up form** on your landing page. It doesn't have to be fancy.

              You can start with a **Google Form** embedded on your site. You don't need a backend, a database, or an email marketing tool at the beginning. You need one thing: a way for someone to leave their email address.

              Add a clear call to action: "Join the wait list", "Get early access", or "Be the first to know when we launch." Keep it visible. Don't hide it at the bottom of the page.

              Don't wait until your product is "ready" to start collecting emails. The earlier you start, the more people you'll have to reach out to when you launch.
          subtitle: The foundation you need
        - type: text
          title: Add a lead magnet
          content:
            body: |-
              A **lead magnet** is something valuable you give away for free in exchange for someone's email address. It makes your email capture more compelling.

              Examples of lead magnets:
              - A PDF checklist or template
              - A short guide or how-to
              - A free tool or calculator
              - Early access to a feature

              The lead magnet should be **useful to your target audience** and related to the problem your product solves. It doesn't have to be long or polished. A one-page checklist that saves someone 30 minutes is more valuable than a 20-page ebook nobody reads.

              **Important:** the lead magnet only works if email capture is already in place. The visitor gets the lead magnet **in exchange for** their email address. Set up the form first, then add the lead magnet as the incentive.
          subtitle: Give people a reason to sign up
        - type: text
          title: "Dalmie's wait list and lead magnet"
          content:
            body: |-
              Dalmie added a wait list form to the Book Club Organiser's landing page. She embedded a simple Google Form with one field: email address.

              Then she created a **"Book Club Starter Kit"** PDF: a one-page document with discussion questions for popular books and a reading schedule template. Anyone who signs up gets the PDF sent to their email.

              The starter kit took her about an hour to make. It's directly useful to book club organisers (her target audience) and it gives them a taste of the kind of value the app provides.

              She's now ready to capture visitors. All she needs is to send some.
          subtitle: A simple form and a one-page PDF
        - type: quiz-question
          title: "Quiz: Email capture"
          content:
            question: Why should you set up email capture before driving traffic to your product?
            options:
              - Because search engines rank sites with forms higher
              - Because visitors who leave without giving their email are lost opportunities you can't reach again
              - Because email forms make your site look more professional
              - Because you need at least 100 emails before you can launch
            correctAnswer: 1
            explanation: Every visitor who leaves without a way to stay in touch is someone you can't reach again. Setting up capture before traffic means you don't lose your earliest and most valuable visitors.
        - type: quiz-question
          title: "Quiz: Lead magnets"
          content:
            question: What makes a good lead magnet?
            options:
              - It should be at least 20 pages long to feel valuable
              - It should be useful to your target audience and related to the problem your product solves
              - It should be about your product's features and pricing
              - It should require a paid subscription to access
            correctAnswer: 1
            explanation: A good lead magnet is useful and relevant. A one-page checklist that saves someone time is more valuable than a long ebook nobody reads. It should relate to the problem your product solves.
        - type: free-text-exercise
          title: Plan your email capture and lead magnet
          content:
            description: |-
              Plan what you'll set up:

              1. **Email capture:** Where on your landing page will you add a sign-up form? What will the call to action say?
              2. **Lead magnet:** What could you create that would be useful to your target audience? It doesn't have to be long. Think: what small thing would save them time or effort?
            placeholder: |-
              Email capture: I'll add a form that says...

              Lead magnet idea: I'll create a... because my target audience would find it useful for...
            systemPrompt: 'You are a business mentor helping a learner plan their email capture and lead magnet. They should describe where they will add a sign-up form, what the call to action will say, and what lead magnet they will create. Provide friendly, concise feedback (max 5 bullet points) in British English. Check that the lead magnet is relevant to their target audience and related to the problem their product solves. If the lead magnet is too ambitious, suggest simplifying it. End with encouragement.'
            checkerPrompt: 'Check if the user has planned both an email capture form (with a call to action) and a lead magnet (that is relevant to their target audience). This is their plan:'
        - type: challenge-end
          title: "Your net is ready! \U0001F3A3"
          content:
            nextModule: "**Next challenge:** One more thing to set up before the traffic arrives: analytics. You'll want to see what visitors do from the very first day."
            description: You have a plan to capture every visitor's email.
            subDescription: "Once your form is live and your lead magnet is ready, every visitor has a reason to stay in touch. You're building an audience before you've even officially launched."

    - title: Set Up Analytics Before Your First Visitors Arrive
      isFree: false
      skills:
        - Analytics
        - Posthog
        - Data-Informed Decisions
      description: Install Posthog so you can learn from every visitor from day one.
      completionTime: '12:00'
      steps:
        - type: text
          title: Don't fly blind
          content:
            body: |-
              You're almost ready to send people to your product. But before you do, there's one more thing to set up: **analytics**.

              Why now? Because if you set up analytics **after** you've already driven traffic, you've lost data from your first visitors. Those early visitors are the most valuable ones to learn from. They're the people who saw your pitch, clicked through, and tried your product for the first time.

              Set up tracking now, so that when traffic arrives, you see **everything**.
          subtitle: Why this comes before driving traffic
        - type: text
          title: What is Posthog?
          content:
            body: |-
              **Posthog** is a free analytics tool that shows you what visitors do inside your app. Unlike basic tools that only count page views, Posthog lets you see the full journey: which pages people visit, which buttons they click, where they get stuck, and where they leave.

              It's free for up to 1 million events per month, which is more than enough for a product that's just getting started.

              Think of it as a window into how real people experience your product. Instead of guessing what's working, you'll know.
          subtitle: Your window into user behaviour
        - type: text
          title: Key concepts
          content:
            body: |-
              Before you set up Posthog, here are three terms you'll see in the dashboard:

              **Sessions:** One visit to your app. A person opens your app, browses around, and leaves. That's one session. If they come back tomorrow, that's a new session.

              **Pageviews:** Each page someone opens within a session. If a visitor looks at your homepage, then your pricing page, that's two pageviews in one session.

              **Custom events:** Specific actions you choose to track, like clicking a "Sign up" button or submitting a form. These are the most useful because they tell you what people actually **do**, not where they browse.
          subtitle: Sessions, pageviews, and custom events
        - type: text
          title: How to add Posthog to your app
          content:
            body: |-
              You'll use your AI app builder to add Posthog. But this is one of those tasks where the AI often makes mistakes. Common problems:

              - The tracking code gets added but **doesn't actually fire** (nothing shows up in Posthog)
              - Events are **named inconsistently** (sometimes "signup_click", sometimes "SignupClick", sometimes "click_signup")
              - The code is placed in the wrong part of the app and **only tracks some pages**

              To avoid these issues, use a structured prompt. The next step has a template you can adapt.
          subtitle: Common mistakes to avoid
        - type: text
          title: Prompt template for adding Posthog
          content:
            body: |-
              Here's a prompt template you can adapt for your AI app builder:

              ---

              *Add Posthog analytics to my app. Here's what I need:*

              *1. Install the Posthog JavaScript library*
              *2. Initialise it on every page with my project API key: [YOUR_KEY]*
              *3. Track these custom events with these exact names:*
              *- "page_viewed" on every page load, including the page path*
              *- "signup_form_submitted" when someone submits the sign-up form*
              *- "feedback_button_clicked" when someone clicks the feedback button*
              *- [add your own events here]*
              *4. Verify it works: after setup, log one test event and confirm it appears in the Posthog dashboard*

              ---

              Replace the example events with the actions that matter most for your product. Be explicit about event names so they're consistent.
          subtitle: A structured prompt that avoids the common mistakes
        - type: text
          title: What to look at first
          content:
            body: |-
              Once Posthog is running and you have some visitors, you don't need to analyse everything. At this stage, you're answering **one question:**

              **"Are people using the thing I built, and which parts?"**

              Start with:
              - **Which pages get the most visits?** This tells you what attracts people.
              - **Where do people drop off?** This tells you where something is confusing or broken.
              - **Which custom events fire most?** This tells you which features people actually use.

              Don't get lost in dashboards. Check these three things once a week and use what you find to improve your product.
          subtitle: Three things to check each week
        - type: text
          title: Dalmie sets up Posthog
          content:
            body: |-
              Dalmie signed up for Posthog (free plan), got her API key, and used the prompt template to ask Lovable to add tracking to the Book Club Organiser.

              She tracked three custom events:
              - **"book_club_created"** when someone creates a new book club
              - **"book_suggestion_added"** when someone adds a book
              - **"vote_cast"** when someone votes on a book

              After setup, she visited her own app and checked the Posthog dashboard. Her session appeared, and all three events fired correctly when she tested them.

              She's now ready to see what real visitors do.
          subtitle: Three custom events, one test visit
        - type: quiz-question
          title: "Quiz: Why set up analytics now?"
          content:
            question: Why is it important to set up analytics before driving traffic?
            options:
              - Analytics tools take several weeks to start working
              - You need analytics data to create a Stripe account
              - Data from your first visitors is the most valuable and can't be recovered if you miss it
              - Search engines require analytics to index your site
            correctAnswer: 2
            explanation: Your first visitors are the most valuable to learn from. If you set up analytics after they've already visited, that data is gone. You can't go back and see what they did.
        - type: quiz-question
          title: "Quiz: Custom events"
          content:
            question: What's the difference between a pageview and a custom event?
            options:
              - Pageviews track clicks, custom events track pages
              - Pageviews are free, custom events cost money
              - Pageviews record which pages are opened, custom events record specific actions you choose to track
              - There is no difference, they mean the same thing
            correctAnswer: 2
            explanation: Pageviews automatically record each page someone opens. Custom events track specific actions you define, like clicking a button or submitting a form. Custom events are more useful because they tell you what people actually do.
        - type: reflection
          title: Plan your Posthog setup
          content:
            description: What are the three most important actions a visitor can take in your product? These will become your custom events. Think about the actions that tell you whether someone is getting value from your product.
            placeholder: |-
              The three most important actions in my product are:
              1.
              2.
              3.
            subDescription: "These events will tell you whether people are using the core of your product, or getting stuck before they reach it."
        - type: challenge-end
          title: "You're ready to see everything! \U0001F4CA"
          content:
            nextModule: "**Next challenge:** Everything is in place. A tested pitch, a professional domain, email capture, and analytics. Time to open the doors and let people in."
            description: You've set up analytics so every visitor teaches you something.
            subDescription: "You now have a tested pitch (Challenge 1), a professional domain (Challenge 2), email capture (Challenge 3), and analytics tracking (this challenge). Nothing will be wasted when traffic arrives."

    - title: Get Your First Visitors
      isFree: false
      skills:
        - Product Distribution
        - Community Marketing
        - Directory Submissions
      description: Drive real people to your product through directories and community posts.
      completionTime: '12:00'
      steps:
        - type: text
          title: Everything is in place
          content:
            body: |-
              This is the moment everything comes together.

              You have a **tested pitch** (Challenge 1) that makes people lean in. A **professional domain** (Challenge 2) that looks credible. **Email capture** (Challenge 3) ready to keep visitors in touch. And **analytics** (Challenge 4) tracking every action from day one.

              You're not sending people into a void. Every visitor who arrives will be captured, tracked, and learned from. Now it's time to send some.
          subtitle: Time to open the doors
        - type: text
          title: Where to list your product
          content:
            body: |-
              There are platforms where people actively look for new products to try. Here are three good starting points:

              **BetaList** (betalist.com) — a directory of early-stage startups and products looking for beta testers. Your audience here is people who enjoy trying new things and giving feedback. Good for getting early adopters.

              **Product Hunt** (producthunt.com) — a larger platform where new products are "launched" and voted on by the community. More competitive, but a well-timed launch can bring a significant spike of visitors. Save this for when you feel confident about your product.

              **Startup directories** — there are dozens of smaller directories that list new products. Search for "submit startup" or "startup directory list" and you'll find curated lists of places to submit.

              You don't need to be on all of them. Pick one or two that fit your product and your audience.
          subtitle: Directories where people discover new products
        - type: text
          title: What a good submission looks like
          content:
            body: |-
              Most directory listings ask for the same things. Here's how to make yours stand out:

              **A clear one-line description.** Use your pitch from Challenge 1. Not "A platform for book clubs" but "Helps book clubs pick their next read without endless WhatsApp debates."

              **A screenshot that shows the product in action.** Not a logo or a landing page. Show the product doing the thing it does. If your app has a voting feature, show a vote in progress.

              **A short "why this exists" paragraph.** Two to three sentences about the problem you noticed and why you built this. Keep it personal and specific.

              **A weak submission** looks like: "BookClubApp - A book club management platform. Features include: book lists, voting, member management, reading schedules, and more."

              **A strong submission** looks like: "Book Club Organiser - Helps book clubs pick their next read without the WhatsApp chaos. I built this because my own book club spent more time debating what to read than actually reading."

              Notice the difference? The strong version has personality, names a specific problem, and doesn't list features.
          subtitle: Pitch, screenshot, and why it exists
        - type: text
          title: Sharing in communities without being spammy
          content:
            body: |-
              Online communities (forums, Facebook groups, Reddit, Discord servers) can be a great source of early visitors. But nobody likes the person who joins a group and immediately drops a link.

              **The rule:** lead with the problem you solve, not with a link.

              Here's a template for a community post that feels helpful rather than promotional:

              *"We run a [relevant activity] and used to struggle with [specific problem]. I built a free tool to [what it does]. Would love feedback from others who [share this problem]."*

              Notice what's happening: you're sharing a relatable experience, offering something free, and asking for feedback. You're contributing to the community, not advertising.

              **Before posting:**
              - Spend a few days in the community first. Read, comment, be helpful.
              - Check the community rules about self-promotion.
              - Only post when it's genuinely relevant to a discussion or topic.
          subtitle: Lead with the problem, not the link
        - type: text
          title: One-on-one conversations still matter
          content:
            body: |-
              At this stage, talking to people individually is still your most powerful marketing tool. A personal message to someone who fits your target audience is more likely to lead to a sign-up than a directory listing that reaches hundreds.

              When you find someone who matches your target user (in a community, through friends, at an event), tell them your pitch and ask if they'd try it. A direct invitation feels personal and builds a stronger connection than a public post.

              Want to go deeper into publishing and growing your app? Check out our [Launch and Grow Your Lovable App](https://littleparrot.app) course.
          subtitle: Your best marketing channel right now
        - type: text
          title: "Dalmie's first visitors"
          content:
            body: |-
              Dalmie wrote a community post in a book lovers' forum:

              *"We run a monthly book club and used to lose track of suggestions in WhatsApp. I built a free tool to collect and vote on book picks. Would love feedback from other book club organisers."*

              She got 20 visitors in the first week. Her BetaList listing used her pitch from Challenge 1 and a screenshot of the voting feature.

              Her wait list captured **12 email addresses**, and Posthog showed her exactly which pages people visited and where they dropped off. Everything she set up in the previous challenges is now working together.
          subtitle: 20 visitors, 12 emails, and real data
        - type: quiz-question
          title: "Quiz: Directory submissions"
          content:
            question: Which of these is the strongest one-line description for a directory listing?
            options:
              - "MealPlan Pro - A comprehensive meal planning and grocery management platform with AI-powered recipe suggestions"
              - "MealPlan Pro - Helps busy parents plan a week of dinners in 5 minutes instead of 45"
              - "MealPlan Pro - The best meal planning app on the market"
              - "MealPlan Pro - Features include: meal plans, grocery lists, recipe search, nutrition tracking"
            correctAnswer: 1
            explanation: It names a specific audience (busy parents), a specific outcome (plan a week of dinners), and a specific improvement (5 minutes instead of 45). It's a pitch, not a feature list.
        - type: free-text-exercise
          title: Write your directory submission
          content:
            description: |-
              Write the three pieces of a strong directory submission for your product:

              1. **One-line description** (use your pitch from Challenge 1)
              2. **Screenshot description** (what will your screenshot show the product doing?)
              3. **"Why this exists" paragraph** (2-3 sentences: what problem did you notice, and why did you build this?)
            placeholder: |-
              One-line description:

              Screenshot will show:

              Why this exists:
            systemPrompt: 'You are a business mentor helping a learner write a directory submission. Check if they have a clear one-line description that names a specific problem, a screenshot idea that shows the product in action (not a logo or landing page), and a personal "why this exists" paragraph. Provide friendly, concise feedback (max 5 bullet points) in British English. If the one-line description is too generic or feature-listy, suggest how to make it more specific. End with encouragement.'
            checkerPrompt: 'Check if the user has written a one-line description, a screenshot description, and a "why this exists" paragraph. The one-line description should name a specific problem, not list features. This is what they wrote:'
