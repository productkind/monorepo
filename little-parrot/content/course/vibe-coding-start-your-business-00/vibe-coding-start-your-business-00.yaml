  challenges:
    - title: Craft Your Value Proposition
      isFree: true
      skills:
        - Value Proposition
        - Message Testing
        - Validation
      description: Describe the value your product delivers in one sentence, then test it on real people.
      completionTime: '10:00'
      steps:
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-00.png
            altText: |-
              Dalmie, a dalmatian dog wearing a red shirt, sits at a desk looking at the Book Club
              Organiser app on a laptop screen. A friend sits next to Dalmie and says, "This Book Club Organiser app is
              great, Dalmie! You should charge for it." Dalmie looks surprised and says, "Wait... could this
              actually become a business?"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-01.png
            altText: |-
              Dalmie stands overwhelmed in front of a whiteboard covered with sticky notes that read
              things like "domain?", "setting up a company??", "trademarking", "investors?", "payment?",
              "branding". Dalmie has exhausted eyes and says, "What is even necessary to turn this into a real business??"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-02.png
            altText: |-
              Little Parrot, the brightly coloured bird, appears next to Dalmie at the whiteboard.
              Little Parrot starts rearranging the sticky notes into a clear sequence and says,
              "One step at a time, Dalmie! First, let's find the right words to describe what you've built.
              Then we'll set up everything you need to get users."
        - type: text
          title: What you'll walk away with
          content:
            body: |-
              Turning a product into a business can feel overwhelming. There are so many things to figure out, and it's hard to know where to start.

              This course breaks it down into eight small challenges. By the end, you'll have:

              - A **clear value proposition** that makes people want to try your product
              - A **professional domain** and email that look credible
              - **Email capture** ready to build your audience from day one
              - **Analytics** showing you exactly how people use your product
              - **Real visitors** from directories and communities
              - **User feedback** and testimonials on your landing page
              - A **pricing model** based on real data
              - Your **break-even point** calculated, so you know exactly what it takes to be sustainable

              Each challenge builds on the one before it. You don't need to figure everything out at once. One step at a time.
          subtitle: Eight small challenges, one big transformation
        - type: text
          title: What you don't need (yet)
          content:
            body: |-
              You've built a digital product. It works. People around you have used it and found it helpful. Now you're wondering: **could this become a real business?**

              Here's where most people get stuck. They think they need to sort out a hundred things before they can start:

              - A registered company
              - Investors
              - A trademark
              - A business plan
              - A logo designed by a professional
              - Business cards

              **You don't need any of that right now.** Setting up a company costs money. Trademarking costs money. Business cards end up in a drawer. None of it matters if nobody's using your product.
          subtitle: The biggest mistake first-time founders make
        - type: text
          title: What you do need
          content:
            body: |-
              One thing: **people getting value from what you built.** That's the only proof that counts.

              Everything else comes later, once you have evidence that people want what you built. This course will walk you through how to get that evidence.

              But first, let's find out if you can describe your product in a way that makes someone who's never seen it say, "I need that." That starts with your **value proposition**: a clear description of the value your product delivers.

              If you want to go deeper on making sure your product solves a real problem, check out our [Build a Valuable Product: How to Break Down Your Idea for Vibe Coding](https://littleparrot.app/e16d932e-ac1f-4514-b5da-42629acf39ae/course-overview) course.
          subtitle: Just one thing
        - type: text
          title: The value proposition formula
          content:
            body: |-
              A **value proposition** is a clear description of the value your product delivers. Here's a simple formula:

              **"[Product] helps [who] to [achieve what] without [pain point]."**

              This formula works because it packs four things into one sentence:
              - **What it is** (so people can picture it)
              - **Who it's for** (so the right people recognise themselves)
              - **What it helps achieve** (so people understand the value)
              - **What pain it removes** (so people feel the relief)

              The trick is: you won't nail it on the first try. You need to test different versions and see which one makes people react.
          subtitle: Four elements in one sentence
        - type: text
          title: Where you'll use your value proposition
          content:
            body: |-
              This isn't an exercise for its own sake. Your value proposition will come back throughout this course and beyond:

              - **Your landing page** heading and subheading
              - **Your Google Business Profile** (Challenge 2) description
              - **Directory submissions** (Challenge 5) when you list your product on websites like BetaList or Product Hunt, where people go to discover new products
              - **Community posts** (Challenge 5) when you share your product in online groups
              - **Emails to early users** (Challenge 6) when you introduce yourself and ask for feedback
              - **Your social media bio** when you talk about what you're building

              Every time someone asks "What's your product about?", your value proposition is the answer. Getting it right now saves you from rewriting everything later.
          subtitle: This sentence will follow you everywhere
        - type: text
          title: "Dalmie's three versions"
          content:
            body: |-
              Dalmie tried three versions of her value proposition for the Book Club Organiser:

              **Version 1:** "I built a book club app."
              *Reaction: polite nods. "Oh, cool." End of conversation.*

              **Version 2:** "I built a tool for book clubs to manage their reading lists."
              *Reaction: some interest. "What does it do exactly?"*

              **Version 3:** "I built an app that helps book clubs pick their next read without endless WhatsApp debates."
              *Reaction: eyes light up. "Oh, we need that! How does it work?"*

              Version 3 won because it named the specific pain point ("endless WhatsApp debates") that book club organisers instantly recognise. The first two were too vague to trigger that recognition.
          subtitle: Same product, different reactions
        - type: quiz-question
          title: "Quiz: Evaluate a value proposition"
          content:
            question: "A friend built a habit-tracking app. She describes it as: \"HabitFlow is a productivity platform with gamification features, push notifications, social sharing, and AI-powered insights.\" What's the biggest problem with this value proposition?"
            options:
              - It's too short, and doesn't list enough features
              - It lists features instead of naming who it helps and what pain it removes
              - It doesn't mention the price and subscription model, so people don't know how to buy it
              - It uses too many technical terms, which might scare non-technical users away
            correctAnswer: 1
            explanation: "Features don't equal value. A list of features tells people what the product has, but not what they will be able to do as a result of using the product. A strong value proposition names who it's for and what pain it removes. \"HabitFlow helps busy professionals build daily habits without relying on willpower\" would be stronger because it answers the question people actually have: \"What can I achieve with it?\""
        - type: text
          title: How to test your value proposition
          content:
            body: |-
              Here's how to test your value proposition:

              1. Write **three versions** using the formula.
              2. Find five people **who match your target audience** and tell them what your product does, one-on-one. Use a different version each time.
              3. After each conversation, write down their **exact reaction**. Did they ask a follow-up question? Did they change the subject? Did their eyes light up?
              4. The version that made someone ask "How does it work?" or "Can I try it?" is your **winner**.

              **Why your target audience?** A polite nod from your mum doesn't tell you much. You need reactions from people who actually have the problem your product solves. If you built an app for book club organisers, test your value proposition on people who run book clubs, not on friends who've never been in one.

              You don't need a focus group or a survey. Five conversations with the right people will tell you more than you expect.

              **What if none of them work?** That's useful information too. It might mean the problem you're solving isn't painful enough, or you haven't found the right audience yet.
          subtitle: Five conversations, three versions, one winner
        - type: quiz-question
          title: "Quiz: Testing your value proposition"
          content:
            question: "You tested your value proposition on four people from your target audience. Person A said 'Cool idea!' Person B asked 'Can I try it?' Person C said 'Sounds interesting, good luck.' Person D asked 'How does it handle [specific situation]?' Which reactions suggest your value proposition is working?"
            options:
              - A and C, because they were positive and encouraging
              - B and D, because they engaged with specific follow-up questions
              - All four, because nobody said anything negative
              - Only B, because they're the only one ready to use it
            correctAnswer: 1
            explanation: "Follow-up questions are the signal. Person B wants to try it, Person D is already thinking about their own use case. Persons A and C were polite but didn't engage further. Positive words without curiosity usually mean the message didn't land deeply enough to spark action."
        - type: free-text-exercise
          title: Write three versions of your value proposition
          content:
            description: |-
              Write three versions of your value proposition using the formula:

              **"[Product] helps [who] to [achieve what] without [pain point]."**

              Try different angles. Change who it's for, what it does, or what pain it removes. The goal is to find the version that sparks the most interest.
            placeholder: |-
              Version 1:...

              Version 2:...

              Version 3:...
            systemPrompt: 'You are a business mentor helping a learner refine their value proposition. They were given the formula "[Product] helps [who] to [achieve what] without [pain point]" and asked to write three versions. Provide friendly, concise feedback (max 5 bullet points) in British English, avoid using em dashes. Check if each version includes all four elements (what, who, value, pain point). If a version is too vague, suggest how to make it more specific. Highlight which version feels strongest and why. End with encouragement.'
            checkerPrompt: 'Check if the user has written three distinct versions of their value proposition, and whether each version includes a product, a target audience, a value, and a pain point. This is what they wrote:'
        - type: challenge-end
          title: "You've found your words! \U0001F4AC"
          content:
            nextModule: "**Next challenge:** You have the words. Now let's build everything your product needs before its first visitor arrives: a professional domain, email capture, analytics, and your first real traffic. Seven more challenges, each one bringing you closer to your first paying user."
            description: You now have a clear value proposition that makes people lean in.
            subDescription: "Keep this sentence close. It will come in handy every time you explain what you do to someone new, whether at a dinner party, in a community, or in a casual conversation. You never know when the person you're talking to is your next user. You can find the [Value Proposition Formula](https://littleparrot.app/nest/toolkit/800d1e61-6372-41be-9892-f41b99be7acc) in the Toolkit."

    - title: Choose Your Domain
      isFree: false
      skills:
        - Domain Selection
        - Professional Presence
        - Budget Management
      description: Pick the right name and set up a professional online presence without overspending.
      completionTime: '10:00'
      steps:
        - type: text
          title: Your product needs an address
          content:
            body: |-
              Before you start telling people about your product, you need a place to send them. That place is your **domain**: the web address people type into their browser to find you. For example, **littleparrot.app** is our domain. It's what you see in the browser's address bar when you visit our site.

              Your domain is what people will see in directories, community posts, and emails. It's one of the first things that signals whether your product is a hobby project or something to take seriously.

              Getting this right doesn't need to cost much. But getting it in place **before** you start driving traffic matters, because every link you share will carry this address.
          subtitle: Why this comes before anything else
        - type: text
          title: How to choose a good domain name
          content:
            body: |-
              A few rules of thumb:

              - **Keep it short and memorable.** If someone hears it once, can they type it from memory?
              - **Make it easy to spell.** Avoid words people commonly misspell.
              - **Avoid hyphens and numbers.** They're confusing when spoken aloud. "Is that a dash or...?"
              - **Match your product name if possible.** Consistency between your product name and domain builds trust.

              Don't overthink it. A good-enough domain that you own today is better than the perfect domain you spend weeks debating.
          subtitle: Short, memorable, easy to spell
        - type: text
          title: Top-level domain trade-offs
          content:
            body: |-
              The part after the dot matters more than you might think:

              - **.com** is the most recognised and trusted. People type it out of habit. But good .com names are often taken or expensive.
              - **.co** is a popular alternative. Cheaper than .com, feels modern. Some people might accidentally type .com instead.
              - **.app** signals that you've built software. Slightly more technical feel. Good for tech-savvy audiences.
              - **.io** is popular in the tech world but less familiar to non-technical audiences.

              Head to a domain registrar like [GoDaddy](https://www.godaddy.com/) and search for your product name. Compare what's available across different extensions and what fits your budget.

              For most first products aimed at a non-technical audience, **.com is the safest bet** if you can get one at a reasonable price.
          subtitle: ".com, .co, .app, .io: what's the difference?"
        - type: quiz-question
          title: "Quiz: Choosing a domain"
          content:
            question: Which domain would be the best choice for a recipe-sharing app aimed at home cooks?
            options:
              - recipe-sharing-app-2024.io
              - rs.app
              - my-recipes.co.uk
              - recipeshare.com
            correctAnswer: 3
            explanation: It's short, memorable, easy to spell, has no hyphens or numbers, and uses .com which is the most recognised extension for a non-technical audience.
        - type: text
          title: Set up a professional email
          content:
            body: |-
              Once you have a domain, set up a professional email address. Sending emails from **hello@yourproduct.com** instead of **yourname12@gmail.com** makes a noticeable difference in how people perceive your product.

              **Google Workspace** lets you create email addresses on your own domain. It costs around $7/month, which is worth it when you start emailing customers, responding to feedback, or reaching out to communities.

              The technical setup (connecting your domain to Google Workspace, configuring email settings) can feel intimidating. We've included the [Domain and Email Setup Guide](https://littleparrot.app/nest/toolkit/1e786fc7-42d8-4713-a094-f0de2315e168) in the Toolkit that walks you through every click.
          subtitle: Trust starts in the inbox
        - type: quiz-question
          title: "Quiz: Choosing your email address"
          content:
            question: "You just bought the domain mealplanner.com for your meal planning product. Which email address would you set up for communicating with users?"
            options:
              - support@mealplanner.com
              - meal-planner-app@gmail.com
              - hello@mealplanner.com
              - info@mealplanner.com
            correctAnswer: [0, 2, 3]
            explanation: "Any email on your own domain works. hello@, support@, and info@ are all common and professional choices for different purposes. The Gmail address is the only one to avoid, because it signals that you haven't invested in your product's identity. As your business grows, you might use different addresses for different purposes: hello@ for general enquiries, support@ for help requests."
        - type: text
          title: Register on Google Business Profile
          content:
            body: |-
              While you're setting things up, register your product on [Google Business Profile](https://business.google.com/). It's free and helps your product appear in Google search results.

              You don't need a physical office. Digital products can register with a service area. Fill in your product name, website, and a brief description (use your value proposition from Challenge 1).

              This is a small step that takes five minutes but can improve your visibility in search over time.
          subtitle: A free way to improve your search visibility
        - type: text
          title: "Dalmie's domain decision"
          content:
            body: |-
              Dalmie searched for domains and found two options:

              - **bookclub.app** at $20/year
              - **bookcluborganiser.com** at $24/year

              She went with the **.com** because her audience (book club organisers) isn't particularly technical, and .com feels more familiar to them. She set up **hello@bookcluborganiser.com** through Google Workspace and registered her Google Business Profile.

              **Total cost: under $10/month**

              She could have spent days agonising over the perfect name. Instead, she picked something clear and moved on. The domain can always be changed later if needed, but momentum can't.
          subtitle: Under $10/month for a professional presence
        - type: reflection
          title: Brainstorm your domain name
          content:
            description: Write down three domain name ideas for your product. Keep them short, memorable, and easy to spell.
            placeholder: |-
              1.
              2.
              3.
            subDescription: "You can check if they're available on a registrar like GoDaddy. Don't overthink it. A good-enough domain you own today is better than the perfect one you debate for weeks."
        - type: challenge-end
          title: "Your product has a home! \U0001F3E0"
          content:
            nextModule: "**Next challenge:** Before you send anyone to your new domain, let's make sure you can capture every visitor."
            description: You've chosen a domain and set up a professional presence.
            subDescription: "Your domain, email, and Google Business Profile are the foundation of your online presence. With these in place, everything you share from now on looks professional. Use the [Domain and Email Setup Guide](https://littleparrot.app/nest/toolkit/1e786fc7-42d8-4713-a094-f0de2315e168) in the Toolkit if you haven't configured your email yet."

    - title: Build Your Audience Before You Launch
      isFree: false
      skills:
        - Email Capture
        - Lead Magnets
        - Audience Building
      description: Set up email capture and a lead magnet so you're ready to keep in touch with every visitor.
      completionTime: '10:00'
      steps:
        - type: text
          title: Set up the net before you fish
          content:
            body: |-
              You're about to start sending people to your product. But before you do, ask yourself: **if someone visits your site today and likes what they see, can they stay in touch with you?**

              If the answer is no, every visitor is a lost opportunity. They come, they look around, they leave, and you have no way to reach them again.

              This challenge is about setting up your email capture **before** you drive traffic, so that when visitors arrive, you're ready.
          subtitle: Why this comes before getting traffic
        - type: text
          title: Start with email capture
          content:
            body: |-
              The simplest version of email capture is a **wait list or sign-up form** on your landing page. It doesn't have to be fancy.

              You can start with a **Google Form** embedded on your site. You don't need a backend, a database, or an email marketing tool at the beginning. You need one thing: a way for someone to leave their email address.

              Add a clear **call to action:** "Join the wait list", "Get early access", or "Be the first to know when we launch." Keep it visible. Don't hide it at the bottom of the page.

              Don't wait until your product is "ready" to start collecting emails. The earlier you start, the more people you'll have to reach out to when you launch.
          subtitle: The foundation you need
        - type: quiz-question
          title: "Quiz: Email capture"
          content:
            question: "Your sign-up form says 'Subscribe to our newsletter.' You're getting very few sign-ups. What's most likely the problem?"
            options:
              - The form needs more fields so you learn about your visitors
              - The form should be hidden until the visitor has browsed for a while
              - You need to offer a discount to get people to sign up
              - The call to action is vague and doesn't give a reason to sign up
            correctAnswer: 3
            explanation: "People need a clear reason to give you their email. 'Subscribe to our newsletter' is vague and doesn't promise any value. A specific call to action like 'Get early access' or 'Join the wait list for [specific benefit]' tells people what they'll get in return. More fields, delays, or discounts won't fix an unclear reason to sign up."
        - type: text
          title: Give people a stronger reason to sign up
          content:
            body: |-
              A **lead magnet** is something valuable you give away for free in exchange for someone's email address. It makes your email capture more compelling. The principle is simple: **add value in public, sell in private.**

              Instead of asking people to sign up for "updates" (vague and uninspiring), you offer them something useful right now. They get immediate value, you get their email address.
          subtitle: What is a lead magnet?
        - type: text
          title: What makes a good lead magnet?
          content:
            body: |-
              A lead magnet needs to meet three criteria:

              **1. It solves a real problem.** It should address a specific challenge or question your target audience has. Not a vague topic, but something they're actively dealing with.

              **2. It offers unique value.** If someone could get the same information from a quick Google search or by asking ChatGPT, it's not compelling enough. Your lead magnet should contain something that comes from your own experience or expertise.

              **3. It's well executed.** It doesn't need to be long, but it needs to feel thoughtful. A clean one-page checklist beats a sloppy ten-page ebook.

              One more thing to keep in mind: **a lead magnet won't generate direct sales.** Its job is to start a relationship. You're building a list of people who trust you and are interested in what you're building. Sales come later.
          subtitle: Three criteria to get it right
        - type: quiz-question
          title: "Quiz: Evaluate a lead magnet"
          content:
            question: Which of these would make the strongest lead magnet for a fitness tracking app?
            options:
              - A 30-page ebook about the history of fitness tracking to establish authority
              - A list of ten fitness apps with links to their websites
              - A video explaining what the app does in detail, showing a demo of the features
              - A one-page "Weekly Workout Planner" template based on the creator's own routine
            correctAnswer: 3
            explanation: A one-page "Weekly Workout Planner" template is short, practical, immediately useful, and based on unique experience. The ebook is too long, the app list is generic information anyone could Google, and the video is a product demo that doesn't provide immediate value for the user.
        - type: text
          title: Formats that work
          content:
            body: |-
              The best-performing lead magnets tend to be **short, practical, and immediately useful.** PDF formats consistently outperform video-based lead magnets in conversion rates.

              Formats that work well:
              - **Templates** (fill-in-the-blank documents people can use right away)
              - **Checklists** (step-by-step lists for a specific task)
              - **Short guides** (one to three pages on a focused topic)
              - **Calculators or spreadsheets** (tools that help people make decisions)

              The easiest way to create one? **Repurpose knowledge you already have.** You built a product in this space, so you already know the domain. Turn what you know into a one-page template, a checklist, or a short guide.
          subtitle: Start with what you already know
        - type: text
          title: "Dalmie's lead magnet"
          content:
            body: |-
              Dalmie didn't start by asking "what PDF should I make?" She asked her friend Sarah, a book club organiser: **"What do you struggle with most when running your book club?"**

              Sarah said the hardest part was getting good conversations going. People would show up and not know what to say beyond "I liked it." So Dalmie created a short guide: **"How to Craft Open-Ended Questions for an Engaging Book Club Discussion."**

              That's the shortcut to a good lead magnet: ask your target audience what they struggle with, then package the answer.
          subtitle: Ask your target audience, then package the answer
        - type: quiz-question
          title: "Quiz: Realistic expectations"
          content:
            question: What should you NOT expect a lead magnet to do?
            options:
              - Generate direct sales or revenue
              - Build a list of interested people
              - Start a relationship with potential users
              - Give your target audience immediate value
            correctAnswer: 0
            explanation: "A lead magnet starts a relationship. It builds trust and interest. Direct sales come later, after people have experienced your product. Expecting a lead magnet to drive revenue sets you up for disappointment."
        - type: free-text-exercise
          title: Plan your lead magnet
          content:
            description: Who's your target audience and what do they struggle with? What could you create that would help them? Describe your lead magnet idea.
            placeholder: "My target audience struggles with... so I'll create a..."
            systemPrompt: 'You are a business mentor helping a learner plan a lead magnet for their product. They should describe what their target audience struggles with and what they will create to help. Provide friendly, concise feedback (max 4 bullet points) in British English, avoid using em dashes. Check against the three criteria: does it solve a real problem, offer unique value (not generic info you could Google), and is it realistic to create? If the lead magnet is too ambitious, suggest simplifying. End with encouragement.'
            checkerPrompt: 'Check if the user has described what their target audience struggles with and what lead magnet they will create. It should solve a real problem and not be generic. This is their plan:'
        - type: challenge-end
          title: "Your net is ready! \U0001F3A3"
          content:
            nextModule: "**Next challenge:** One more thing to set up before the traffic arrives: analytics. You'll want to see what visitors do from the very first day."
            description: You have a plan to capture every visitor's email and give them a reason to stay in touch.
            subDescription: "Remember: add value in public, sell in private. Your lead magnet starts a relationship. Once your form is live and your lead magnet is ready, every visitor has a reason to stay in touch. You're building an audience before you've even officially launched."

    - title: Set Up Analytics Before Your First Visitors Arrive
      isFree: false
      skills:
        - Analytics
        - PostHog
        - Data-Informed Decisions
      description: Install PostHog so you can learn from every visitor from day one.
      completionTime: '12:00'
      steps:
        - type: text
          title: Don't fly blind
          content:
            body: |-
              You're almost ready to send people to your product. But before you do, there's one more thing to set up: **analytics**.

              Why now? Because if you set up analytics **after** you've already driven traffic, you've lost data from your first visitors. Those early visitors are one of the most valuable ones to learn from. They're the people who saw your value proposition, clicked through, and tried your product for the first time.

              Set up tracking now, so that when traffic arrives, you see **everything that helps you make decisions**.
          subtitle: Why this comes before driving traffic
        - type: quiz-question
          title: "Quiz: Order of setup"
          content:
            question: "You're about to share your product in an online community for the first time. You have a domain and email capture ready, but you haven't set up analytics yet. What do you do?"
            options:
              - Post now and set up analytics later this week
              - Wait until you have at least 50 sign-ups before adding analytics
              - Set up analytics first, verify it works, then post
              - Analytics aren't important until you have paying users
            correctAnswer: 2
            explanation: "Once you post, visitors start arriving. If analytics isn't set up yet, you won't know which pages they visited, where they got stuck, or which features they tried. That data is gone forever. It takes less than an hour to set up, so it's worth doing before you send anyone to your product."
        - type: text
          title: What is PostHog?
          content:
            body: |-
              **[PostHog](https://posthog.com)** is an analytics tool that shows you what visitors do inside your app. It goes beyond counting page views: you can see which pages people visit, which buttons they click, where they get stuck, and where they leave.

              It's free for up to 1 million events per month, which is more than enough for a product that's getting started.

              PostHog also has a **session replay** feature that records how people navigate through your product. You can watch a real visitor's session like a video: see where they clicked, where they hesitated, and where they gave up. This is incredibly useful for spotting confusing parts of your product that you'd never notice yourself.
          subtitle: Your window into user behaviour
        - type: text
          title: What PostHog tracks automatically
          content:
            body: |-
              Here's good news: once PostHog is installed, it automatically tracks a lot of useful things without any extra setup. This is called **autocapture**.

              Out of the box, PostHog records:
              - **Pageviews:** which pages people open
              - **Page leaves:** when they leave a page
              - **Clicks:** which buttons and links they interact with
              - **Form submissions:** when they fill in and submit a form

              This means you get useful data from the moment your first visitor arrives, even before you set up any custom tracking.
          subtitle: You get a lot for free
        - type: text
          title: Custom events for what matters most
          content:
            body: |-
              Autocapture handles the basics, but for the actions that are the most important to your business, you'll want to set up **custom events**.

              A custom event is a specific action you choose to track by name. For example: "book-club-created", "vote-cast", or "user-signed-up".

              Why bother when autocapture already tracks clicks? Two reasons:

              1. **Clarity:** autocapture labels a button click as "clicked button with text Continue". A custom event called "book-club-created" tells you exactly what happened in your product.
              2. **Reliability:** if you change your design (rename a button, restructure a form), autocapture labels change too. Custom event names stay consistent.

              Name custom events in **kebab-case** (all lowercase, words separated by hyphens) using an **[object]-[verb]** format: "book-club-created", "book-suggestion-added", "vote-cast". This keeps your events readable and consistent as the list grows.
          subtitle: Name the actions that you want to see
        - type: quiz-question
          title: "Quiz: Autocapture vs custom events"
          content:
            question: "You check your PostHog dashboard and see 'clicked button with text Submit' happened 45 times last week. But your product has three different submit buttons (sign-up, feedback, and contact form). You can't tell which one was clicked. How do you prevent this problem going forward?"
            options:
              - Filter by page URL to separate the clicks
              - Rename all three buttons so each has unique text
              - Set up custom events with specific names for each action
              - Check the timestamps and match them with session replays
            correctAnswer: 2
            explanation: "Custom events solve this going forward. If you set up 'signup-form-submitted', 'feedback-submitted', and 'contact-form-submitted' as separate custom events, each action will be clearly labelled from now on. The past data is already recorded generically and can't be relabelled, which is why it's worth setting up custom events early."
        - type: text
          title: The prompt to add PostHog to your app
          content:
            body: |-
              You'll use your AI app builder to add PostHog. We've prepared two ready-to-use prompts in the Toolkit that you can copy and paste directly into your AI app builder.

              Before you use them, you'll need your **project token**. Sign up at [posthog.com](https://posthog.com/) (free), create a project, and you'll find your project token in the project settings. It starts with `phc_`.

              **Toolkit:** The [PostHog Analytics Setup Guide](https://littleparrot.app/nest/toolkit/db3ed06f-0594-41b3-8f9f-82051865627c) has the full prompts with placeholders to fill in, plus instructions for verifying it works.
          subtitle: Copy, adapt, and paste into your AI app builder
        - type: text
          title: How to verify it works
          content:
            body: |-
              After your AI app builder has added PostHog, you need to check that it's actually working. Here's how:

              1. Open your app in a browser
              2. Click around: visit a few pages, click some buttons, submit a form
              3. Go to your [PostHog dashboard](http://app.posthog.com/)
              4. Look for your events in the **Activity** menu

              **If nothing shows up**, the most common causes are:
              - The project token is wrong or missing
              - PostHog was only initialised on one page, not all of them
              - An ad blocker in your browser is blocking PostHog

              Try in an incognito/private browser window with ad blockers disabled.
          subtitle: Check the dashboard, not the code
        - type: text
          title: Session replay
          content:
            body: |-
              Once PostHog is running, open the **Session replay** menu. Here you can watch recordings of real visitor sessions.

              **You'll see exactly what your visitors saw:** which pages they opened, where they clicked, where they scrolled, where they paused, and where they left. It's like looking over someone's shoulder as they use your product.

              This is one of the most powerful tools for improving your product. You'll **spot things** that analytics numbers alone can't show:
              - A button that people hover over but never click (confusing label?)
              - A page where people scroll up and down repeatedly (looking for something they can't find?)
              - A form that people start filling in but abandon halfway (too long or unclear?)

              You don't need to watch every session. Start by watching a few each week, especially sessions where someone signed up or where someone left quickly. The patterns will stand out.
            imageUrl: /courses/vibe-coding-start-your-business-00/posthog-session-replay.png
          subtitle: Watch how real people use your product
        - type: quiz-question
          title: "Quiz: What would you do?"
          content:
            question: "Dalmie's analytics show that users create a book club but rarely add their first book suggestion. She's not sure why. What's the most useful next step?"
            options:
              - Watch session replays of users who created a club to see what they did next
              - Add a pop-up tutorial explaining how to add a book step by step
              - Send users an email reminding them to add a book
              - Simplify the 'add a book' screen by removing fields that might confuse users
            correctAnswer: 0
            explanation: "Before fixing anything, Dalmie needs to understand what's happening. Maybe users can't find the 'add a book' button. Maybe they start adding one but get confused by the form. Maybe they get distracted by something else on the page. Session replays show the actual behaviour, so she solves the real problem instead of guessing."
        - type: text
          title: What to look at each week
          content:
            body: |-
              Once PostHog is running and you have some visitors, you don't need to analyse everything. At this stage, you're answering **one question:**

              **"Are people using the thing I built, and which parts?"**

              Check these things once a week:
              - **Which pages get the most visits?** This tells you what attracts people.
              - **Where do people drop off?** This tells you where something is confusing or broken.
              - **Which custom events fire most?** This tells you which features people actually use.
              - **Watch 2-3 session replays.** Pick one from someone who signed up and one from someone who left quickly. What did they do differently?

              Don't get lost in dashboards. These four checks are enough for now.
          subtitle: Four things, once a week
        - type: reflection
          title: Plan your PostHog setup
          content:
            description: |-
              What are the three most important actions a visitor can take in your product? These will become your custom events. Use kebab-case naming (e.g., "book-club-created").

              Think about the actions that tell you whether someone is getting value from your product.
            placeholder: |-
              1. book-club-created
              2. book-suggestion-added
              3. vote-cast
            subDescription: "These events will tell you whether people are using the core of your product, or getting stuck before they reach it."
        - type: challenge-end
          title: "You're ready to see everything! \U0001F4CA"
          content:
            nextModule: "**Next challenge:** The preparation is done. Now it's time for the exciting part – getting real people to your product and watching what happens."
            description: You've set up analytics and session replay so every visitor teaches you something.
            subDescription: "You now have PostHog tracking every page visit, every click, and every custom event you defined. Session replay lets you watch exactly how people experience your product. Check your dashboard once a week and let the data guide your decisions."

    - title: Get Your First Visitors
      isFree: false
      skills:
        - Product Distribution
        - Community Marketing
        - Directory Submissions
      description: Drive real people to your product through directories and community posts.
      completionTime: '12:00'
      steps:
        - type: text
          title: Everything is in place
          content:
            body: |-
              This is the moment everything comes together.

              - You have a **clear value proposition** (Challenge 1) that makes people lean in. 
              - A **professional domain** (Challenge 2) that looks credible. 
              - **Email capture** (Challenge 3) ready to keep visitors in touch. 
              - And **analytics** (Challenge 4) tracking every action from day one.

              You're not sending people into a void. Every visitor who arrives will be captured, tracked, and learned from. Now it's time to get some traffic.
          subtitle: Time to open the doors
        - type: text
          title: Where to list your product
          content:
            body: |-
              There are platforms where people actively look for new products to try. Here are three good starting points:

              **[BetaList](https://betalist.com/)** – a directory of early-stage startups and products looking for beta testers. Your audience here is people who enjoy trying new things and giving feedback. Good for getting early adopters.

              **[Product Hunt](https://producthunt.com)** – a larger platform where new products are "launched" and voted on by the community. More competitive, but a well-timed launch can bring a significant spike of visitors. Save this for when you feel confident about your product.

              **Startup directories** – there are dozens of smaller directories that list new products. We've put together a [Startup Directory List](https://littleparrot.app/nest/toolkit/c2b8b87a-3815-4267-8cb4-227b05397fd6) in the Toolkit with links to directories you can submit to.

              You don't need to be on all of them. Pick a few that fit your product and your audience.
          subtitle: Directories where people discover new products
        - type: text
          title: What a good submission looks like
          content:
            body: |-
              Most directory listings ask for the same things. Here's how to make yours stand out:

              **A clear one-line description.** Use your value proposition from Challenge 1. Not "A platform for book clubs" but "Helps book clubs pick their next read without endless WhatsApp debates."

              **A screenshot that shows the product in action.** Not a logo or a landing page. Show the product doing the thing it does. If your app has a voting feature, show a vote in progress.

              **A short paragraph about the pain point or need it addresses.** Two to three sentences about what your users struggle with and how your product helps. Keep it personal and specific.
          subtitle: Value proposition, screenshot, and the pain point it solves
        - type: quiz-question
          title: "Quiz: Directory submissions"
          content:
            question: Which of these is the strongest one-line description for a directory listing?
            options:
              - "MealPlan Pro - Helps busy parents plan a week of dinners in 5 minutes instead of 45"
              - "MealPlan Pro - A comprehensive meal planning and grocery management platform with AI-powered recipe suggestions"
              - "MealPlan Pro - The best meal planning app on the market"
              - "MealPlan Pro - Features include: meal plans, grocery lists, recipe search, nutrition tracking"
            correctAnswer: 0
            explanation: It names a specific audience (busy parents), a specific outcome (plan a week of dinners), and a specific improvement (5 minutes instead of 45). It communicates value, not a feature list.
        - type: text
          title: Sharing in communities without being spammy
          content:
            body: |-
              Online communities (forums, Facebook groups, Reddit, Discord servers, Slack communities) can be a great source of early visitors. But nobody likes the person who joins a group and immediately drops a link.

              **The approach:** be helpful first, and be transparent about what you've built. Don't hide that it's a product. People respect honesty. What they don't respect is someone who only shows up to promote.

              **Before you ever post about your product:**
              - Spend a few days in the community first. Read, comment, answer questions, be helpful.
              - Build a presence so people recognise your name before they see your product.
              - Check the community rules about self-promotion.

              **When you do share your product**, lead with the problem it solves and be upfront:

              *"I noticed a lot of people here struggle with [specific problem]. I built a product that helps with this: [one sentence about what it does]. It has a free tier / free trial if you want to try it. Happy to answer any questions."*

              **Notice what's happening:** you're naming a real problem the community cares about, being transparent that it's your product, and not pushing anyone. You're inviting, not advertising.
          subtitle: Lead with the problem, not the link
        - type: text
          title: One-on-one conversations still matter
          content:
            body: |-
              At this stage, talking to people individually is still your most powerful marketing tool. A personal message to someone who fits your target audience is **more likely to lead to a sign-up** than a directory listing that reaches hundreds.

              When you find someone who matches your target user (in a community, through friends, at an event), describe the value and ask if they'd try it. A direct invitation feels personal and builds a stronger connection than a public post.
          subtitle: Your best marketing channel right now
        - type: text
          title: "Dalmie's directory submission"
          content:
            body: |-
              Here's what Dalmie wrote for her BetaList listing:

              - **One-line description:** "Book Club Organiser helps people who run small book clubs with friends pick their next read in minutes instead of endless group chat debates."
              - **Screenshot:** The voting screen showing three book suggestions with vote counts.
              - **Pain point:** "Small book clubs that coordinate through WhatsApp waste time every month. Suggestions get buried, half the group misses the vote, and the organiser ends up deciding alone. Book Club Organiser gives every member a voice and picks the next book in one click."

              Notice how each piece works: the one-line description names a **specific audience** (people who run small book clubs with friends, not large community book clubs), a **specific outcome** (pick their next read in minutes), and a **specific improvement** (instead of endless group chat debates). The pain point paragraph goes deeper into what that specific audience struggles with.
          subtitle: A real example before you write yours
        - type: free-text-exercise
          title: Write your community post
          content:
            description: Think of one online community where your target audience spends time. Write a short post that introduces your product in a helpful, transparent way. Remember to lead with the problem you're solving.
            placeholder: "I noticed a lot of people here struggle with [specific problem]. I built a product that helps with this: [one sentence about what it does]. It has a free tier / free trial if you want to try it. Happy to answer any questions."
            systemPrompt: 'You are a business mentor helping a learner write a community post about their product. It should lead with a problem the community cares about, be transparent that it is their product, and invite people to try it without being pushy. If it reads like an ad or hides the commercial intent, flag it. If it does not name a specific problem, suggest how to add one. Provide friendly, concise feedback (max 4 bullet points) in British English, avoid using em dashes. End with encouragement.'
            checkerPrompt: 'Check if this community post leads with a problem (not a product link), is transparent about it being the learner''s product, and invites without being pushy. This is what they wrote:'
        - type: challenge-end
          title: "Your first visitors are on their way! \U0001F680"
          content:
            nextModule: "**Next challenge:** Now that people are using your product, it's time to listen to what they have to say and build social proof."
            description: You know where to list your product, how to write a strong submission, and how to show up in communities without being spammy.
            subDescription: "You've practised the hardest part: talking about your product honestly and helpfully. Use the [Startup Directory List](https://littleparrot.app/nest/toolkit/c2b8b87a-3815-4267-8cb4-227b05397fd6) in the Toolkit to find directories that fit your product, and post in one community this week."

    - title: Listen to Your First Users
      isFree: false
      skills:
        - User Feedback
        - Testimonial Collection
        - Product Improvement
      description: Turn early visitors into a conversation that improves your product and builds social proof.
      completionTime: '10:00'
      steps:
        - type: text
          title: Traffic is a conversation, not a number
          content:
            body: |-
              You have visitors. Your PostHog dashboard shows real sessions, real pageviews, and real events. Your wait list has email addresses from people you've never met.

              But numbers alone don't tell you **why**. Why did someone sign up? Why did someone leave after 30 seconds? Why did someone create an account but never come back?

              To answer the "why," you need to talk to your users. This challenge is about turning one-way traffic into a two-way conversation.
          subtitle: Numbers tell you what. People tell you why.
        - type: text
          title: Add a feedback feature
          content:
            body: |-
              The simplest way to start a conversation is to **make it easy for visitors to talk to you**. Add a small "Send feedback" or "Report a bug" button to your product.

              This doesn't need to be complex. A button that opens a simple form with one text field ("Tell us what you think" or "Something not working? Let us know") is enough.

              You can prompt your AI app builder to add this:

              ```
              Add a small "Send feedback" button in the bottom-right corner of the /book-suggestions page. When clicked, it opens a simple form with a text area with the placeholder text "Tell us what you think" and a submit button. When submitted, save the feedback to the database.
              ```

              **Note:** Replace `/book-suggestions` with the page in your product where you want the feedback button to appear.

              Every piece of feedback is a gift. Someone took time to tell you what's working or what's broken.

              Want to learn how to view the feedback saved in your database? Our [Basics of Software for Vibe Coding](https://littleparrot.app/4794366d-b807-4804-8fd5-64c3a5a03472/course-overview) course covers databases and how to work with your data.
          subtitle: Make it easy for visitors to talk to you
        - type: text
          title: How to ask for feedback directly
          content:
            body: |-
              Don't wait for people to find the feedback button. Reach out directly to people who have used your product.

              A short email is enough:

              ```
              Hi [name], 
              
              I'm [your name], the creator of [product]. I saw you signed up recently and I'd love to hear how it went. Two quick questions:

              1. What were you hoping [product] would help you achieve?
              2. What was confusing or unclear?

              I really appreciate any feedback you have.
              Thank you,
              [Your name]
              ```

              **When to ask:** after someone has used your product at least once or twice. Not on their first visit. Give them time to form an opinion.

              **What to listen for:** patterns. If three people mention the same confusing step, that's a clear signal. If one person has a unique complaint, note it but don't rush to fix it.
          subtitle: Two questions that tell you everything
        - type: quiz-question
          title: "Quiz: Using feedback to improve"
          content:
            question: "You email three users who signed up last week. Two of them reply: 'I created an account but couldn't figure out what to do next.' You look at your PostHog data that shows 70% of new users leave within 30 seconds of signing up. What are the two best next steps?"
            options:
              - Add a feedback form to your product so future users can share what's confusing
              - Send more traffic to the sign-up page to get more data
              - Redesign the entire onboarding flow based on what you know so far
              - Reply to the two users and ask what they were hoping to do
            correctAnswer: [0, 3]
            explanation: "These two users just told you something valuable. Reply to them and dig deeper: what were they hoping to do? You can ask them for a short call to understand more. And adding a feedback form means you'll hear from future users without having to email each one. Sending more traffic won't help if new users get stuck. Redesigning everything before understanding the problem risks fixing the wrong thing."
        - type: text
          title: Collecting real testimonials
          content:
            body: |-
              When someone shares something positive in their feedback, ask if you can use it on your landing page.

              A simple follow-up: 

              ```
              That's great to hear! We're building out a testimonials section on our website and would love to feature what you wrote. I can use just your first name, if you prefer.
              ```

              Most people say yes. **Do not generate fake testimonials with AI.** It's tempting, but it undermines trust the moment anyone suspects they're not real. And people can usually tell. Start with one real testimonial, then grow from there.
          subtitle: One real sentence beats ten fake ones
        - type: reflection
          title: Where would you place your feedback form?
          content:
            description: Think about your product's user flow. At which point would it be most useful to ask your users for feedback? Why that moment?
            placeholder: "I'd place the feedback form at... because at that point the user has..."
            subDescription: "Think about what you're most uncertain about in your product. That's where feedback will be the most valuable."
        - type: challenge-end
          title: "You're learning from real users! \U0001F4AC"
          content:
            nextModule: "**Next challenge:** You've heard what your users value. But how much would they pay for it? And how do you pick a number that feels right? Let's find out."
            description: You know how to collect feedback, combine it with analytics, and earn real testimonials.
            subDescription: "Add a feedback feature to your product. Reach out to at least three people who have used it. Listen for patterns, not individual opinions. And if someone says something positive, ask to use it."

    - title: Decide What to Charge
      isFree: false
      skills:
        - Pricing Strategy
        - Pricing Psychology
        - Data-Informed Decisions
      description: Choose a pricing model informed by real usage data and user feedback.
      completionTime: '8:00'
      steps:
        - type: text
          title: You've earned this decision
          content:
            body: |-
              Pricing is the part where many first-time founders freeze. It feels like a huge, irreversible decision.

              But pricing is just like everything else in product development: **you experiment with it.** You pick a starting point, see how people respond, and adjust. Your first price is a hypothesis, not a commitment. You'll change it as you learn more about your users and what they're willing to pay.

              The good news? You're not guessing from scratch. From your early test users, you have **real data** from PostHog showing which features they use most, and **real feedback** telling you what they value. That's more than most people have when they set their first price.
          subtitle: You have the data. Now use it.
        - type: text
          title: "How will you charge?"
          content:
            body: |-
              **Subscription** (monthly or yearly recurring payment). Users pay for continued access. This gives you predictable, recurring revenue, but you need to keep delivering value so people don't cancel. Best for products people use regularly.

              **One-time payment.** Users pay once and get access forever. Simpler for the user, and appeals to people who dislike ongoing commitments. But you don't get recurring revenue, so you need a steady stream of new customers. Best for tools people use occasionally or for a specific purpose.
          subtitle: "First decision: Subscription or one-time payment"
        - type: text
          title: "How will people try before they pay?"
          content:
            body: |-
              **Free trial**\
              Full product for a limited time. Then they pay or lose access.\
              ✅ Surfaces serious buyers quickly\
              ⚠️ People who aren't ready to pay yet disappear\
              *Example: Adobe offers a 7-day free trial for its apps.*

              **Free tier (freemium)**\
              Free version with limits, forever. Upgrade whenever.\
              ✅ Attracts a large user base\
              ⚠️ Low conversion rates, many non-paying users to support\
              *Example: Canva offers a generous free version, with paid plans for premium features.*

              **Reverse trial**\
              Full product for a limited time. Then they drop to a free tier.\
              ✅ Users experience the full product and stick around even if they don't convert\
              ⚠️ More complex to set up than a simple trial\
              *Example: Dropbox lets new users try the full Pro version before dropping them to a free plan.*

              **No free option**\
              Everyone pays from the start.\
              ✅ Every user is a paying user\
              ⚠️ Harder to get initial adoption. Rare for early-stage products

              Many bootstrapped founders have moved away from permanent free tiers toward trials or reverse trials, because they convert better and are easier to sustain.
          subtitle: "Second decision: How you let people experience your product before paying"
        - type: quiz-question
          title: "Quiz: How to charge"
          content:
            question: "You built a tool that helps freelancers track their invoices. They use it every week to log new invoices and check which clients have paid. Subscription or one-time payment?"
            options:
              - Subscription, because users get ongoing value from regular use
              - One-time payment, because freelancers prefer paying once
              - Either would work equally well
              - Neither, it should be free
            correctAnswer: 0
            explanation: "A subscription makes sense when your product has ongoing costs to maintain (servers, data storage, domain) and users get value from it repeatedly. A one-time payment fits better when there are minimal ongoing costs on your side and the user gets what they need in one go, like a website template or an ebook. The key question is: does your product cost you money to run every month? If yes, a subscription helps cover those ongoing costs."
        - type: text
          title: "Choose your price point"
          content:
            body: |-
              **A common mistake:** pricing too low because it feels safer. But consider the maths how many paying users you need to reach $1,000/month:

              - At $5/month, you need 200
              - At $25/month, you need 40
              - At $50/month, you need 20

              Lower prices aren't always easier to sell.
          subtitle: "Third decision: How much you charge"
        - type: text
          title: "Picking your starting price"
          content:
            body: |-
              **1. What do competitors charge?** Search for products that solve a similar problem and see their pricing. This tells you what your audience is used to paying. You don't need to match it, but you should know the range.

              **2. What value does your product deliver?** Price based on the value your users get, not on what it cost you to build. If your product saves someone 5 hours a week, that's worth more than $5/month.

              **3. What did your test users tell you?** Look at your user feedback. Which features do people value most? That's what they'd pay for.

              Start with 2-3 tiers to keep things simple. More tiers create more confusion. And remember: your first price is a hypothesis. You'll adjust it as you learn.
          subtitle: "Three things to look at"
        - type: text
          title: Pricing psychology basics
          content:
            body: |-
              A few **psychological principles** that help you design your pricing page:

              **Anchoring:** A higher-priced option makes a lower-priced option feel more reasonable by comparison. If you show a $15/month Pro plan next to a $9/month Starter plan, the $9 feels like a sensible entry point. If you only show the $9 plan on its own, people have nothing to compare it to and might still hesitate.

              **Decoy pricing:** Add an option you don't expect anyone to buy, because its job is to make another option look better. For example: Basic at $9, Premium at $14 (with fewer features than Pro), and Pro at $15. Nobody picks Premium, but next to it, Pro looks like an obvious deal for just $1 more. The decoy shifts what people are willing to pay by changing what they compare against.
          subtitle: How people make decisions about money
        - type: text
          title: More pricing psychology
          content:
            body: |-
              One more principle that's especially powerful for digital products:

              **Endowment effect:** People value something more once they feel it's theirs. This happens even when the ownership is temporary or just perceived.

              For digital products, you can use this in three ways:

              **Free trials.** Once someone has used your product for a week, it feels like *theirs*. Their data is in it, their settings are configured, their workflow depends on it. Asking them to give that up is much harder than asking them to pay.

              **Customisation.** Let users personalise their experience early: choose a theme, set up their profile, name their workspace. The more they make it their own, the harder it is to walk away.

              **Bundling.** Show your paid plan as a package they already have, not features they're missing. "Your plan includes: unlimited projects, priority support, and advanced analytics" feels like something they'd lose, rather than something they need to buy.
          subtitle: The endowment effect
        - type: quiz-question
          title: "Quiz: Pricing psychology in practice"
          content:
            question: "Most of your trial users sign up, poke around for a few minutes, and never come back. Very few convert to paid. Which changes would most likely improve conversions?"
            options:
              - Add a third pricing tier as a decoy to make the main plan look better
              - Shorten the trial so users engage more intensely in less time
              - Guide new users to personalise their setup and import their data
              - Lower the price so it feels less risky
            correctAnswer: [1, 2]
            explanation: "The core problem is that users never develop a sense of ownership. Both correct options address this. Shortening the trial creates urgency that pushes users to engage sooner rather than putting it off. Guiding them to personalise and import their data creates investment, so walking away feels like a loss. A decoy helps with pricing page decisions, but it won't fix users who never engage. Lowering the price doesn't help if people aren't using the product."
        - type: text
          title: Let your data inform your pricing
          content:
            body: |-
              Look at your PostHog data and feedback together:

              - **Which features do people use most?** These are the features worth paying for. If you're using a *freemium model*, these belong in the paid tier. If you're using a *trial model*, these are what make people want to stay.
              - **Where do people drop off?** This tells you where people aren't finding enough value. Think about what you can do to help them get to the valuable parts of your product sooner.
              - **What did users say they wanted?** Requested features can become premium additions or reasons to upgrade. But *dig deeper:* understand the underlying need behind a feature request rather than building exactly what someone asked for. A user asking for "email notifications" might really need "a way to not forget about their book club meeting." The need might have a simpler solution.

              **The goal** is to give people enough value that they understand what your product can do for them, and make the paid experience compelling enough that they want more.
          subtitle: Which features are worth paying for?
        - type: text
          title: "How Dalmie thought through her pricing"
          content:
            body: |-
              Here's how Dalmie worked through the two decisions:

              **How to charge?** Subscription. Book clubs use the app every month to pick their next read, so there's ongoing value.

              **How to let people try?** Reverse trial. She wants new users to experience the full voting feature and reading deadlines before deciding. After 14 days, they drop to a free tier with basic features.

              **How much?** She asked Sarah what similar tools cost. Most were free or very cheap. She looked at her PostHog data: the voting feature and reading deadlines were what people valued most. She set her paid plan at **$5/month**, because her audience (casual book club organisers) won't pay much for a tool like this. She picked $5 deliberately, not $4.99. Her audience values simplicity and honesty over corporate pricing tricks. She can always increase it later as she adds more features.

              Notice that she didn't guess. She used her data, talked to her target user, and checked what competitors charge. That's the process you can follow too.
          subtitle: The thinking process you can follow
        - type: reflection
          title: How are you thinking about pricing now?
          content:
            description: What's your current thinking about how you'd price your product?
            placeholder: "I'm thinking about..."
            subDescription: "Pricing is an experiment. Whatever you're thinking now is a good starting point, not a final answer."
        - type: challenge-end
          title: "You've got a pricing model! \U0001F4B0"
          content:
            nextModule: "**Next challenge:** You have a pricing model. But how many paying users do you actually need to cover your costs? The answer might surprise you. Let's find out."
            description: You can choose between subscription and one-time payment, pick the right trial model for your product, and use psychology to design a pricing page that converts.
            subDescription: "You've learned anchoring, decoy pricing, annual discounts, social proof, and loss aversion. These techniques work whether you're charging $5 or $50. The [Pricing Psychology Cheat Sheet](https://littleparrot.app/nest/toolkit/bedc9e49-e338-4537-a856-b18a2a888a6d) has all five techniques with examples and a pricing page checklist."

    - title: Build a Sustainable Business
      isFree: false
      skills:
        - Financial Health
        - Break-Even Analysis
        - Business Sustainability
      description: Know your numbers, set up payments, and build a business that lasts.
      completionTime: '12:00'
      steps:
        - type: text
          title: Sustainable over fast
          content:
            body: |-
              There's a narrative in the startup world that says you need to grow fast or die. Raise money, hire a team, scale at all costs.

              That's not the only way. And for most people building a product from a side project, it's not the right way.

              You're building a **bootstrapped business**: a product that earns its own money, without investors, without debt, and without the pressure to grow at someone else's pace. The goal is **profitability**, not headcount. **Freedom**, not funding rounds.

              Most small digital products reach profitability (covering their costs) within the first year. But profitability and liveable income are different things. Covering $20/month in hosting costs is profitable. Replacing a salary takes longer. Be patient with yourself, and focus on steady growth rather than overnight success.

              This challenge is about knowing your numbers and setting up the basics so your business can sustain itself.
          subtitle: You're not building the next unicorn. You're building something that lasts.
        - type: text
          title: Know your break-even point
          content:
            body: |-
              The most important number for your business right now is your **break-even point**: the minimum you need to earn each month to cover your costs.

              The formula is straightforward:

              **Break-even point = Fixed costs / (Price per user - Variable cost per user)**

              **Fixed costs** are what you pay every month regardless of how many users you have: your domain, Google Workspace, any tools you subscribe to. These stay the same whether you have 1 user or 1,000.

              **Variable costs** are what increases with each paying user: Stripe's transaction fee is the main one at this stage.

              **Price per user** is what you charge per month.

              Your break-even point tells you: **how many paying users do I need each month to stop losing money?** Everything above that number is profit.

              The [Break-Even and Cashflow Tracker](https://littleparrot.app/nest/toolkit/764681e3-3475-41e6-99a4-47fff726ba1e) in the Toolkit includes a Google Sheet with two tabs: one to calculate your break-even point, and one to track your monthly cashflow.
          subtitle: The one number that tells you if your business is viable
        - type: text
          title: "Dalmie's break-even calculation"
          content:
            body: |-
              Dalmie's *monthly fixed costs*:
              - Domain: $2/month ($24/year)
              - Google Workspace: $7/month
              - AI app builder with hosting: $25/month
              - **Total fixed costs: $34/month**

              Her price: **$5/month** per paying book club.

              Her *variable cost per user*: Stripe takes about 2.9% + $0.30 per transaction. On a $5 payment, that's roughly **$0.45 per user per month**.

              **Break-even = $34 / ($5.00 - $0.45) = $34 / $4.55 ≈ 8 paying users**

              Dalmie needs **8 paying book clubs** to cover her costs. Everything after that is profit.

              Eight users means she's no longer paying out of pocket to run her product. It's not a salary yet, but it's the first milestone. Everything after eight is profit she can reinvest or save.
          subtitle: Eight paying users to start making money
        - type: quiz-question
          title: "Quiz: Break-even point"
          content:
            question: "You calculated that you need 12 paying users to break even, but after three months you only have 5. What's the most useful next step?"
            options:
              - Shut down the product since it's clearly not working
              - Lower your price to attract more sign-ups faster
              - Add more features so the product is worth the price
              - Talk to your paying users and check your data to understand what's working
            correctAnswer: 3
            explanation: "Being below break-even after three months is normal, not a reason to panic or make drastic changes. Your existing users and your data are your best guides. Talk to the people who are paying and find out what made them convert. That insight is more valuable than guessing at a lower price or more features."
        - type: text
          title: Metrics that matter vs metrics that feel good
          content:
            body: |-
              When you start getting data, it's tempting to focus on numbers that feel good: page views, sign-ups, social media followers. These numbers aren't useless, but **they only matter if you know how they connect to revenue.**

              *For example, total sign-ups are an important top-of-funnel metric. They're the pool you convert paying users from. But if you celebrate 500 sign-ups without knowing how many converted to paying users, the number is misleading.*

              **The question to ask about any metric: what happens next?**
              - Sign-ups → how many become active users? → how many convert to paying?
              - Page views → how many sign up? → how many stay?
              - Social media followers → how many visit your product? → how many convert?

              **If you can't trace a metric to revenue, it's not helping you make decisions.**
          subtitle: "The question to ask: what happens next?"
        - type: text
          title: Metrics to check regularly
          content:
            body: |-
              **Paying users:** how many people are actually paying you?

              **Conversion rate:** what percentage of sign-ups become paying users?

              **Churn:** how many paying users cancel each month? If you're losing users as fast as you're gaining them, growth is an illusion.

              **Break-even gap:** are you above or below your break-even point?

              You don't need a dashboard with dozens of charts. These four numbers tell you whether your business is healthy.
          subtitle: Four numbers that tell you the truth
        - type: text
          title: How do you know if your numbers are good?
          content:
            body: |-
              Knowing your conversion rates is useful, but only if you have something to compare them to. A 2% visitor-to-signup rate might be great in one industry and poor in another.

              **How to find benchmarks for your product:**

              1. **Search for your industry and business model.** If you're building software people pay to access online, that's called **SaaS** (Software as a Service). Try searches like *"SaaS free trial conversion rate benchmarks"* or *"landing page conversion rate for [your type of product]."* Look for recent data from sources like industry reports or founder communities.
              2. **Compare with similar products, not averages.** A global average across all industries won't help you. Look for benchmarks from products similar to yours in size, audience, and pricing.
              3. **Track your own trend over time.** Even without external benchmarks, your own numbers from month to month tell you if things are improving or getting worse. That trend is more useful than a snapshot.

              Don't spend hours researching benchmarks. A quick search gives you a rough sense of where you stand, and your own trend over time tells you the rest.
          subtitle: Benchmarks help you read your own numbers
        - type: quiz-question
          title: "Quiz: Reading your funnel"
          content:
            question: "In the last three months, 3,000 unique visitors came to your site, 154 signed up, and 3 became paying users. You looked up benchmarks and found that a typical visitor-to-signup rate is 8-12% and a typical signup-to-paid rate is 1-3%. Your signup-to-paid rate looks healthy, but your visitor-to-signup rate is low. What are the two most likely reasons for the low signup rate?"
            options:
              - The price is too high for most visitors
              - Most visitors aren't your target audience
              - The landing page doesn't make the value clear
              - You need more features before people will pay
            correctAnswer: [1, 2]
            explanation: "The signup-to-paid rate (3 out of 154 = 1.9%) is within the 1-3% benchmark. People who try your product do convert at a normal rate. But the visitor-to-signup rate (154 out of 3,000 = 5.1%) is below the 8-12% benchmark. Too many visitors leave without signing up. Two likely causes: your landing page doesn't communicate the value clearly, or you're getting traffic from communities where your target audience isn't present. Revisit your value proposition and where you're sharing your product."
        - type: text
          title: Keep your money separate from day one
          content:
            body: |-
              As a sole trader, you're not legally required to have a business bank account. You can use your personal account. But **opening a separate account for your product's money is one of the simplest things you can do** to make your life easier.

              Why it's worth it:
              - **Simpler bookkeeping.** Every transaction in the account is business-related. No scrolling through personal purchases to find what's deductible.
              - **Easier tax preparation.** Your accountant (or you) can see all income and expenses in one place. Fewer mistakes, less stress at tax time.
              - **Clearer picture of your business.** You can see at a glance how much your product is earning and spending each month.

              Good options for sole traders include [**Wise**](https://wise.com/invite/irhc/kingam35) and [**Revolut**](https://revolut.com/referral/?referral-code=kingaga4i&geo-redirect), both of which let you open an account without a registered company. Check which one fits your situation better.

              Cash flow problems are one of the main reasons small businesses fail. Keeping your business money separate means you always know where you stand.
          subtitle: A separate account changes how you see your business
        - type: text
          title: Set up Stripe
          content:
            body: |-
              [**Stripe**](https://stripe.com/) is a payment processing service that handles accepting credit card payments online.

              When a customer pays through Stripe, the money goes to your Stripe account. You then transfer it to your separate business bank account.

              **To set up Stripe,** you'll need:
              - An email address
              - Your personal details (name, address, date of birth)
              - A bank account to receive payouts
              - Depending on your location, a tax identification number

              The goal for now is to **create your Stripe account** so it's ready when you need it.

              **Bonus:** once you've signed up, check **Settings > Perks** in your Stripe dashboard. Stripe partners with other tools to offer discounts for startups, including PostHog, which you set up in Challenge 4.
          subtitle: Get your payment account ready
        - type: text
          title: Legal basics (keep it simple)
          content:
            body: |-
              Many first-time founders spend weeks researching company structures before they've earned a single payment.

              **The rule:** only register a company when you have solid revenue or a specific deal requires it. Setting up and operating a company costs money (registration fees, annual filings, accountant fees). Until you're earning enough to justify those costs, keep it simple.

              In most countries, you can operate as a **sole trader** (also called sole proprietor or self-employed) to start. Minimal paperwork, minimal cost.

              **What you should do now:**
              - Research the simplest legal framework for your location
              - Book a one-hour call with an accountant to understand your tax obligations
              - Keep records of your income and expenses from day one

              An accountant can tell you exactly what structure makes sense for your situation and location. A one-hour consultation is a small investment that can save you from expensive mistakes.

              **Toolkit:** The [Accountant Call Preparation Template](https://littleparrot.app/nest/toolkit/1a82d9a5-9987-4f61-aa29-99574b40836a) has a list of questions to bring to your first accountant call, covering legal structure, taxes, deductible expenses, and record-keeping. Fill in your details before the call so you make the most of the time.
          subtitle: Don't register a company until you need one
        - type: quiz-question
          title: "Quiz: Legal structure"
          content:
            question: "You operate as a sole trader. Your product has 8 paying users and earns about $40/month in revenue. A friend tells you that you should register a company before accepting any more payments. What do you do?"
            options:
              - Register a company now, before anything goes wrong
              - Keep operating as a sole trader for now
              - Stop accepting payments until you've registered
              - Hire a lawyer to figure out the best structure right away
            correctAnswer: 1
            explanation: "At $40/month, the cost of registering and maintaining a company (registration fees, annual filings, accountant fees) would likely eat most of your revenue. Operating as a sole trader is simpler and cheaper at this stage. Revisit the decision when your revenue is high enough to justify those costs, or when a specific deal requires it. When in doubt, ask your accountant."
        - type: reflection
          title: What's the one thing you'll do this week?
          content:
            description: You've covered a lot of ground across eight challenges. What's the single most important thing you'll do this week to move your product forward?
            placeholder: "This week I will..."
            subDescription: "Not next month. Not five things. One thing, this week. That's how businesses get built."
        - type: course-end
          title: "You're in business! \U0001F389"
          content:
            description: |-
              Look at what you've built across this course:

              - A **clear value proposition** that makes people lean in
              - A **professional domain** and email
              - **Email capture** and a lead magnet building your audience
              - **Analytics and session replay** showing you how people use your product
              - **Real visitors** from directories and communities
              - **User feedback** and a real testimonial on your landing page
              - A **pricing model** based on real data
              - A **break-even point** you calculated yourself
              - The **financial and legal basics** to accept your first payment

              You went from "I built something cool" to "I know exactly what it takes to make this sustainable." That's a transformation most people only dream about.
            subDescription: |-
              You're not chasing hypergrowth. You're building something profitable, sustainable, and yours. No investors telling you what to do. No pressure to scale before you're ready. Your product, your pace, your business.

              Products are never done. But you now have the foundation, the numbers, and the mindset to grow this into something real.

              Good luck, and happy building! 🤗
