  cover: /courses/vibe-coding-start-your-business-00/cover.gif
  title: 'Build a Business: From Vibe Coded Product to Paying Users'
  learningOutcomes:
    - Craft a clear value proposition that makes people say "I need that"
    - Choose a domain and set up a professional online presence on a small budget
    - Set up email capture and a lead magnet to build your audience before launch
    - Install analytics so you can learn from every visitor from day one
    - Get your first real visitors through directories and community posts
    - Collect honest user feedback and real testimonials
    - Choose a pricing model informed by real usage data
    - Calculate your break-even point and build a sustainable business
  challenges:
    - title: Craft Your Value Proposition
      isFree: true
      skills:
        - Value Proposition
        - Message Testing
        - Validation
      description: Describe the value your product delivers in one sentence, then test it on real people.
      completionTime: '10:00'
      steps:
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-00.png
            altText: |-
              Dalmie, a dalmatian dog wearing a red shirt, sits at a desk looking at the Book Club
              Organiser app on a laptop screen. A friend sits next to Dalmie and says, "This app is
              great! You should charge for it." Dalmie looks surprised and says, "Wait... could this
              actually become a business?"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-01.png
            altText: |-
              Dalmie stands overwhelmed in front of a whiteboard covered with sticky notes that read
              things like "domain?", "setting up a company??", "trademarking", "investors?", "payment?",
              "branding". Dalmie has exhausted eyes and says, "What is even necessary to turn this into a real business??"
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-start-your-business-00/panel-02.png
            altText: |-
              Little Parrot, the brightly coloured bird, appears next to Dalmie at the whiteboard.
              Little Parrot starts rearranging the sticky notes into a clear sequence and says,
              "One step at a time! First, let's find the right words to describe what you've built.
              Then we'll set up everything you need before your first visitor arrives."
        - type: text
          title: What you'll walk away with
          content:
            body: |-
              Turning a product into a business can feel overwhelming. There are so many things to figure out, and it's hard to know where to start.

              This course breaks it down into eight small challenges. By the end, you'll have:

              - A **clear value proposition** that makes people want to try your product
              - A **professional domain** and email that look credible
              - **Email capture** ready to build your audience from day one
              - **Analytics** showing you exactly how people use your product
              - **Real visitors** from directories and communities
              - **User feedback** and testimonials on your landing page
              - A **pricing model** based on real data
              - Your **break-even point** calculated, so you know exactly what it takes to be sustainable

              Each challenge builds on the one before it. You don't need to figure everything out at once. One step at a time.
          subtitle: Eight small challenges, one big transformation
        - type: text
          title: What you don't need (yet)
          content:
            body: |-
              You've built a digital product. It works. People around you have used it and found it helpful. Now you're wondering: could this become a real business?

              Here's where most people get stuck. They think they need to sort out a hundred things before they can start:

              - A registered company
              - Investors
              - A trademark
              - A business plan
              - A logo designed by a professional
              - Business cards

              **You don't need any of that right now.** Setting up a company costs money. Trademarking costs money. Business cards end up in a drawer. None of it matters if nobody's using your product.
          subtitle: The biggest mistake first-time founders make
        - type: text
          title: What you do need
          content:
            body: |-
              One thing: **people getting value from what you built.** That's the only proof that counts.

              Everything else comes later, once you have evidence that people want what you built. This course will walk you through how to get that evidence.

              But first, let's find out if you can describe your product in a way that makes someone who's never seen it say, "I need that." That starts with your **value proposition**: a clear description of the value your product delivers.

              If you want to go deeper on making sure your product solves a real problem, check out our [Build a Valuable Product: How to Break Down Your Idea for Vibe Coding](https://littleparrot.app/e16d932e-ac1f-4514-b5da-42629acf39ae/course-overview) course.
          subtitle: Just one thing
        - type: text
          title: The value proposition formula
          content:
            body: |-
              A **value proposition** is a clear description of the value your product delivers. Here's a simple formula:

              **"[Product] helps [who] to [achieve what] without [pain point]."**

              This formula works because it packs four things into one sentence:
              - **What it is** (so people can picture it)
              - **Who it's for** (so the right people recognise themselves)
              - **What it helps achieve** (so people understand the value)
              - **What pain it removes** (so people feel the relief)

              The trick is: you won't nail it on the first try. You need to test different versions and see which one makes people react.
          subtitle: Four elements in one sentence
        - type: text
          title: Where you'll use your value proposition
          content:
            body: |-
              This isn't an exercise for its own sake. Your value proposition will come back throughout this course and beyond:

              - **Your landing page** heading and subheading
              - **Directory submissions** (Challenge 5) when you list your product on websites like BetaList or Product Hunt, where people go to discover new products
              - **Community posts** (Challenge 5) when you share your product in online groups
              - **Your Google Business Profile** (Challenge 2) description
              - **Emails to early users** (Challenge 6) when you introduce yourself and ask for feedback
              - **Your social media bio** when you talk about what you're building

              Every time someone asks "What's your product about?", your value proposition is the answer. Getting it right now saves you from rewriting everything later.
          subtitle: This sentence will follow you everywhere
        - type: text
          title: "Dalmie's three versions"
          content:
            body: |-
              Dalmie tried three versions of her value proposition for the Book Club Organiser:

              **Version 1:** "I built a book club app."
              *Reaction: polite nods. "Oh, cool." End of conversation.*

              **Version 2:** "I built a tool for book clubs to manage their reading lists."
              *Reaction: some interest. "What does it do exactly?"*

              **Version 3:** "I built an app that helps book clubs pick their next read without endless WhatsApp debates."
              *Reaction: eyes light up. "Oh, we need that! How does it work?"*

              Version 3 won because it named the specific pain point ("endless WhatsApp debates") that book club organisers instantly recognise. The first two were too vague to trigger that recognition.
          subtitle: Same product, different reactions
        - type: quiz-question
          title: "Quiz: Evaluate a value proposition"
          content:
            question: "A friend built a habit-tracking app. She describes it as: \"HabitFlow is a productivity platform with gamification features, push notifications, social sharing, and AI-powered insights.\" What's the biggest problem with this value proposition?"
            options:
              - It's too short, and doesn't list enough features
              - It lists features instead of naming who it helps and what pain it removes
              - It doesn't mention the price and subscription model, so people don't know how to buy it
              - It uses too many technical terms, which might scare non-technical users away
            correctAnswer: 1
            explanation: "Features don't equal value. A list of features tells people what the product has, but not why they should care. A strong value proposition names who it's for and what pain it removes. \"HabitFlow helps busy professionals build daily habits without relying on willpower\" would be stronger because it answers the question people actually have: \"What's in it for me?\""
        - type: text
          title: How to test your value proposition
          content:
            body: |-
              Here's how to test your value proposition:

              1. Write three versions using the formula.
              2. Find five people **who match your target audience** and tell them what your product does, one-on-one. Use a different version each time.
              3. After each conversation, write down their **exact reaction**. Did they ask a follow-up question? Did they change the subject? Did their eyes light up?
              4. The version that made someone ask "How does it work?" or "Can I try it?" is your winner.

              **Why your target audience?** A polite nod from your mum doesn't tell you much. You need reactions from people who actually have the problem your product solves. If you built an app for book club organisers, test your value proposition on people who run book clubs, not on friends who've never been in one.

              You don't need a focus group or a survey. Five conversations with the right people will tell you more than you expect.

              **What if none of them work?** That's useful information too. It might mean the problem you're solving isn't painful enough, or you haven't found the right audience yet.
          subtitle: Five conversations, three versions, one winner
        - type: quiz-question
          title: "Quiz: Testing your value proposition"
          content:
            question: What's the best sign that your value proposition is working?
            options:
              - The person says "that sounds interesting"
              - The person nods politely, then changes the subject
              - The person asks a follow-up question like "how does it work?"
              - The person says "good luck with that"
            correctAnswer: 2
            explanation: A follow-up question means the person is engaged and wants to know more. Polite nods and generic encouragement often mean the message wasn't compelling.
        - type: free-text-exercise
          title: Write three versions of your value proposition
          content:
            description: |-
              Write three versions of your value proposition using the formula:

              **"[Product] helps [who] to [achieve what] without [pain point]."**

              Try different angles. Change who it's for, what it does, or what pain it removes. The goal is to find the version that sparks the most interest.
            placeholder: |-
              Version 1:...

              Version 2:...

              Version 3:...
            systemPrompt: 'You are a business mentor helping a learner refine their value proposition. They were given the formula "[Product] helps [who] to [achieve what] without [pain point]" and asked to write three versions. Provide friendly, concise feedback (max 5 bullet points) in British English. Check if each version includes all four elements (what, who, value, pain point). If a version is too vague, suggest how to make it more specific. Highlight which version feels strongest and why. End with encouragement.'
            checkerPrompt: 'Check if the user has written three distinct versions of their value proposition, and whether each version includes a product, a target audience, a value, and a pain point. This is what they wrote:'
        - type: challenge-end
          title: "You've found your words! \U0001F4AC"
          content:
            nextModule: "**Next challenge:** Now that you can describe your product's value, let's give it a proper home online."
            description: You now have a clear value proposition that makes people lean in.
            subDescription: "Keep this sentence close. It will come in handy every time you explain what you do to someone new, whether at a dinner party, in a community, or in a casual conversation. You never know when the person you're talking to is your next user."

    - title: Choose Your Domain
      isFree: false
      skills:
        - Domain Selection
        - Professional Presence
        - Budget Management
      description: Pick the right name and set up a professional online presence without overspending.
      completionTime: '10:00'
      steps:
        - type: text
          title: Your product needs an address
          content:
            body: |-
              Before you start telling people about your product, you need a place to send them. Your domain is the address people will see in directories, community posts, and emails. It's one of the first things that signals whether your product is a hobby project or something to take seriously.

              Getting this right doesn't need to cost much. But getting it in place **before** you start driving traffic matters, because every link you share will carry this address.
          subtitle: Why this comes before anything else
        - type: text
          title: How to choose a good domain name
          content:
            body: |-
              A few rules of thumb:

              - **Keep it short and memorable.** If someone hears it once, can they type it from memory?
              - **Make it easy to spell.** Avoid words people commonly misspell.
              - **Avoid hyphens and numbers.** They're confusing when spoken aloud. "Is that a dash or...?"
              - **Match your product name if possible.** Consistency between your product name and domain builds trust.

              Don't overthink it. A good-enough domain that you own today is better than the perfect domain you spend weeks debating.
          subtitle: Short, memorable, easy to spell
        - type: text
          title: Top-level domain trade-offs
          content:
            body: |-
              The part after the dot matters more than you might think:

              - **.com** is the most recognised and trusted. People type it out of habit. But good .com names are often taken or expensive.
              - **.co** is a popular alternative. Cheaper than .com, feels modern. Some people might accidentally type .com instead.
              - **.app** signals that you've built software. Slightly more technical feel. Good for tech-savvy audiences.
              - **.io** is popular in the tech world but less familiar to non-technical audiences.

              Head to a domain registrar like GoDaddy and search for your product name. Compare what's available across different extensions and what fits your budget.

              For most first products aimed at a non-technical audience, **.com is the safest bet** if you can get one at a reasonable price.
          subtitle: ".com, .co, .app, .io: what's the difference?"
        - type: quiz-question
          title: "Quiz: Choosing a domain"
          content:
            question: Which domain would be the best choice for a recipe-sharing app aimed at home cooks?
            options:
              - recipe-sharing-app-2024.io
              - recipeshare.com
              - rs.app
              - my-recipes.co.uk
            correctAnswer: 1
            explanation: It's short, memorable, easy to spell, has no hyphens or numbers, and uses .com which is the most recognised extension for a non-technical audience.
        - type: text
          title: Set up a professional email
          content:
            body: |-
              Once you have a domain, set up a professional email address. Sending emails from **hello@yourproduct.com** instead of **yourname123@gmail.com** makes a noticeable difference in how people perceive your product.

              **Google Workspace** lets you create email addresses on your own domain. It costs around $6-7/month, which is worth it when you start emailing customers, responding to feedback, or reaching out to communities.

              The technical setup (connecting your domain to Google Workspace, configuring email settings) can feel intimidating. We've included a **step-by-step setup guide in the toolkit** for this course that walks you through every click.
          subtitle: Trust starts in the inbox
        - type: quiz-question
          title: "Quiz: Professional email"
          content:
            question: Why does sending emails from hello@yourproduct.com matter?
            options:
              - It's technically required for sending bulk emails
              - It makes your emails load faster
              - It signals professionalism and builds trust with customers
              - It prevents your emails from going to spam
            correctAnswer: 2
            explanation: A professional email on your own domain signals that your product is serious. It builds trust when you're reaching out to potential users, responding to feedback, or sending updates.
        - type: text
          title: Register on Google Business Profile
          content:
            body: |-
              While you're setting things up, register your product on **Google Business Profile** (business.google.com). It's free and helps your product appear in Google search results.

              You don't need a physical office. Digital products can register with a service area. Fill in your product name, website, and a brief description (use your value proposition from Challenge 1).

              This is a small step that takes five minutes but can improve your visibility in search over time.
          subtitle: A free way to improve your search visibility
        - type: text
          title: "Dalmie's domain decision"
          content:
            body: |-
              Dalmie searched for domains and found two options:

              - **bookclub.app** at $14/year
              - **bookcluborganiser.com** at $12/year

              She went with the **.com** because her audience (book club organisers) isn't particularly technical, and .com feels more familiar to them. She set up **hello@bookcluborganiser.com** through Google Workspace and registered her Google Business Profile.

              **Total cost: under $25.**

              She could have spent days agonising over the perfect name. Instead, she picked something clear and moved on. The domain can always be changed later if needed, but momentum can't.
          subtitle: Under $25 for a professional presence
        - type: reflection
          title: Research your domain options
          content:
            description: Search for available domains for your product on a registrar like GoDaddy. Compare at least two top-level domain options (.com, .co, .app, etc.) on price and fit. Which one will you go with, and why?
            placeholder: "I searched for... The options I found were... I'm going with... because..."
            subDescription: "Remember: a good-enough domain you own today is better than the perfect one you debate for weeks."
        - type: challenge-end
          title: "Your product has a home! \U0001F3E0"
          content:
            nextModule: "**Next challenge:** Before you send anyone to your new domain, let's make sure you can capture every visitor."
            description: You've chosen a domain and set up a professional presence.
            subDescription: "Your domain, email, and Google Business Profile are the foundation of your online presence. With these in place, everything you share from now on looks professional. Check the toolkit for the technical setup guide if you haven't configured your email yet."

    - title: Build Your Audience Before You Launch
      isFree: false
      skills:
        - Email Capture
        - Lead Magnets
        - Audience Building
      description: Set up email capture and a lead magnet so you're ready to keep in touch with every visitor.
      completionTime: '10:00'
      steps:
        - type: text
          title: Set up the net before you fish
          content:
            body: |-
              You're about to start sending people to your product. But before you do, ask yourself: **if someone visits your site today and likes what they see, can they stay in touch with you?**

              If the answer is no, every visitor is a lost opportunity. They come, they look around, they leave, and you have no way to reach them again.

              This challenge is about setting up your email capture **before** you drive traffic, so that when visitors arrive, you're ready.
          subtitle: Why this comes before getting traffic
        - type: text
          title: Start with email capture
          content:
            body: |-
              The simplest version of email capture is a **wait list or sign-up form** on your landing page. It doesn't have to be fancy.

              You can start with a **Google Form** embedded on your site. You don't need a backend, a database, or an email marketing tool at the beginning. You need one thing: a way for someone to leave their email address.

              Add a clear call to action: "Join the wait list", "Get early access", or "Be the first to know when we launch." Keep it visible. Don't hide it at the bottom of the page.

              Don't wait until your product is "ready" to start collecting emails. The earlier you start, the more people you'll have to reach out to when you launch.
          subtitle: The foundation you need
        - type: quiz-question
          title: "Quiz: Email capture"
          content:
            question: Why should you set up email capture before driving traffic to your product?
            options:
              - Because search engines rank sites with forms higher
              - Because visitors who leave without giving their email are lost opportunities you can't reach again
              - Because email forms make your site look more professional
              - Because you need at least 100 emails before you can launch
            correctAnswer: 1
            explanation: Every visitor who leaves without a way to stay in touch is someone you can't reach again. Setting up capture before traffic means you don't lose your earliest and most valuable visitors.
        - type: text
          title: What is a lead magnet?
          content:
            body: |-
              A **lead magnet** is something valuable you give away for free in exchange for someone's email address. It makes your email capture more compelling. The principle is simple: **add value in public, sell in private.**

              Instead of asking people to sign up for "updates" (vague and uninspiring), you offer them something useful right now. They get immediate value, you get their email address.

              **Important:** the lead magnet only works if email capture is already in place. The visitor gets the lead magnet **in exchange for** their email address. Set up the form first, then add the lead magnet as the incentive.
          subtitle: Give people a reason to sign up
        - type: text
          title: What makes a good lead magnet?
          content:
            body: |-
              A lead magnet needs to meet three criteria:

              **1. It solves a real problem.** It should address a specific challenge or question your target audience has. Not a vague topic, but something they're actively dealing with.

              **2. It offers unique value.** If someone could get the same information from a quick Google search or by asking ChatGPT, it's not compelling enough. Your lead magnet should contain something that comes from your own experience or expertise.

              **3. It's well executed.** It doesn't need to be long, but it needs to feel thoughtful. A clean one-page checklist beats a sloppy ten-page ebook.

              One more thing to keep in mind: **a lead magnet won't generate direct sales.** Its job is to start a relationship. You're building a list of people who trust you and are interested in what you're building. Sales come later.
          subtitle: Three criteria to get it right
        - type: quiz-question
          title: "Quiz: Evaluate a lead magnet"
          content:
            question: Which of these would make the strongest lead magnet for a fitness tracking app?
            options:
              - A 30-page ebook about the history of fitness tracking
              - A one-page "Weekly Workout Planner" template based on the creator's own routine
              - A list of ten fitness apps with links to their websites
              - A video explaining what the app does
            correctAnswer: 1
            explanation: It's short, practical, immediately useful, and based on unique experience. The ebook is too long, the app list is generic information anyone could Google, and the video is a product demo, not a lead magnet.
        - type: text
          title: Formats that work
          content:
            body: |-
              The best-performing lead magnets tend to be **short, practical, and immediately useful.** PDF formats consistently outperform video-based lead magnets in conversion rates.

              Formats that work well:
              - **Templates** (fill-in-the-blank documents people can use right away)
              - **Checklists** (step-by-step lists for a specific task)
              - **Short guides** (one to three pages on a focused topic)
              - **Calculators or spreadsheets** (tools that help people make decisions)

              The easiest way to create one? **Repurpose knowledge you already have.** You built a product in this space, so you already know the domain. Turn what you know into a one-page template, a checklist, or a short guide. Don't create from scratch if you don't have to.
          subtitle: Start with what you already know
        - type: text
          title: "Dalmie's wait list and lead magnet"
          content:
            body: |-
              Dalmie added a wait list form to the Book Club Organiser's landing page. She embedded a simple Google Form with one field: email address.

              For her lead magnet, she asked herself: "What do I already know about running a book club that other organisers would find useful?" The answer was obvious: she'd been running one for a year and had figured out which discussion questions spark great conversations and how to structure a reading schedule so people actually finish the book.

              She turned this into a **"Book Club Starter Kit"** PDF: a one-page document with her favourite discussion questions and a reading schedule template. It took about an hour to make.

              It passes all three criteria: it solves a real problem (figuring out how to run a good book club meeting), it offers unique value (her own tested discussion questions, not generic ones), and it's clean and easy to use.

              She's now ready to capture visitors. All she needs is to send some.
          subtitle: A simple form and a one-page PDF
        - type: quiz-question
          title: "Quiz: Realistic expectations"
          content:
            question: What should you NOT expect a lead magnet to do?
            options:
              - Build a list of interested people
              - Start a relationship with potential users
              - Generate direct sales or revenue
              - Give your target audience immediate value
            correctAnswer: 2
            explanation: "A lead magnet starts a relationship. It builds trust and interest. Direct sales come later, after people have experienced your product. Expecting a lead magnet to drive revenue sets you up for disappointment."
        - type: free-text-exercise
          title: Plan your email capture and lead magnet
          content:
            description: |-
              Plan what you'll set up:

              1. **Email capture:** Where on your landing page will you add a sign-up form? What will the call to action say?
              2. **Lead magnet:** What knowledge do you already have that your target audience would find useful? How will you package it (template, checklist, guide)?
              3. **Three-criteria check:** Does your lead magnet idea solve a real problem, offer unique value, and can you execute it well?
            placeholder: |-
              Email capture: I'll add a form that says...

              Lead magnet idea: I'll create a... because my target audience would find it useful for...

              Three-criteria check:
              - Solves a real problem: yes/no, because...
              - Unique value: yes/no, because...
              - I can execute it well: yes/no, because...
            systemPrompt: 'You are a business mentor helping a learner plan their email capture and lead magnet. They should describe where they will add a sign-up form, what the call to action will say, and what lead magnet they will create. Provide friendly, concise feedback (max 5 bullet points) in British English. Check against the three criteria: does it solve a real problem, offer unique value (not generic info), and is it well scoped for execution? If the lead magnet could be found via a Google search, flag it and suggest how to make it more unique. If it is too ambitious, suggest simplifying. Remind them that lead magnets build relationships, not direct sales. End with encouragement.'
            checkerPrompt: 'Check if the user has planned both an email capture form (with a call to action) and a lead magnet. The lead magnet should solve a real problem, offer unique value (not generic), and be realistic to execute. This is their plan:'
        - type: challenge-end
          title: "Your net is ready! \U0001F3A3"
          content:
            nextModule: "**Next challenge:** One more thing to set up before the traffic arrives: analytics. You'll want to see what visitors do from the very first day."
            description: You have a plan to capture every visitor's email and give them a reason to stay in touch.
            subDescription: "Remember: add value in public, sell in private. Your lead magnet starts a relationship. Once your form is live and your lead magnet is ready, every visitor has a reason to stay in touch. You're building an audience before you've even officially launched."

    - title: Set Up Analytics Before Your First Visitors Arrive
      isFree: false
      skills:
        - Analytics
        - Posthog
        - Data-Informed Decisions
      description: Install Posthog so you can learn from every visitor from day one.
      completionTime: '12:00'
      steps:
        - type: text
          title: Don't fly blind
          content:
            body: |-
              You're almost ready to send people to your product. But before you do, there's one more thing to set up: **analytics**.

              Why now? Because if you set up analytics **after** you've already driven traffic, you've lost data from your first visitors. Those early visitors are the most valuable ones to learn from. They're the people who saw your value proposition, clicked through, and tried your product for the first time.

              Set up tracking now, so that when traffic arrives, you see **everything**.
          subtitle: Why this comes before driving traffic
        - type: quiz-question
          title: "Quiz: Why set up analytics now?"
          content:
            question: Why is it important to set up analytics before driving traffic?
            options:
              - Analytics tools take several weeks to start working
              - You need analytics data to create a Stripe account
              - Data from your first visitors is the most valuable and can't be recovered if you miss it
              - Search engines require analytics to index your site
            correctAnswer: 2
            explanation: Your first visitors are the most valuable to learn from. If you set up analytics after they've already visited, that data is gone. You can't go back and see what they did.
        - type: text
          title: What is Posthog?
          content:
            body: |-
              **Posthog** is a free analytics tool that shows you what visitors do inside your app. It goes beyond counting page views: you can see which pages people visit, which buttons they click, where they get stuck, and where they leave.

              It's free for up to 1 million events per month, which is more than enough for a product that's getting started.

              Posthog also has a **session replay** feature that records how people navigate through your product. You can watch a real visitor's session like a video: see where they clicked, where they hesitated, and where they gave up. This is incredibly useful for spotting confusing parts of your product that you'd never notice yourself.
          subtitle: Your window into user behaviour
        - type: text
          title: What Posthog tracks automatically
          content:
            body: |-
              Here's good news: once Posthog is installed, it automatically tracks a lot of useful things without any extra setup. This is called **autocapture**.

              Out of the box, Posthog records:
              - **Pageviews:** which pages people open
              - **Page leaves:** when they leave a page
              - **Clicks:** which buttons and links they interact with
              - **Form submissions:** when they fill in and submit a form

              This means you get useful data from the moment your first visitor arrives, even before you set up any custom tracking.
          subtitle: You get a lot for free
        - type: text
          title: Custom events for what matters most
          content:
            body: |-
              Autocapture handles the basics, but for the actions that matter most to your business, you'll want to set up **custom events**.

              A custom event is a specific action you choose to track by name. For example: "book club created", "vote cast", or "user signed up".

              Why bother when autocapture already tracks clicks? Two reasons:

              1. **Clarity:** autocapture labels a button click as "clicked button". A custom event called "book club created" tells you exactly what happened in your product.
              2. **Reliability:** if you change your design (rename a button, move a form), autocapture labels change too. Custom event names stay consistent.

              Posthog recommends naming custom events in **[object] [verb]** format: "book club created", "book suggestion added", "vote cast". This keeps your events readable as the list grows.
          subtitle: Name the actions that matter
        - type: quiz-question
          title: "Quiz: Autocapture vs custom events"
          content:
            question: Why should you set up custom events when Posthog already autocaptures clicks?
            options:
              - Autocapture doesn't work on mobile devices
              - Custom events have clearer names and stay consistent even when you change your design
              - Custom events are faster than autocapture
              - You need custom events before Posthog will start recording sessions
            correctAnswer: 1
            explanation: Autocapture labels actions generically ("clicked button") and the labels change if you redesign. Custom events like "book club created" are clear, specific, and stay consistent over time.
        - type: text
          title: The prompt to add Posthog to your app
          content:
            body: |-
              You'll use your AI app builder to add Posthog. Here's a concrete prompt you can copy and adapt:

              ---

              *Add Posthog analytics to my app using the posthog-js library. Here's what I need:*

              *1. Install the posthog-js package*
              *2. Initialise Posthog on app startup so it runs on every page. Use my project token: [YOUR_KEY_HERE] and the host: https://us.i.posthog.com (or https://eu.i.posthog.com if you're in Europe). Enable debug mode during development so I can verify events are firing.*
              *3. Enable session replay so I can watch how users navigate my app.*
              *4. Track these custom events using posthog.capture() with these exact names:*
              *- "signup form submitted" when someone submits the sign-up form*
              *- "feedback button clicked" when someone clicks the feedback button*
              *- [add your own events here, using "object verb" naming]*
              *5. Make sure Posthog initialises on every page, not only the homepage.*

              ---

              **Where to find your project token:** Sign up at posthog.com (free), create a project, and you'll find your project token in the project settings.

              **Replace the example events** with the actions that matter most in your product. Use the "object verb" naming format to keep things consistent.
          subtitle: Copy, adapt, and paste into your AI app builder
        - type: text
          title: How to verify it works
          content:
            body: |-
              After your AI app builder has added Posthog, you need to check that it's actually working. Here's how:

              1. Open your app in a browser
              2. Click around: visit a few pages, click some buttons, submit a form
              3. Go to your Posthog dashboard (app.posthog.com)
              4. Look for your session in the **Activity** or **Events** tab

              If debug mode is enabled (as the prompt requests), you'll also see events logged in your browser's developer console. Don't worry if you're not sure how to open that. The important check is: **does your session appear in the Posthog dashboard?**

              If nothing shows up, the most common causes are:
              - The project token is wrong or missing
              - Posthog was only initialised on one page, not all of them
              - An ad blocker in your browser is blocking Posthog

              Try in an incognito/private browser window with ad blockers disabled.
          subtitle: Check the dashboard, not the code
        - type: text
          title: Session replay
          content:
            body: |-
              Once Posthog is running, open the **Replay** section in your dashboard. Here you can watch recordings of real visitor sessions.

              You'll see exactly what your visitors saw: which pages they opened, where they clicked, where they scrolled, where they paused, and where they left. It's like looking over someone's shoulder as they use your product.

              This is one of the most powerful tools for improving your product. You'll spot things that analytics numbers alone can't show:
              - A button that people hover over but never click (confusing label?)
              - A page where people scroll up and down repeatedly (looking for something they can't find?)
              - A form that people start filling in but abandon halfway (too long or unclear?)

              You don't need to watch every session. Start by watching a few each week, especially sessions where someone signed up or where someone left quickly. The patterns will stand out.
          subtitle: Watch how real people use your product
        - type: quiz-question
          title: "Quiz: Session replay"
          content:
            question: What can session replay help you spot that analytics numbers alone cannot?
            options:
              - How many visitors you had last week
              - Which country your visitors come from
              - A button that people hover over but never click, or a form they abandon halfway
              - How fast your pages load
            correctAnswer: 2
            explanation: Session replay shows you the qualitative side of user behaviour. You can see hesitation, confusion, and frustration that numbers alone can't reveal.
        - type: text
          title: What to look at each week
          content:
            body: |-
              Once Posthog is running and you have some visitors, you don't need to analyse everything. At this stage, you're answering **one question:**

              **"Are people using the thing I built, and which parts?"**

              Check these things once a week:
              - **Which pages get the most visits?** This tells you what attracts people.
              - **Where do people drop off?** This tells you where something is confusing or broken.
              - **Which custom events fire most?** This tells you which features people actually use.
              - **Watch 2-3 session replays.** Pick one from someone who signed up and one from someone who left quickly. What did they do differently?

              Don't get lost in dashboards. These four checks are enough for now.
          subtitle: Four things, once a week
        - type: text
          title: Dalmie sets up Posthog
          content:
            body: |-
              Dalmie signed up for Posthog (free plan), got her project token, and adapted the prompt to ask Lovable to add tracking to the Book Club Organiser.

              She set up three custom events:
              - **"book club created"** when someone creates a new book club
              - **"book suggestion added"** when someone adds a book
              - **"vote cast"** when someone votes on a book

              She also enabled session replay so she could watch how people navigate the app.

              After setup, she opened the app in an incognito window and clicked around. She checked the Posthog dashboard: her session appeared, all three custom events fired correctly, and she could see her own session replay.

              She's now ready to see what real visitors do.
          subtitle: Three custom events, session replay, one test visit
        - type: reflection
          title: Plan your Posthog setup
          content:
