          content:
            description: |-
              Calculate your break-even point using your own numbers:

              1. **Fixed costs:** List your monthly fixed costs (domain, email, tools). Add them up.
              2. **Price per user:** What do you charge per month? (from Challenge 7)
              3. **Variable cost per user:** Stripe takes roughly 2.9% + $0.30 per transaction. Calculate what that is for your price.
              4. **Break-even:** Fixed costs / (Price - Variable cost) = how many paying users?
