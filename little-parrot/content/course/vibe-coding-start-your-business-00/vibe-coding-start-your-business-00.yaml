      description: Drive real people to your product through directories and community posts.
      completionTime: '12:00'
      steps:
        - type: text
          title: Everything is in place
          content:
            body: |-
              This is the moment everything comes together.

              You have a **clear value proposition** (Challenge 1) that makes people lean in. A **professional domain** (Challenge 2) that looks credible. **Email capture** (Challenge 3) ready to keep visitors in touch. And **analytics** (Challenge 4) tracking every action from day one.

              You're not sending people into a void. Every visitor who arrives will be captured, tracked, and learned from. Now it's time to send some.
          subtitle: Time to open the doors
        - type: text
          title: Where to list your product
          content:
            body: |-
              There are platforms where people actively look for new products to try. Here are three good starting points:

              **BetaList** (betalist.com) — a directory of early-stage startups and products looking for beta testers. Your audience here is people who enjoy trying new things and giving feedback. Good for getting early adopters.

              **Product Hunt** (producthunt.com) — a larger platform where new products are "launched" and voted on by the community. More competitive, but a well-timed launch can bring a significant spike of visitors. Save this for when you feel confident about your product.

              **Startup directories** — there are dozens of smaller directories that list new products. Search for "submit startup" or "startup directory list" and you'll find curated lists of places to submit.

              You don't need to be on all of them. Pick one or two that fit your product and your audience.
          subtitle: Directories where people discover new products
        - type: text
          title: What a good submission looks like
          content:
            body: |-
              Most directory listings ask for the same things. Here's how to make yours stand out:

              **A clear one-line description.** Use your value proposition from Challenge 1. Not "A platform for book clubs" but "Helps book clubs pick their next read without endless WhatsApp debates."

              **A screenshot that shows the product in action.** Not a logo or a landing page. Show the product doing the thing it does. If your app has a voting feature, show a vote in progress.

              **A short "why this exists" paragraph.** Two to three sentences about the problem you noticed and why you built this. Keep it personal and specific.

              **A weak submission** looks like: "BookClubApp - A book club management platform. Features include: book lists, voting, member management, reading schedules, and more."

              **A strong submission** looks like: "Book Club Organiser - Helps book clubs pick their next read without the WhatsApp chaos. I built this because my own book club spent more time debating what to read than actually reading."

              Notice the difference? The strong version has personality, names a specific problem, and doesn't list features.
          subtitle: Value proposition, screenshot, and why it exists
        - type: quiz-question
          title: "Quiz: Directory submissions"
          content:
            question: Which of these is the strongest one-line description for a directory listing?
            options:
              - "MealPlan Pro - A comprehensive meal planning and grocery management platform with AI-powered recipe suggestions"
              - "MealPlan Pro - Helps busy parents plan a week of dinners in 5 minutes instead of 45"
              - "MealPlan Pro - The best meal planning app on the market"
              - "MealPlan Pro - Features include: meal plans, grocery lists, recipe search, nutrition tracking"
            correctAnswer: 1
            explanation: It names a specific audience (busy parents), a specific outcome (plan a week of dinners), and a specific improvement (5 minutes instead of 45). It communicates value, not a feature list.
        - type: text
          title: Sharing in communities without being spammy
          content:
            body: |-
              Online communities (forums, Facebook groups, Reddit, Discord servers) can be a great source of early visitors. But nobody likes the person who joins a group and immediately drops a link.

              **The rule:** lead with the problem you solve, not with a link.

              Here's a template for a community post that feels helpful rather than promotional:

              *"We run a [relevant activity] and used to struggle with [specific problem]. I built a free tool to [what it does]. Would love feedback from others who [share this problem]."*

              Notice what's happening: you're sharing a relatable experience, offering something free, and asking for feedback. You're contributing to the community, not advertising.

              **Before posting:**
              - Spend a few days in the community first. Read, comment, be helpful.
              - Check the community rules about self-promotion.
              - Only post when it's genuinely relevant to a discussion or topic.
          subtitle: Lead with the problem, not the link
        - type: text
          title: One-on-one conversations still matter
          content:
            body: |-
              At this stage, talking to people individually is still your most powerful marketing tool. A personal message to someone who fits your target audience is more likely to lead to a sign-up than a directory listing that reaches hundreds.

              When you find someone who matches your target user (in a community, through friends, at an event), describe the value and ask if they'd try it. A direct invitation feels personal and builds a stronger connection than a public post.

              Want to go deeper into publishing and growing your app? Check out our [Launch and Grow Your Lovable App](https://littleparrot.app) course.
          subtitle: Your best marketing channel right now
        - type: text
          title: "Dalmie's first visitors"
          content:
            body: |-
              Dalmie wrote a community post in a book lovers' forum:

              *"We run a monthly book club and used to lose track of suggestions in WhatsApp. I built a free tool to collect and vote on book picks. Would love feedback from other book club organisers."*

              She got 20 visitors in the first week. Her BetaList listing used her value proposition from Challenge 1 and a screenshot of the voting feature.

              Her wait list captured **12 email addresses**, and Posthog showed her exactly which pages people visited and where they dropped off. Everything she set up in the previous challenges is now working together.
          subtitle: 20 visitors, 12 emails, and real data
