    - title: Build a Sustainable Business
      isFree: false
      skills:
        - Financial Health
        - Break-Even Analysis
        - Business Sustainability
      description: Know your numbers, set up payments, and build a business that lasts.
      completionTime: '12:00'
      steps:
        - type: text
          title: Sustainable over fast
          content:
            body: |-
              There's a narrative in the startup world that says you need to grow fast or die. Raise money, hire a team, scale at all costs.

              That's not the only way. And for most people building a product from a side project, it's not the right way.

              You're building a **bootstrapped business**: a product that earns its own money, without investors, without debt, and without the pressure to grow at someone else's pace. The goal is **profitability**, not headcount. **Freedom**, not funding rounds.

              Most bootstrapped products that reach sustainable income do so within 12 to 18 months of launching a paid version. That's a realistic timeline. Not weeks, not years. Months of consistent, focused work.

              This challenge is about knowing your numbers and setting up the basics so your business can sustain itself.
          subtitle: You're not building the next unicorn. You're building something that lasts.
        - type: text
          title: Know your break-even point
          content:
            body: |-
              The most important number for your business right now is your **break-even point**: the minimum you need to earn each month to cover your costs.

              The formula is straightforward:

              **Break-even point = Fixed costs / (Price per user - Variable cost per user)**

              **Fixed costs** are what you pay every month regardless of how many users you have: your domain, Google Workspace, any tools you subscribe to. These stay the same whether you have 1 user or 1,000.

              **Variable costs** are what increases with each paying user: Stripe's transaction fee (typically around 2.9% + a fixed amount per transaction) is the main one at this stage.

              **Price per user** is what you charge per month (from Challenge 7).

              Your break-even point tells you: **how many paying users do I need each month to stop losing money?** Everything above that number is profit.
          subtitle: The one number that tells you if your business is viable
        - type: text
          title: "Dalmie's break-even calculation"
          content:
            body: |-
              Dalmie's monthly fixed costs:
              - Domain: ~$1/month ($12/year)
              - Google Workspace: $7/month
              - Posthog: $0 (free tier)
              - **Total fixed costs: $8/month**

              Her price: **$5/month** per paying book club.

              Her variable cost per user: Stripe takes about 2.9% + $0.30 per transaction. On a $5 payment, that's roughly **$0.45 per user per month**.

              **Break-even = $8 / ($5.00 - $0.45) = $8 / $4.55 ≈ 2 paying users**

              Dalmie only needs **2 paying book clubs** to cover her costs. Everything after that is profit.

              This changes how she thinks about growth. She doesn't need hundreds of users to have a viable business. She needs two. That feels achievable.
          subtitle: Two paying users to break even
        - type: quiz-question
          title: "Quiz: Break-even point"
          content:
            question: "Your fixed costs are $15/month. You charge $8/month. Stripe takes about $0.53 per transaction. Roughly how many paying users do you need to break even?"
            options:
              - 1 user
              - 2 users
              - 5 users
              - 15 users
            correctAnswer: 1
            explanation: "Break-even = $15 / ($8.00 - $0.53) = $15 / $7.47 ≈ 2 users. You need about 2 paying users to cover your fixed costs each month."
        - type: text
          title: Metrics that matter vs metrics that feel good
          content:
            body: |-
              When you start getting data, it's tempting to check numbers that make you feel good: page views, sign-ups, social media followers. These are **vanity metrics**. They look impressive but don't tell you if your business is healthy.

              A simple test: **if improving this number directly increases your revenue or reduces your costs, it's a real metric. If it only makes you feel good, it's vanity.**

              **Vanity metrics** (don't obsess over these):
              - Total sign-ups (if most never come back)
              - Page views (traffic without conversion is noise)
              - Social media followers (followers don't pay bills)

              **Metrics that matter** (check these regularly):
              - **Paying users:** how many people are actually paying you?
              - **Churn:** how many paying users cancel each month? If you're losing users as fast as you're gaining them, growth is an illusion.
              - **Break-even gap:** are you above or below your break-even point?
              - **Retention:** do users come back after the first week? If they don't, your product isn't delivering enough value to keep them.
          subtitle: "The test: does this number pay the bills?"
        - type: quiz-question
          title: "Quiz: Vanity vs real metrics"
          content:
            question: Which of these is a vanity metric?
            options:
              - Number of paying users
              - Monthly churn rate
              - Total sign-ups (including those who never came back)
              - Whether you're above or below your break-even point
            correctAnswer: 2
            explanation: "Total sign-ups look impressive but don't tell you if your business is healthy. If most sign-ups never return, the number is misleading. Paying users, churn, and break-even directly connect to your business viability."
        - type: text
          title: Keep your money separate from day one
          content:
            body: |-
              Open a **separate bank account** for your product's income. This is one of the simplest things you can do, and it makes everything easier: tracking how your business is doing, preparing for taxes, and understanding your cash flow.

              Two free options that work well:

              **Wise** (wise.com) — Great for receiving payments in multiple currencies with low fees. Especially useful if your customers are international.

              **Revolut** (revolut.com) — A free business account that's easy to set up. Good for keeping your business finances separate from your personal ones.

              Both are free to open. You don't need a registered company to use them (personal accounts work fine at this stage).

              Cash flow problems are one of the main reasons small businesses fail. Keeping your business money separate means you always know exactly how much your product is earning and spending. Your accountant will thank you later.
          subtitle: A separate account changes how you see your business
        - type: text
          title: Set up Stripe
          content:
            body: |-
              **Stripe** is a payment processing service that handles accepting credit card payments online.

              When a customer pays through Stripe, the money goes to your Stripe account. You then transfer it to your separate business bank account.

              To set up Stripe, you'll need:
              - An email address
              - Your personal details (name, address, date of birth)
              - A bank account to receive payouts
              - Depending on your location, a tax identification number

              Integrating Stripe into your product is a topic on its own. For now, the goal is to **create your Stripe account** so it's ready when you need it.
          subtitle: Get your payment account ready
        - type: text
          title: Legal basics (keep it simple)
          content:
            body: |-
              Many first-time founders spend weeks researching company structures before they've earned a single payment.

              **The rule:** only register a company when you have solid revenue or a specific deal requires it. Setting up and operating a company costs money (registration fees, annual filings, accountant fees). Until you're earning enough to justify those costs, keep it simple.

              In most countries, you can operate as a **sole trader** (also called sole proprietor or self-employed) to start. Minimal paperwork, minimal cost.

              **What you should do now:**
              - Research the simplest legal framework for your location
              - Book a one-hour call with an accountant to understand your tax obligations
              - Keep records of your income and expenses from day one

              An accountant can tell you exactly what structure makes sense for your situation and location. A one-hour consultation is a small investment that can save you from expensive mistakes.

              **Toolkit:** The [Accountant Call Preparation Template](https://littleparrot.app/nest/toolkit/TODO) has a list of questions to bring to your first accountant call, covering legal structure, taxes, deductible expenses, and record-keeping. Fill in your details before the call so you make the most of the time.
          subtitle: Don't register a company until you need one
        - type: quiz-question
          title: "Quiz: When to register a company"
          content:
            question: When should you register a company for your product?
            options:
              - Before you start building the product
              - As soon as you have the idea
              - When you have solid revenue or a specific deal requires it
              - After your first visitor
            correctAnswer: 2
            explanation: Company registration costs money and creates ongoing obligations. Until you have revenue that justifies those costs, operating as a sole trader is simpler and cheaper.
        - type: text
          title: "Dalmie's sustainable plan"
          content:
            body: |-
              Dalmie opened a Wise account for the Book Club Organiser's finances. She signed up for Stripe and connected it to the Wise account.

              She didn't register a company. She booked a one-hour call with an accountant to understand her tax obligations and registered as a sole trader.

              She keeps her day job and dedicates five hours a week to growing the Book Club Organiser. Her break-even point is 2 paying book clubs. Her goal for the first three months: reach 10 paying users. That's $45.50/month in profit after Stripe fees. Not life-changing, but it proves the model works.

              She tracks three numbers each month: paying users, churn, and whether she's above break-even. She ignores how many people visited her landing page. She focuses on how many people are paying and staying.

              One step at a time.
          subtitle: Five hours a week, three numbers to track
        - type: free-text-exercise
