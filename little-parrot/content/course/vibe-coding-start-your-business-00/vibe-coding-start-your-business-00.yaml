          title: "You're in business! \U0001F389"
          content:
            description: |-
              Look at what you've built across this course:

              - A **tested pitch** that makes people lean in
              - A **professional domain** and email
              - **Email capture** and a lead magnet building your audience
              - **Analytics** showing you how people use your product
              - **Real visitors** from directories and communities
              - **User feedback** and a real testimonial on your landing page
              - A **pricing model** based on real data
              - A clear path to **accepting your first payment**

              You went from "I built something cool" to "I'm running a product." That's a transformation most people only dream about.
            subDescription: |-
              What surprised you most during this course? What will you do differently now?

              Your product isn't done. Products are never done. But you now have the foundation, the tools, and the mindset to grow it into something real.

