              What are the three most important actions a visitor can take in your product? These will become your custom events. Use the "object verb" naming format.

              Think about the actions that tell you whether someone is getting value from your product.
            placeholder: |-
              The three most important actions in my product are:
              1. "[object] [verb]" — when someone...
              2. "[object] [verb]" — when someone...
              3. "[object] [verb]" — when someone...
            subDescription: "These events will tell you whether people are using the core of your product, or getting stuck before they reach it."
        - type: challenge-end
          title: "You're ready to see everything! \U0001F4CA"
          content:
            nextModule: "**Next challenge:** Everything is in place. A clear value proposition, a professional domain, email capture, and analytics. Time to open the doors and let people in."
            description: You've set up analytics and session replay so every visitor teaches you something.
            subDescription: "You now have a clear value proposition (Challenge 1), a professional domain (Challenge 2), email capture (Challenge 3), and analytics tracking (this challenge). Nothing will be wasted when traffic arrives."

    - title: Get Your First Visitors
      isFree: false
