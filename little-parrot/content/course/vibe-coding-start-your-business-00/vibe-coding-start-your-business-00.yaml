              -
              -
              Total: $

              Price per user: $/month
              Variable cost per user (Stripe fee): ~$
              Contribution per user: $

              Break-even = $ / $ = approximately __ paying users
            systemPrompt: 'You are a business mentor helping a learner calculate their break-even point. They should list their fixed costs, their price per user, their variable cost (Stripe fees), and calculate how many paying users they need. Provide friendly, concise feedback (max 5 bullet points) in British English. Check the maths. If they forgot common fixed costs (domain, email), mention them. If the break-even number seems surprisingly high, suggest they review their pricing or costs. Remind them that this is the minimum, not the goal. End with encouragement.'
            checkerPrompt: 'Check if the user has listed fixed costs, a price per user, a variable cost per user, and calculated a break-even number. Verify the arithmetic is roughly correct. This is their calculation:'
        - type: reflection
          title: Your sustainable business plan
          content:
            description: |-
              Based on everything you've learned across the eight challenges, write down:

              1. **Your break-even point** (how many paying users you need)
              2. **The three metrics you'll track each month** (no vanity metrics)
              3. **One thing you'll do this week** to move closer to your first paying user
            placeholder: |-
              Break-even: I need __ paying users to cover my costs.

              Three metrics I'll track:
              1.
              2.
              3.

              This week I will:
            subDescription: "You don't need a business plan. You need three numbers and one next step."
        - type: course-end
          title: "You're in business! \U0001F389"
          content:
            description: |-
              Look at what you've built across this course:

              - A **clear value proposition** that makes people lean in
              - A **professional domain** and email
              - **Email capture** and a lead magnet building your audience
              - **Analytics and session replay** showing you how people use your product
              - **Real visitors** from directories and communities
              - **User feedback** and a real testimonial on your landing page
              - A **pricing model** based on real data
              - A **break-even point** you calculated yourself
              - The **financial and legal basics** to accept your first payment

              You went from "I built something cool" to "I know exactly what it takes to make this sustainable." That's a transformation most people only dream about.
            subDescription: |-
              You're not chasing hypergrowth. You're building something profitable, sustainable, and yours. No investors telling you what to do. No pressure to scale before you're ready. Your product, your pace, your business.

              Products are never done. But you now have the foundation, the numbers, and the mindset to grow this into something real.

              Good luck, and happy building!
