course:
  id: 0c2b1b82-d451-4499-b152-c58d8f58ff2b
  cover: /courses/vibe-coding-github-00/cover.gif
  title: Save Lovable Credits with GitHub
  note: 'This course uses only the GitHub website in your browser. No command line, no extra tools to install. You will need a Lovable project connected to GitHub to follow along.'
  learningOutcomes:
    - Edit your app's copy and small visual details on GitHub without spending Lovable credits
    - Find the file behind any image or icon by searching for the text next to it
    - Read a diff and a commit history so you understand how changes are made and tracked
    - Understand commits, branches, and how GitHub and Lovable stay in sync
    - Decide when to edit on GitHub and when to prompt Lovable
  challenges:
    - steps:
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-00.png
            altText: |-
              A dalmatian dog (called Dalmie) wearing a red shirt sits at a desk with a laptop,
              holding a small list. Dalmie says, "Just a few little fixes for the Book Club Organiser
              app: a typo, a colour, a new photo."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-01.png
            altText: |-
              Dalmie types a request to the AI on the laptop. A credit counter in the corner of
              the screen ticks down a little with each one. Dalmie says, "Each tiny change means
              asking the AI... and there go a few more credits."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-02.png
            altText: |-
              Dalmie looks at the laptop where the credit counter is now very low, and puts a paw
              to its head. A speech bubble reads, "All that on tiny tweaks. There must be a way to
              make small changes without spending credits."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-03.png
            altText: |-
              A brightly coloured bird (called Little Parrot) lands on the desk beside Dalmie,
              smiling warmly. The bird says, "There is! Your app's code already lives on GitHub.
              You can edit it there yourself, for free."
        - type: text
          title: What you'll walk away with
          content:
            body: |-
              By the end of this course, you'll be someone who can open your app's code, change what you want, and save it, **all without spending a Lovable credit**.

              You'll be able to 
              - **fix copy**
              - **swap an image** 
              - **tidy up small details** 
              
              Along the way you'll get a clear sense of how your app's files are organised and how changes are made and tracked. You won't be learning to read code, but it will all feel far less mysterious.

              And it opens a bigger door. **AI agents** like Claude Code and Cursor open and change the actual files in your project, the same ones you're about to learn to find and edit. Get comfortable doing it by hand now, and those tools will feel like a natural next step.
          subtitle: A quick look at where we're heading
        - type: text
          title: You won't be writing code
          content:
            body: |-
              Let's clear up the big worry first: you do **not** need to learn to code, and you won't be writing any from scratch.

              You'll make small, careful edits to text and details that are already there, the same way you'd fix a typo in a document. And if anything looks off, **every change can be undone**. Nothing you do here can break your app for good.
          subtitle: The fear that stops most people
        - type: text
          title: What GitHub is, and why edit there
          content:
            body: |-
              **GitHub** is the place where **your app's code is stored**. When you build with Lovable, every change you make is saved to a connected GitHub repository (think of it as the folder that holds the files with your app's code). GitHub also keeps a full history of the changes that you and Lovable make while building your app, so nothing is ever lost.

              Why edit on GitHub instead of asking Lovable? Two reasons: 
              1. A change you make yourself costs **no credits**, while prompting the AI to make it does. 
              2. It's **reliable**: you change exactly what you mean to, and nothing else.
            imageUrl: /courses/vibe-coding-github-00/octocat.gif
          subtitle: Your app's code has a home
        - type: text
          title: But isn't that what Visual Edits is for?
          content:
            body: |-
              Good question. Lovable's **Visual Edits** lets you click an element and change text or colours on the page, and it's free to use. For quick tweaks, it's lovely.

              It can also be unreliable, though. Sometimes it takes a while to load, and sometimes it acts on an older version of your code, which can **save over a change you already made**. For copy and colour changes you want to stick, **editing on GitHub is the more dependable option**. That's the skill you're learning here.
          subtitle: When the in-app editor lets you down
        - type: text
          title: You've done version control before
          content:
            body: |-
              Remember the full history GitHub keeps of every change? That has a name: **version control**, and you've almost certainly used it before, even if no one called it that.

              Google Docs and Microsoft Office keep a history of your document, so you can look back at earlier versions and restore them. GitHub does the same for your app's code. The one real difference is that with GitHub you give each change a short name, so you can see what changed at a glance without reading any code.

              Plenty of people use version control for **documents, not only code**. Some even write whole books this way. And because the history lives online, it's safe and reachable from anywhere. It's also why a developer can never claim the dog ate their homework. 😉
          subtitle: A familiar idea with a new name
        - type: quiz-question
          title: 'Quiz: Looking ahead to AI agents'
          content:
            question: Dalmie plans to try an AI agent like Claude Code soon, for her app and maybe even for writing documents like her social media calendar. How will GitHub help her?
            options:
              - It only helps with her app's code, not with documents like her social calendar
              - She can track each version of her files and see exactly what changed
              - She can reach her files from anywhere, not just one laptop
              - Honestly it won't, since the agent handles everything itself and you can just trust it
            explanation: |-
              Two real wins. With her files in GitHub, she can track every version and see exactly what changed, which is perfect for spotting what an agent did, and she can reach her work from anywhere, not just one laptop.

              And this isn't only for code: documents like her social media calendar get the same version history (remember, some people write whole books this way). The trap is thinking the agent "handles everything", understanding your own work is what lets you guide it and catch mistakes.
            correctAnswer: [1, 2]
        - type: text
          title: First, connect GitHub to Lovable
          content:
            body: |-
              Before you can edit on GitHub, your Lovable project needs to be connected to it. You only do this once.

              In Lovable, open **Project settings → Git → GitHub** (or use the **+** menu in the chat), click to connect, and authorise the Lovable GitHub app. Lovable then creates a repository for your project and keeps it in sync.

              The full screen-by-screen steps live in the **GitHub Setup Guide** (a companion to this course). Once you're connected, come back here.
            imageUrl: /courses/vibe-coding-github-00/connect-github.webp
          subtitle: A one-time setup
        - type: text
          title: Open the editor, github.dev
          content:
            body: |-
              To make a change in your application, we will use **github.dev**: a full code editor that opens right in your browser, with nothing to install. It's the same kind of editor you'll meet later in tools like Cursor, so getting comfortable with it now is a head start.

              In GitHub, open it from your repository's **main page**: press the **`.`** (full stop) key on your keyboard, or change **github.com** to **github.dev** in the address bar.
            imageUrl: /courses/vibe-coding-github-00/github-dev.gif
          subtitle: Your in-browser code editor
        - type: text
          title: Find your text in the editor
          content:
            body: |-
              Inside github.dev, click the **Search** icon in the left sidebar (the magnifying glass), or press **Ctrl/Cmd + Shift + F**. This searches across all your application's files at once.

              Type the phrase exactly as it appears in your app, for example `Suggest a book`. The results are grouped by file: each file that contains the phrase is listed, and if a file has more than one match, they're nested underneath it. Click a match to jump straight to that line.

              Now change only the words you came to change. Leave the code around them as it is, you're a careful editor here, not a rewriter.
            imageUrl: /courses/vibe-coding-github-00/github-search.gif
          subtitle: Search across all your files at once
        - type: text
          title: Check the diff before you commit
          content:
            body: |-
              github.dev saves your edit automatically as you type, so there's no save button to press. To see what you changed, open the **Source Control** panel: click its icon in the left sidebar (a branching line with a dot), or press **Ctrl/Cmd + Shift + G**. Your edited file appears under **Changes**.

              Click the file name under **Changes**, and a **diff** opens: the old version and the new side by side, red for removed, green for added.

              Reading it takes a few seconds and confirms you changed what you meant, and nothing else. Keep each change **small**, one thing at a time, so it's easy to read and easy to undo if you ever need to.
            imageUrl: /courses/vibe-coding-github-00/github-diff.gif
          subtitle: A quick habit that saves headaches
        - type: text
          title: Save your change with a commit
          content:
            body: |-
              In that same Source Control panel, type a short note describing your change, then click **Commit changes**. Saving a change this way is called **committing** it, and the note is your **commit message**.

              A good commit message is short and says what changed, not how. `Fix typo on book suggestion button` is great. Just writing *update* or *changes* won't help you later. A simple trick: finish the sentence *"This change will..."*
            imageUrl: /courses/vibe-coding-github-00/github-commit.gif
          subtitle: A commit is just a saved change with a name
        - type: quiz-question
          title: 'Quiz: A clear commit message'
          content:
            question: Dalmie just shortened the welcome heading on her home page. Which commit message will help her most when she reads her history in a month's time?
            options:
              - stuff
              - Update
              - Made some changes to the site today
              - Shorten the welcome heading on the home page
            explanation: |-
              The clear winner names exactly what changed in a few words. "Update", "stuff", and "made some changes" all leave you guessing later.

              A good test: could you tell what this commit did without opening it? If not, the message needs to be more specific.
            correctAnswer: 3
        - type: text
          title: How your change reaches your app
          content:
            body: |-
              Once you commit, your change syncs into your Lovable project automatically, **usually within seconds**.

              One thing to be clear about: this updates the code in your project, **not the live app your visitors see**. To update the published version, you need to press **Publish** in Lovable, exactly as you do when you edit something in Lovable. 
              
              So the full path is: **edit on GitHub → commit → it syncs into Lovable → you confirm the change looks as you expect in the Lovable preview → publish**.
            imageUrl: /courses/vibe-coding-github-00/lovable-commit.gif
          subtitle: Commit, sync, then publish
        - type: text
          title: Don't like it? Roll it back
          content:
            body: |-
              Once your commit has synced, check in the **Lovable preview** that your change looks the way you expected.

              If you don't like it, or the app shows an error, no worries. Every change is a saved version, and you can roll back to the one before it.

              To undo it, scroll up Lovable's **chat** to the version from just before your change, and click its **revert** option. Your app goes back to how it was, and the change you didn't want is gone.
            imageUrl: /courses/vibe-coding-github-00/lovable-revert.gif
          subtitle: Your safety net in Lovable
        - type: quiz-question
          title: 'Quiz: Where did it go?'
          content:
            question: Dalmie edits a heading on GitHub and commits it. A minute later she sees the new heading inside her Lovable project, but the live app her friends use still shows the old one. What's going on?
            options:
              - The commit failed and she needs to redo it
              - GitHub and Lovable are no longer connected
              - She hasn't pressed Publish in Lovable yet
              - The change will show on the live app in a few days
            explanation: |-
              Committing updates your project's code and syncs it into Lovable, but the live app only changes when you press Publish.

              This is a useful mental model: editing and publishing are two separate steps. You can make several edits, then publish once when you're happy.
            correctAnswer: 2
        - type: free-text-exercise
          title: Make your first credit-free edit
          content:
            description: |-
              Now it's your turn. Open your repository, find one piece of copy you'd like to fix, and edit it on GitHub.

              Before you commit, write the commit message here to get feedback on it. Describe the change in a short, clear line, as if finishing the sentence "This change will..."

              Don't worry about getting it perfect.
            placeholder: e.g. Fix typo in the welcome message on the home page
            systemPrompt: 'You are a friendly GitHub mentor for a non-technical app builder. The learner will paste a commit message for a small copy edit they made on GitHub. Give warm, concise feedback in British English (max 5 short bullet points) on whether the message is clear, specific, and describes a single small change. If it is vague (like "update" or "changes"), suggest a clearer version. If it bundles several changes, gently encourage one change per commit. Do not use em dashes. End with a short encouraging note. Reply in markdown format.'
            checkerPrompt: 'Check whether this commit message clearly describes a single, specific change in a few words. Flag it only if it is vague (e.g. "update", "changes", "fixes") or describes several unrelated changes at once. This is the commit message:'
        - type: challenge-end
          title: "You just edited your app without spending a credit! \U0001F389"
          content:
            description: You found your code, changed it, and saved it with a clear commit.
            nextModule: '**Next challenge:** Searching works when you know the words on the page. But what about a button, an icon, or an image with no text? Next you''ll learn a detective trick that points you straight to the right file, every time.'
            subDescription: |-
              This is the core skill the whole course builds on. Editing on GitHub is reliable, costs nothing, and changes exactly what you mean to.

              **Reusable tool:** The **Credit-Free Edit Checklist** captures these steps (search, edit, check the diff, commit, publish) so you can follow them any time without thinking.
      title: Make Your First Edit Without Spending a Credit
      isFree: true
      skills:
        - GitHub
        - Version Control
        - Commits
        - Vibe Coding
      description: Edit your app's copy directly on GitHub, so you save credits and change exactly what you mean.
      completionTime: 10:00
    - steps:
        - type: text
          title: You're no longer a beginner
          content:
            body: |-
              You've already made a real edit on GitHub. That's further than most people ever get.

              In this challenge you'll add a **detective skill**: finding the file behind an image or icon, the kind of thing with no text of its own to search for. Once you have it, **nothing in your app is hidden from you**.
          subtitle: Time for a detective trick
        - type: text
          title: What about things with no words?
          content:
            body: |-
              Search is perfect for copy. But what about your **logo**, a **photo**, or an **icon**? There's nothing to type into the search box, they have no words of their own.

              The clever move: don't search for the thing itself. Search for its **neighbours**.
          subtitle: Some things have no text to find
        - type: text
          title: Search for its neighbours
          content:
            body: |-
              On a screen, an image or icon almost always sits next to some text: a heading above it, a caption below, a label on the same row.

              So find a bit of that nearby text, and search for it just like you did in Challenge 1 (in github.dev, the **Search** icon or **Ctrl/Cmd + Shift + F**). The file that text lives in is the same file your image or icon lives in.
            imageUrl: /courses/vibe-coding-github-00/neighbour-search.gif
          subtitle: The neighbour trick
        - type: text
          title: Find it in the file
          content:
            body: |-
              Open the file from your search result. Your image or icon is usually just a few lines away from the text you searched for.

              You don't need to read the code. For an image, look for a line with `<img` and a file name in it. For an icon, look for a short, recognisable word nearby (often the icon's name). That's the spot you'll edit.
          subtitle: It's right next to the text
        - type: quiz-question
          title: 'Quiz: Finding a logo'
          content:
            question: Dalmie wants to swap her app's logo for a new one. The logo is an image with no text of its own. What's her most reliable way to find the file it's in?
            options:
              - Search GitHub for the word "logo" and hope it turns up
              - Find a bit of text right next to the logo and search for that
              - Open every file until she spots the logo
              - Delete the logo and ask Lovable to add a new one
            explanation: |-
              The logo has no text of its own, but its neighbours do. Searching for a heading or link right beside it lands her in the same file, with the logo a few lines away.

              Searching "logo" might work if the code happens to use that word, but the neighbour trick is the dependable bet, and it costs no credits.
            correctAnswer: 1
        - type: text
          title: Dalmie tries it
          content:
            body: |-
              The welcome image at the top of the Book Club Organiser is still a generic placeholder, and it has no text of its own.

              But right below it sits the welcome heading, *"Your book club, all in one place."* Dalmie searches github.dev for that line, opens the file it's in (it's called `Hero.tsx`), and there's the placeholder image just a few lines above. She's found it. She won't swap it yet, that's coming in a later challenge, but now she knows exactly where it lives.
          subtitle: Finding the placeholder image
        - type: free-text-exercise
          title: Track down an image or icon
          content:
            description: |-
              Pick an image or icon in your app that has no text of its own: your logo, a photo, an icon.

              Find a bit of visible text right next to it (a heading, a caption, a label, a nearby button). Search for that text in github.dev, open the file it's in, and look for your image or icon nearby.

              Paste the name of the file you found it in here.
            placeholder: e.g. Hero.tsx
            systemPrompt: 'You are a friendly GitHub mentor for a non-technical app builder. The learner has used the "neighbour trick" (searching for text next to an image or icon) to find the file that element lives in, and will paste that file name. Confirm warmly that finding the file is the goal, in British English (max 4 short bullet points). If they pasted something that does not look like a file (for example just a phrase), gently remind them to search for nearby text, open the file in the results, and paste its name (often ending in .tsx). Do not use em dashes. End with encouragement.'
            checkerPrompt: 'Check whether the learner pasted something that resembles a source file name or path (for example ending in .tsx, .ts, .jsx, or .js). Flag it only if it clearly is not a file at all. This is their answer:'
        - type: challenge-end
          title: "Nothing in your app is hidden from you now \U0001F50D"
          content:
            description: You can find the file behind any image or icon, even with no text to search for.
            nextModule: "**Next challenge:** You've been opening files one at a time. Next you'll step back and read your whole repository like a map: how it's organised, what your commit history shows, and what a branch actually is."
            subDescription: |-
              This removes the "but I don't know where it is" blocker for good. If you can see it, you can find its neighbours, and its file.

              **Reusable tool:** the **Neighbour Trick** (search for the text nearest the element, open that file, look a few lines away) is yours for whenever you're hunting down an image or icon.
      title: Find the Code Behind Anything You See
      isFree: false
      skills:
        - Searching Code
        - Source Files
        - Navigation
      description: "Learn a detective skill: find the exact file behind anything you see in your app, even when there's no text to search for."
      completionTime: 8:00
    - steps:
        - type: text
          title: Let's read the whole map
          content:
            body: |-
              You can find and edit single files now. In this challenge you'll zoom out and understand the **whole repository**: how it's laid out, what its history tells you, and a few words that demystify the rest.

              The payoff is confidence. When you can **name the part you mean**, you can guide your AI tools far more precisely too.
          subtitle: From single files to the big picture
        - type: text
          title: What a repository is
          content:
            body: |-
              A **repository** (or "repo") is the full folder that holds your app's code on GitHub. Everything your app is made of lives inside it.

              Open it and you'll see folders and files. You'll meet the same ones again and again: a folder for your **pages**, one for your **components** (the reusable pieces like buttons and cards), and files that handle **styling**. You don't need to memorise them, just enough to find your way around.
            imageUrl: /courses/vibe-coding-github-00/repo-structure.png
          subtitle: The folder that holds your whole app
        - type: text
          title: Is your repo private?
          content:
            body: |-
              Your repo may be **private** (only you can see it) or **public** (anyone with the link can). It's worth checking which yours is, in your repository's settings on GitHub, and setting it to private if you'd rather keep it to yourself.

              If your repo is private and you want to show your code to someone, a friend or someone helping you, you invite them as a **collaborator** in the repository settings. They can't reach it otherwise.
          subtitle: Check it, and know how to share it
        - type: text
          title: Your commit history
          content:
            body: |-
              Every saved change is recorded in the **commit history**: what changed, who changed it, and when. This includes the commits Lovable made as it built your app, sitting right alongside the ones you make.

              Open any commit and you'll see its **diff**, the same red and green view you met in Challenge 1. Reading the history is like flipping back through the story of how your app came to be.
            imageUrl: /courses/vibe-coding-github-00/commit-history.gif
          subtitle: The story of your app, change by change
        - type: quiz-question
          title: 'Quiz: Sharing your code'
          content:
            question: Dalmie's repo is private. She wants Sarah to take a look at the code while they sort out a tricky section together. What does she need to do?
            options:
              - Make the whole repo public so anyone can see it
              - Email Sarah a screenshot of the code
              - Invite Sarah as a collaborator on the repository
              - Nothing, Sarah can already see it because it's Dalmie's app
            explanation: |-
              A private repo is visible only to you until you invite someone as a collaborator. That keeps your code yours while still letting you share it deliberately.

              Making it public would work too, but then anyone with the link could see it, which usually isn't what you want.
            correctAnswer: 2
        - type: text
          title: What a branch is
          content:
            body: |-
              A **branch** is a separate line of work on your code. You and Lovable both work on the same default branch, usually called `main`.

              Because you're both on `main`, when you commit a change it lands there and shows up right away in the GitHub view before syncing to Lovable. You won't need to create branches in this course. It's enough to recognise the word when you see it.
          subtitle: Good to know the term
        - type: text
          title: Git vs GitHub
          content:
            body: |-
              These two get mixed up, so here's the difference in a breath. **Git** is the system that tracks changes to code. **GitHub** is the website that stores your code and shows it to you in a friendly way.

              You only ever touch GitHub in this course. Git is the engine humming away underneath, the same way you use a website without thinking about the server behind it.
          subtitle: One is the engine, one is the website
        - type: quiz-question
          title: 'Quiz: Which one is that?'
          content:
            question: Dalmie says, "I just click around on the website where my code is stored to look at my files." Which one is she describing?
            options:
              - GitHub
              - Git
              - A branch
              - A commit
            explanation: |-
              The website you click around in is GitHub. Git is the change-tracking system humming underneath, which you never have to touch directly in this course.

              A handy way to remember it: GitHub is the place you visit, Git is the engine behind it.
            correctAnswer: 0
        - type: reflection
          title: Explore your own history
          content:
            description: Open your repository's commit history and scroll to the very first commits, the ones Lovable made when it built your app. Click one open to see its diff. What surprised you about how your app was put together?
            placeholder: Type your answer here...
            subDescription: Reading your own history is one of the fastest ways to make the code feel like yours. The more familiar it looks, the less intimidating editing becomes.
        - type: challenge-end
          title: "Your repository isn't a black box any more \U0001F5FA️"
          content:
            description: You can read your repo's structure, its history, and you know how to share it safely.
            nextModule: "**Next challenge:** You've changed copy. Now you'll apply the same reliable workflow to how your app looks: swapping an image, removing something you don't want, and changing a colour the right way."
            subDescription: |-
              Knowing your way around the repo makes every future edit faster, and it makes your AI prompts sharper because you can name exactly what you mean.

              **Reusable tool:** The **GitHub Glossary for Vibe Coders** keeps short, friendly definitions of repository, commit, diff, branch, and Git vs GitHub in one place.
      title: Read Your Repository Like a Map
      isFree: false
      skills:
        - Repositories
        - Commit History
        - Branches
        - Repo Privacy
      description: Understand how your app is organised on GitHub, so nothing about your code feels hidden.
      completionTime: 9:00
    - steps:
        - type: text
          title: Now for how it looks
          content:
            body: |-
              Copy was the warm-up. In this challenge you'll use the same find-and-edit workflow for **small visual changes**: swapping an image, removing something you don't want, and changing a colour without making a mess.

              These are everyday visual tweaks, and doing each one on GitHub keeps it **precise, reliable, and free**.
          subtitle: Small visual wins, done reliably
        - type: text
          title: What counts as a safe small change
          content:
            body: |-
              Keep your GitHub edits **small and visual**. Good candidates:

              - Swapping an image for one of your own
              - Removing an element you don't want
              - A small spacing tweak
              - A colour change made in the right place

              Bigger structural work (a whole new feature, a new page) is still better done by prompting Lovable. We'll draw that line clearly in the next challenge.
          subtitle: Stay small here
        - type: text
          title: Change shared styles, not one element at a time
          content:
            body: |-
              Here's a principle worth holding on to: when you want a look to apply everywhere, change it in **one shared place**, not on each element separately.

              If you want a different button colour, change your **primary button colour** where it's defined for the whole app, rather than recolouring buttons one by one. Editing them individually is how an app slowly drifts out of step with itself, some buttons one shade, some another.
          subtitle: The consistency principle
        - type: quiz-question
          title: 'Quiz: Keeping it consistent'
          content:
            question: Dalmie decides every primary button in the app should be teal instead of blue. There are nine of them across different pages. What's the best approach?
            options:
              - Find and recolour each of the nine buttons one by one
              - Make a new teal button and delete the old ones
              - Ask Sarah which buttons she uses most and only change those
              - Change the primary button colour in the one shared place it's defined
            explanation: |-
              Shared styles are defined once and used everywhere. Changing that single definition updates all nine buttons at once and keeps them identical.

              Recolouring them individually is slow and almost guarantees that one gets missed and ends up the odd one out.
            correctAnswer: 3
        - type: text
          title: Dalmie makes two changes
          content:
            body: |-
              Remember the placeholder image Dalmie found in Challenge 2, in `src/components/Hero.tsx`? Now she actually swaps it. She opens that file on GitHub, updates the image it points to, checks the diff, and commits with the message *Replace placeholder hero image with book club photo*.

              Then she removes a testimonials section Lovable added that she never asked for. She finds it by searching for a line of text from that section, deletes that block of code, checks the diff to be sure she only removed that section, and commits again.
          subtitle: Swap an image, remove a section
        - type: text
          title: Check it landed, then publish
          content:
