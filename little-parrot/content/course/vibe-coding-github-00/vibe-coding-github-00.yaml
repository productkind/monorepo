    - steps:
        - type: text
          title: Look what you can do now
          content:
            body: |-
              You've built a workspace, run your app locally, changed copy and icons, and put an AI agent to work, all without spending credits. That's a real shift in what you can do alone.

              The last piece is knowing **which tool to reach for**, so you always pick the easy path.
          subtitle: One simple rule to finish
        - type: text
          title: The rule of thumb
          content:
            body: |-
              It comes down to one question: does the change touch what people **see**, or what happens **behind the scenes**?

              **What people see**, the words, icons, colours, and layout, is yours to change for free on your computer:
              - **By hand in VS Code** for small things you can change directly: a word, an icon's name, a colour.
              - **With Copilot** when it needs actual code written, not just a word swapped. You describe it, and the agent writes the code for you.

              **Behind the scenes**, the part that saves data, handles logins, sends emails, or takes payments, lives in the **backend that Lovable manages for you** (it's called **Lovable Cloud**). Your local copy talks to that backend but can't safely change it, so those changes belong **in Lovable**. Brand-new features usually need backend work, which is why they belong there too.

              Want this on a single page? [**Which Tool for Which Change**](https://littleparrot.app/nest/toolkit/8ce77728-a3c5-4c45-af70-b621f35a7bd0) in the Toolkit captures the whole rule, ready to glance at whenever you're deciding.
          subtitle: What people see, or behind the scenes?
        - type: text
          title: Not sure which side it's on? Ask Lovable
          content:
            body: |-
              When you can't tell whether a change touches the backend, ask Lovable itself. In its **Plan mode** (one credit, and it changes nothing), describe what you want and ask whether it would touch the backend. The answer tells you straight away: if it does, build it in Lovable; if it doesn't, you can make it yourself with Copilot, for free.
          subtitle: Plan mode answers, for one credit
        - type: text
          title: Keeping everything in sync
          content:
            body: |-
              A couple of habits keep things smooth. When you sit back down to work, start your app again with `npm run dev` to see it in your browser (at `localhost:8080`), then **pull** in VS Code to grab anything that changed in Lovable since last time. This pull is the big one, it keeps your copy in step so your work and Lovable's never clash. Then when you're done with your change, **commit and push** in VS Code, and **Publish** in Lovable when you want your website visitors to see it.

              And **if a change ever goes wrong**, you can roll back: in Lovable's **chat**, scroll to the version from just before your change and click its **revert** option.
            imageUrl: /courses/vibe-coding-github-00/lovable-revert.webp
          subtitle: Pull, push, publish, and revert if needed
        - type: quiz-question
          title: 'Quiz: Which tool?'
          content:
            question: Dalmie has four jobs this afternoon. Which one should she take back to Lovable, rather than do in VS Code or with Copilot?
            options:
              - Fix a typo in the footer
              - Swap a heart icon for a star
              - Add a whole new "members can RSVP to events" feature
              - Add a short "no books yet" message to an empty list
            explanation: |-
              An RSVP feature has to remember who's coming, that's backend work, and brand-new features like this are exactly what Lovable is built for. The typo and the icon are quick hand edits, and the empty-list message is a tidy Copilot job, all things people see.

              Right tool, right job: that's how you keep both your credits and your time.
            correctAnswer: 2
