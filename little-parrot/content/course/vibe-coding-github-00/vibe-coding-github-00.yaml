    - steps:
        - type: text
          title: Icons are code
          content:
            body: |-
              Here's something surprising: most icons in your app are tiny pieces of code from an icon set (Lovable apps usually use one called **Lucide**).

              That's good news. It means you can swap an icon by changing its name in the code, in two places, as you'll see.
          subtitle: A small, satisfying change
        - type: text
          title: Find the icon in your code
          content:
            body: |-
              An icon usually shows up in the code as its name in angle brackets, like `<Heart />` for a heart or `<Trash />` for a bin.

              To find it, use the **neighbour trick**: search for a bit of text right next to the icon (a button label or heading nearby), open that file, and the icon's name will be close by. Icons sit right alongside the words they belong to.

              You'll actually spot the icon's name **twice** in the file: once at the very top, in an `import` line (the file's list of which icons it borrows from the set), and once at the spot where it's shown.
          subtitle: Search for its neighbour
        - type: text
          title: Swap it for another
          content:
            body: |-
              Browse the icon set at **lucide.dev** to find one you like, every icon there shows its name. Then change the name in **both places** in the file:

              1. In the `import` line at the top: `import { Heart } from "lucide-react"` becomes `import { Star } from "lucide-react"`.
              2. At the spot where it's shown: `<Heart />` becomes `<Star />`.

              Save, and your app updates instantly in the browser. If you change one place but forget the other, your app shows an error naming the icon, that's your cue to fix the other spot. And check the spelling and capitalisation against lucide.dev, the names have to match exactly.
            imageUrl: /courses/vibe-coding-github-00/lucide-swap.gif
          subtitle: Change one word, see it change
        - type: quiz-question
          title: 'Quiz: Changing an icon'
          content:
            question: Dalmie wants to change the little heart icon next to each book to a star. What's the most reliable way to do it in VS Code?
            options:
              - Upload a star image and hope it replaces the heart
              - Find the heart in the code (it's near the book title) and change its name to the star's name
              - Ask Lovable's AI to redesign every book card
              - Delete the heart and leave a gap
            explanation: |-
              An icon is code, so you change its name, from the heart's name to the star's name (you'll find both on lucide.dev), in both places it appears: the `import` line at the top and the spot where it's shown. Searching for nearby text, like the book title, lands you right next to it.

              No credits, and it updates the moment you save.
            correctAnswer: 1
        - type: free-text-exercise
          title: Swap an icon
          content:
            description: |-
              Find an icon in your app you'd like to change. Use the neighbour trick to locate it in VS Code, then swap its name for another from lucide.dev and save.

              Tell us which icon you changed, and what you changed it to.
            placeholder: e.g. Changed the heart on each book to a bookmark
            systemPrompt: 'You are a friendly mentor for a curious non-technical app builder. The learner describes an icon swap they made in VS Code using the Lucide icon set. Respond warmly in British English (max 4 short bullet points): affirm the swap, remind them the name must change in both places (the import line at the top of the file and the spot where the icon is shown), and that if the app shows an error or the icon does not appear, the name is probably missed in one place or misspelled, they can check it on lucide.dev. Celebrate that icons are just code they can change for free. Do not use em dashes. End encouragingly.'
            checkerPrompt: 'Check whether the learner describes swapping one icon for another. Flag it only if they describe something clearly unrelated to changing an icon. This is their answer:'
        - type: challenge-end
          title: "Icons hold no mystery for you now ⭐"
          content:
            description: You found an icon in your code and swapped it.
            nextModule: "**Next challenge:** You've made changes by hand. Now you'll get some help, GitHub Copilot, a free AI agent living right inside VS Code, for the changes that are trickier to do alone."
            subDescription: |-
              Knowing that icons are just code is a small superpower. Names like `<Star />` and `<Bell />` aren't scary, they're switches you can flip.

              **Reusable tool:** keep **lucide.dev** bookmarked, it's your menu of every icon name you can use.
