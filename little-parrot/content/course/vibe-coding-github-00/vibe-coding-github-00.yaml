    - steps:
        - type: text
          title: Look what you can do now
          content:
            body: |-
              You've built a workspace, run your app locally, changed copy and icons, and put an AI agent to work, all without spending credits. That's a real shift in what you can do alone.

              The last piece is knowing **which tool to reach for**, so you always pick the easy path.
          subtitle: One simple rule to finish
        - type: text
          title: The rule of thumb
          content:
            body: |-
              **Edit in VS Code** for small, specific changes you can point to: copy, an icon, a colour, a tidy-up. Free and instant.

              **Ask Copilot** when a change is fiddly to do by hand but still well defined. Free, and you review its work.

              **Prompt Lovable** for big, new things: a whole new feature or page, or anything you'd struggle to describe to Copilot. That's worth the credits.
          subtitle: VS Code, Copilot, or Lovable
        - type: text
          title: One thing that still belongs in Lovable
          content:
            body: |-
              **Uploading images** is the exception. Lovable now stores your images centrally, so the reliable way to add or swap a photo is to **upload it in Lovable**, not in your code.

              Everything else, the words, the icons, the small fixes, is yours to do for free in VS Code.
          subtitle: Images go through Lovable
        - type: text
          title: Keeping everything in sync
          content:
            body: |-
              Two habits keep things smooth. Before you start editing, **pull** in VS Code to grab anything Lovable changed since last time. When you're done, **commit and push**, then **Publish** in Lovable when you want visitors to see it.

              And if a change ever goes wrong, you can roll back: in Lovable's **chat**, scroll to the version from just before your change and click its **revert** option.
          subtitle: Pull, push, publish, and revert if needed
        - type: quiz-question
          title: 'Quiz: Which tool?'
          content:
            question: Dalmie has four jobs this afternoon. Which one should she take back to Lovable, rather than do in VS Code or with Copilot?
            options:
              - Fix a typo in the footer
              - Swap a heart icon for a star
              - Add a whole new "members can RSVP to events" feature
              - Add a short "no books yet" message to an empty list
            explanation: |-
              A whole new feature, with new screens and logic, is exactly what Lovable's AI is built for, and worth the credits. The typo and the icon are quick hand edits; the empty-list message is a tidy Copilot job.

              Right tool, right job: that's how you keep both your credits and your time.
            correctAnswer: 2
        - type: free-text-exercise
          title: Your one change this week
          content:
            description: |-
              Let's turn all this into momentum. What's the one change you'll make in VS Code this week instead of spending a Lovable credit?

              Name the change, and whether you'll do it by hand or with Copilot.
            placeholder: e.g. This week I'll fix the wording on my sign-up button by hand, and ask Copilot to add an empty-list message
            systemPrompt: 'You are a warm, encouraging mentor for a curious non-technical app builder finishing this course. The learner names one change they will make in VS Code this week. Respond in British English (max 4 short bullet points): affirm it suits a hand edit or Copilot if it is small or well defined, or gently suggest Lovable if it is a big new feature or an image upload. End with a genuine, specific note of encouragement about how far they have come. Do not use em dashes.'
            checkerPrompt: 'Check whether the learner names a specific change suited to editing in VS Code or with Copilot. If it is a big new feature or an image upload, note gently that Lovable may suit it better. This is their plan:'
