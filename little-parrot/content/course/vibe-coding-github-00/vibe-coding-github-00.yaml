    - steps:
        - type: text
          title: You've got two tools now
          content:
            body: |-
              Look how far you've come. You can edit copy, find any element, read your repo, and make visual changes, all on GitHub, all without spending a credit.

              Now you have two ways to change your app: editing on GitHub, and prompting Lovable. This final challenge gives you a simple rule for choosing well, and a steady habit to keep everything in sync.
          subtitle: The last piece is knowing which to use
        - type: text
          title: The decision in one line
          content:
            body: |-
              Here's the rule of thumb:

              **Edit on GitHub** for small, specific changes you can point to: copy, an image, a colour, removing an element. Reliable and free.

              **Prompt Lovable** for new features and bigger structural work: a new page, a booking system, anything that needs new logic built. That's what the AI is brilliant at, and what's worth spending credits on.
          subtitle: Small and specific vs new and big
        - type: text
          title: Why this split works
          content:
            body: |-
              Editing on GitHub is precise: you change one known thing and nothing else. That's perfect for tweaks, and it doesn't cost credits or risk the AI rewriting more than you asked.

              Building something genuinely new is where the AI earns its keep. Trying to hand-build a whole feature on GitHub would be slow and frustrating, the wrong tool for the job. Spend your credits where they create the most value.
          subtitle: Right tool, right job
        - type: quiz-question
          title: 'Quiz: Which tool?'
          content:
            question: Over one afternoon Dalmie wants to do four things. Which one should she prompt Lovable for, rather than edit on GitHub?
            options:
              - Fix a typo in the page footer
              - Add a brand-new "members can RSVP to meetings" feature
              - Change the heading colour to match the new logo
              - Remove a duplicate paragraph on the about page
            explanation: |-
              An RSVP feature is new functionality: new screens, new data, new logic. That's exactly what the AI is built for, and worth the credits.

              The other three are small, specific changes you can point to, which makes them ideal for a quick, free, reliable edit on GitHub.
            correctAnswer: 1
        - type: text
          title: Keep GitHub and Lovable in sync
          content:
            body: |-
              Changes flow both ways between GitHub and Lovable, and the sync takes a few seconds, not an instant. So after you commit, give it a moment before assuming something went wrong.

              And remember the final step: syncing updates your project, but your visitors only see changes after you press **Publish** in Lovable.
          subtitle: A few seconds, then publish
        - type: text
          title: One small habit to keep
          content:
            body: |-
              The single habit that keeps all of this calm: **make one change at a time, and check it landed before the next one.**

              One small commit, a quick look to confirm it synced, then onward. It's the same reason small commits are easy to undo: when something does go sideways, you'll know exactly which change to look at.
          subtitle: Small steps, checked as you go
        - type: free-text-exercise
          title: Your one change this week
          content:
            description: |-
              Let's turn this into momentum. What's the one change you'll make on GitHub this week instead of prompting Lovable?

              Name the change, and whether you'll find it by searching or with the Inspect trick.
            placeholder: e.g. This week I'll swap the placeholder profile image, found with Inspect, and commit it.
            systemPrompt: 'You are a warm, encouraging GitHub mentor for a non-technical app builder finishing a short course. The learner names one change they will make on GitHub this week. Respond in British English (max 4 short bullet points): affirm that it is a good fit for a GitHub edit if it is small and specific, or gently suggest prompting Lovable instead if it is a big new feature. Confirm their plan to find it by search or Inspect. Do not use em dashes. End with a genuine, specific note of encouragement about what they have learned.'
            checkerPrompt: 'Check whether the learner has named a specific, small change suited to editing on GitHub (copy, image, colour, removing an element). If it is a large new feature, note gently that prompting Lovable may suit it better. This is their plan:'
