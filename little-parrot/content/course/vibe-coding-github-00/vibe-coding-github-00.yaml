course:
  id: 0c2b1b82-d451-4499-b152-c58d8f58ff2b
  cover: /courses/vibe-coding-github-00/cover.gif
  title: 'Save Lovable Credits: Edit Your App Like a Developer'
  note: ''
  learningOutcomes:
    - Make small changes to your app yourself, without spending Lovable credits
    - Set up a workspace on your own computer that works for every app, and any document, you'll work on with AI
    - Run your app on your own computer and watch every change appear the moment you make it
    - Save your changes to GitHub and publish them to your live app, with a version history you can roll back any time
    - Make bigger changes by describing them to GitHub Copilot, then reviewing its work
    - 'Pick the cheapest, easiest route for any change: yourself, your AI agent, or Lovable'
  challenges:
    - steps:
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-00.png
            altText: |-
              A dalmatian dog (called Dalmie) wearing a red shirt sits at a desk with a laptop,
              holding a small list. A credit counter on the screen is ticking down. Dalmie says,
              "A few more fixes for my Book Club Organiser app... and there go my credits again."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-01.png
            altText: |-
              Dalmie looks at the laptop, where the credit counter is now nearly empty, and taps a
              paw to her chin, thinking. A speech bubble reads, "There must be a way to make these
              small changes for free."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-02.png
            altText: |-
              A brightly coloured bird (called Little Parrot) lands on the desk beside Dalmie,
              smiling warmly. The bird says, "There is! Let's set up your own workspace,
              right on your computer, Dalmie."
        - type: comic
          content:
            imageUrl: /comics/vibe-coding-github-00/panel-03.png
            altText: |-
              Dalmie leans towards the laptop with bright, excited eyes, a code editor window
              glowing on the screen. The dog says, "My own setup? Now that sounds fun."
        - type: text
          title: What you're about to set up
          content:
            body: |-
              In this course you'll build a **workspace on your own computer**, the same kind of setup people use to build real software. With it, you can change your app as much as you like **without spending a single Lovable credit**.

              You'll be able to:
              - **fix copy** and **swap icons** yourself
              - make **bigger changes** by describing them to an **AI agent**
              - save your work to GitHub, which flows straight back into Lovable

              No more watching credits drain on tiny tweaks.
          subtitle: A quick look at where we're heading
        - type: text
          title: This is the fun part
          content:
            body: |-
              If setting up a **coding workspace** sounds like a big leap, here's the good news: it's mostly downloading a few free tools and following along, and you'll have your app running on your own computer before you know it.

              You're not just saving credits. You're learning the **real setup** that builders and AI agents use. That's a genuinely exciting place to be, and it opens doors well beyond this one app.
          subtitle: You're learning the real thing
        - type: text
          title: What GitHub is, and why it saves credits
          content:
            body: |-
              [**GitHub**](https://github.com/) is the place where **your app's code is stored**. When you build with Lovable, every change is saved to a connected GitHub repository (think of it as the folder that holds all the code for your app). GitHub also keeps a full history of every change, so nothing is ever lost.

              The credit-saving idea is simple: a change **you** make outside of Lovable and save costs **no credits**, while asking Lovable to make it does. Once your workspace is set up, most small changes become free.
            imageUrl: /courses/vibe-coding-github-00/octocat.webp
          subtitle: Your app's code has a home
        - type: text
          title: You've done version control before
          content:
            body: |-
              That full history of changes has a name: **version control**, and you've almost certainly used it before, even if no one called it that.

              Google Docs and Microsoft Office keep a history of your document, so you can look back at earlier versions and restore them. GitHub does the same for your app's code. Each saved change gets a short name, so you can see what changed at a glance.

              Plenty of people use version control for **documents, not only code**. Some even write whole books this way. It's a friendly idea wearing a technical name.
          subtitle: A familiar idea with a new name
        - type: quiz-question
          title: 'Quiz: Looking ahead to AI agents'
          content:
            question: You plan to try an AI agent like GitHub Copilot or Claude Code soon, for your app and maybe even for writing documents like your social media calendar. How will GitHub help you?
            options:
              - It only helps with your app's code, not with documents like your social media calendar
              - You can track each version of your files and see exactly what changed
              - You can reach your files from anywhere, not just one laptop
              - Honestly it won't, since the agent handles everything itself and you can just trust it
            explanation: |-
              With your files in GitHub, you can track every version and see exactly what changed, which is perfect for spotting what an agent did, and you can reach your work from anywhere, not just one laptop.

              And this isn't only for code: documents like your social media calendar get the same version history (remember, some people write whole books this way). Agents will be a big part of your future, and GitHub is the perfect home for all your work with them.
            correctAnswer: [1, 2]
        - type: text
          title: First, connect GitHub to Lovable
          content:
            body: |-
              Before any of this works, your Lovable project needs to be connected to GitHub. You only do this once.

              In Lovable, open **Project settings → Git → GitHub** (or use the **+** menu in the chat), click to connect, and authorise the Lovable GitHub app. Lovable then creates a repository for your project and keeps it in sync.

              The steps are in [**Connect Your App to GitHub**](https://littleparrot.app/nest/toolkit/5fcda78e-1847-47fc-bff8-b02beececa14), the guide that comes with this course. Once you're connected, come back here.
            imageUrl: /courses/vibe-coding-github-00/connect-github.webp
          subtitle: A one-time connection
        - type: reflection
          title: A glimpse of what's coming
          content:
            description: |-
              Picture how you work with a chat assistant like ChatGPT or Claude.ai today: you ask, it answers, and you copy-paste the result into your document, over and over.

              An **AI agent on your computer** skips all of that. It opens your files and **makes the changes directly**, in your app's code or in any document you keep in your workspace. And with version control, **you see exactly what it changed**, line by line, and keep only what you like.

              **Think ahead:** what would you hand to an AI agent first? A change to your app, or a document you keep reworking?
            placeholder: Type your answer here...
            subDescription: Whatever you wrote down, the workspace you're about to set up is exactly where that becomes possible. Keep it in mind as you go.
        - type: challenge-end
          title: "Your app is connected and you're ready to build! \U0001F517"
          content:
            description: Your app's code now lives on GitHub, with every change tracked and nothing ever lost.
            nextModule: "**Next challenge:** Time to build your workspace! You'll set up VS Code, the editor that builders and AI agents work in every day, plus the two tools that make your app run on your computer. All free, and once it's set up you'll find yourself using it in all sorts of ways, well beyond this one app."
            subDescription: |-
              This was the foundation, and you've laid it well: you know where your app's code lives, why editing it yourself costs nothing, and what an AI agent will soon be able to do right there in your files. Everything from here builds on that.

              **Reusable tool:** [**Connect Your App to GitHub**](https://littleparrot.app/nest/toolkit/5fcda78e-1847-47fc-bff8-b02beececa14) has the full connection steps, in case you need to redo it for another app.
      title: Why Edit on Your Own Computer
      isFree: true
      skills:
        - GitHub
        - Version Control
        - Vibe Coding
      description: See how editing your app yourself saves Lovable credits, and connect your project to GitHub.
      completionTime: 9:00
    - steps:
        - type: text
          title: Let's build your workspace
          content:
            body: |-
              Time to set up your computer with three free tools. Don't worry about understanding them deeply yet, you just need them installed and ready.

              - **VS Code**, the editor you'll write changes in
              - **Node.js**, which understands your code, and lets your app run on your computer
              - **Git**, the version-control engine that talks to GitHub

              And remember, you're not doing this alone. If you get stuck at any step, ask in our **Discord community**, we're there and happy to help. You can join through the link in [My Learning](https://littleparrot.app/nest/my-learning).
          subtitle: Three free tools, one workspace
        - type: text
          title: VS Code, your editor
          content:
            body: |-
              [**VS Code**](https://code.visualstudio.com/) (Visual Studio Code) is a free code editor made by Microsoft. It's where you'll open your app's files and make changes, and where you can also give instructions to your AI agent, Copilot.

              Download it from [**code.visualstudio.com**](https://code.visualstudio.com/).

              - On **Mac**, open the download and drag **Visual Studio Code** into your **Applications** folder.
              - On **Windows**, run the installer and click through it.

              When you open VS Code for the first time, it asks you to **sign in**. Choose **Sign in with GitHub**. Do it now and it's done for good: your commits and your AI agent in the later challenges will just work, and you can focus on the fun part.
            imageUrl: /courses/vibe-coding-github-00/vscode.webp
          subtitle: Where you'll make your changes
        - type: text
          title: Node.js, so your app can run
          content:
            body: |-
              **Node.js** is what lets your app run on your computer, the same way it runs for your website visitors. It comes with **npm**, a helper that fetches the building blocks your app needs.

              Download it from [**nodejs.org**](https://nodejs.org/), run the installer, and click through the steps. That's it, you won't open Node.js directly, it just needs to be there.
            imageUrl: /courses/vibe-coding-github-00/nodejs.webp
          subtitle: The engine that runs your app
        - type: text
          title: Meet the terminal
          content:
            body: |-
              Before the last tool, let's meet the place you'll install it from: the **terminal**, a program where you talk to your computer by typing. You type an instruction, press Enter, and the computer does it and replies in text. No buttons, no menus, just a conversation.

              It looks bare at first, but it's the tool builders and AI agents use all day, and you'll be comfortable in it sooner than you think. It's also where you can automate the repetitive jobs you do on your computer. Everything you do on your machine, it's possible to do from the terminal, and that's what makes it so powerful.

              On a **Mac**, open it by pressing **Cmd + Space**, typing *Terminal*, and pressing Enter. On **Windows**, you'll get a terminal called **Git Bash** in a moment, as part of the next install.
            imageUrl: /courses/vibe-coding-github-00/terminal.webp
          subtitle: A conversation with your computer
        - type: text
          title: Git, the version-control engine
          content:
            body: |-
              **Git** is the engine behind version control. It's what saves your changes and sends them to GitHub.

              Installing it works a little differently on Mac and Windows, so the next two steps split by computer. Follow the one for your machine, and skip the other.
          subtitle: What talks to GitHub
        - type: text
          title: Install Git on a Mac
          content:
            body: |-
              *Mac only, Windows users can skip to the next step.*

              On a **Mac**, you install Git from the terminal you just opened, in three steps:

              1. Install [**Homebrew**](https://brew.sh/), a free helper that installs builder's tools for you: copy its one-line install command from [brew.sh](https://brew.sh/), paste it into the Terminal, and press Enter.
              2. When it finishes, type `brew install git`, press Enter, and Git is on your computer.
              3. Finally, type `brew install --cask git-credential-manager`, press Enter. This is the helper that lets you sign into GitHub through a simple browser window the first time you fetch your app. It saves you wrestling with passwords and tokens later on.

              Two things may surprise you while Homebrew installs, and both are completely normal. It asks for your **Mac password** (the one you log in with): type it and press Enter, and don't worry that the letters don't appear as you type, that's the terminal keeping it private. A box may also pop up asking to install Apple's **command line developer tools**, just click **Install** and let it finish. They're a free part of macOS that Homebrew builds on.
            imageUrl: /courses/vibe-coding-github-00/install-homebrew.webp
          subtitle: Homebrew, Git, and the sign-in helper
        - type: text
          title: Install Git on Windows
          content:
            body: |-
              *Windows only, Mac users can skip ahead.*

              On **Windows**, download the installer from [**git-scm.com**](https://git-scm.com/) and run it, clicking through and accepting the defaults. It includes two things you'll use, both selected for you:

              - **Git Bash**, the friendly terminal window you'll use to run your app.
              - **Git Credential Manager**, which lets you sign into GitHub through a simple browser window the first time you fetch your app, instead of wrestling with passwords and tokens.

              Because both are ticked by default, you can just go through the steps.
          subtitle: One installer, with Git Bash included
        - type: quiz-question
          title: 'Quiz: Your first command'
          content:
            question: Open your terminal (Terminal on Mac, Git Bash on Windows), type ls, and press Enter. Look closely at what appeared. What do you think ls just did?
            options:
              - Listed the files and folders inside the folder you're standing in
              - Listed every file stored anywhere on your computer
              - Showed the apps that are open right now
              - Showed your most recently opened documents
            explanation: |-
              `ls` is short for list: it shows what's inside the folder your terminal is standing in. Spot the familiar names, Desktop, Documents, Downloads? That's because a fresh terminal starts in your home folder.

              Its sibling `pwd` tells you where you're standing. With those two, you can find your way around your computer without opening a single window.
            correctAnswer: 0
        - type: text
          title: Check it all worked
          content:
            body: |-
              Let's make sure the tools are ready. Open your terminal: on a **Mac**, open the **Terminal** app; on **Windows**, open **Git Bash**.

              Type `node -v` and press Enter, then `git -v` and press Enter. If each shows a version number (like `v23.11.0`), you're all set. If one says `command not found`, that tool needs reinstalling, [**Builder's Workspace Setup**](https://littleparrot.app/nest/toolkit/928f6d38-4da5-44a5-b856-4f0479c24beb) covers what to do.

              Once you've got each version number that means you're ready for the next challenge.
            imageUrl: /courses/vibe-coding-github-00/terminal-check.webp
          subtitle: A quick confidence check
        - type: challenge-end
          title: "Your workspace is built! \U0001F6E0️"
          content:
            description: VS Code, Node.js, and Git are installed and ready.
            nextModule: "**Next challenge:** The big moment, you'll bring your app's code onto your computer and watch it run. Seeing your own app come to life on your screen is truly a thrill."
            subDescription: |-
              That's the hardest setup behind you, and you only ever do it once. Everything from here is the fun part: actually changing your app.

              **Reusable tool:** [**Builder's Workspace Setup**](https://littleparrot.app/nest/toolkit/928f6d38-4da5-44a5-b856-4f0479c24beb) has the full install steps and the version-check commands, for when you set up a new computer.
      title: Set Up Your Workspace
      isFree: false
      skills:
        - VS Code
        - Node.js
        - Git
        - Terminal
      description: Install the three free tools you need to edit and run your app on your own computer.
      completionTime: 12:00
    - steps:
        - type: text
          title: Bring your app to life locally
          content:
            body: |-
              Here's the moment your workspace pays off: you'll copy your app's code onto your computer and run it, so you can see every change instantly.

              The plan has three parts: find your place in the terminal, fetch your app's link from GitHub, then bring your app's code to your computer with a few short commands.
          subtitle: From GitHub to your computer
        - type: text
          title: Where are you standing?
          content:
            body: |-
              Start by opening your terminal (**Terminal** on Mac, **Git Bash** on Windows). Your terminal is always standing in a folder, and commands that work with files, like the ones you're about to run, act right where you're standing. So it's worth a quick glance to check where that is. 
              
              Look at the text the terminal prints every time it's ready for your next command, ending where your cursor blinks. That text is called the **prompt** (it's prompting you to type), and tucked inside it is your current location.

              - In **Git Bash** on Windows, the prompt takes two lines. The first line ends with your location, for example `dalmie@LAPTOP MINGW64 ~`, and you type on the line below, next to the `$`.
              - On a **Mac**, the prompt is a single line. Your location sits just before the `%` sign, for example `dalmie@Mac ~ %`, and you type right after it.
            imageUrl: /courses/vibe-coding-github-00/terminal-prompt.webp
          subtitle: Your terminal always tells you
        - type: text
          title: And right now, you're home
          content:
            body: |-
              See that `~` in both prompts above? It's shorthand for your **home folder**, the one that holds your Desktop, Documents, and Downloads. A freshly opened terminal always starts there, and that's exactly where your app's new home will go in a moment.

              (Whenever you want the full address spelled out, type `pwd` and press Enter, it prints the folder you're currently in.)
          subtitle: The ~ is your home folder
        - type: text
          title: Get your app's link
          content:
            body: |-
              Next, your app's link. On **GitHub**, open your project, click the green **Code** button, and copy the **HTTPS** web address (it ends in `.git`).

              That link tells your computer exactly which app to fetch. With your place found and your link copied, you have everything you need.
            imageUrl: /courses/vibe-coding-github-00/github-clone-url.webp
          subtitle: Copy it from GitHub
        - type: text
          title: Copy the code onto your computer
          content:
            body: |-
              From your terminal, make a tidy home for your app. Type this command, then press Enter:

              ```
              mkdir Projects
              ```
              `mkdir` makes a folder called *Projects*. (The name and the place are entirely up to you, we use a *Projects* folder in the home folder because it's easy to find, and it gives your future apps a home too.)

              Then step inside it by typing this and pressing Enter:

              ```
              cd Projects
              ```

              `cd Projects` steps into your new folder. 
              
              Now type `git clone` and paste your link from GitHub, like this:

              ```
              git clone https://github.com/yourname/your-app.git
              ```

              Press Enter. The very first time, GitHub needs to check it's really you: a **sign-in window opens in your browser**, click to **authorise**, and Git remembers you from then on, so you only do this once. (It's the same GitHub account you connected Lovable to.)

              Git then downloads your whole app's code into a new folder inside *Projects*. Step into that folder with `cd your-app` (use your app's folder name).
            imageUrl: /courses/vibe-coding-github-00/terminal-clone.webp
          subtitle: This is called "cloning"
        - type: text
          title: Install the building blocks
          content:
            body: |-
              Your app relies on lots of ready-made pieces. Fetch them all with one command:

              ```
              npm install --no-save
              ```

              The `--no-save` part is important: it tells npm to fetch everything **without editing your app's ingredient list** (a file called `package-lock.json` that Lovable manages). If that file changes, Lovable can get confused, so we leave it exactly as Lovable wrote it.

              This can take a minute or two the first time, you'll see lots of text scroll past, which is completely normal. A few lines starting with `npm warn` are perfectly fine too: warnings are just notes, not problems. When it settles, the pieces are in place.
            imageUrl: /courses/vibe-coding-github-00/npm-install-windows.webp
          subtitle: One command, then a short wait
        - type: text
          title: If the install complains
          content:
            body: |-
              Sometimes the install stops with `Could not resolve dependency`, a long report that ends with `Fix the upstream dependency conflict`. Don't worry, it's common and quick to fix: it means the app's own ingredient list has gone a little out of date.

              The fix happens in Lovable, send it the prompt:

              ```
              Check if all my dependencies are up-to-date. If not, update them.
              ```

              Let it finish. Then fetch the freshened code of your app onto your computer by typing `git pull` in your terminal, while standing in your app's folder (e.g., book-club-pick), and run the install once more.
            imageUrl: /courses/vibe-coding-github-00/npm-install-fix-dep.webp
          subtitle: One prompt in Lovable fixes it
        - type: text
          title: Start it up
          content:
            body: |-
              So far, your app's code is a folder of files sitting on your computer. To use it, those files need to be **run**: brought to life so the app responds when you click around.

              Normally, Lovable's computers (servers) do the running, and your visitors reach the app over the internet. Now your own computer will run a **private copy**, just for you. Type this in your terminal and press Enter:

              ```
              npm run dev
              ```

              You'll see a local web address appear, usually `http://localhost:8080`. Paste it into your browser. 
              
              **Your app is now running on your own computer.** 🎉 
              
              The address gives it away: **localhost** literally means "this computer". Only you can see this copy. It's your sandbox stage, where you can try anything, while the published app your visitors use stays untouched.

              Leave this terminal window open while you work. It's running your app the whole time, and it will refresh the moment you save your change in VS Code.
            imageUrl: /courses/vibe-coding-github-00/npm-run-dev-windows.webp
          subtitle: Your app, live on your computer
        - type: text
          title: If you see an error instead
          content:
            body: |-
              Sometimes the app doesn't start, and the terminal prints an error. Take a breath: **the error is the terminal trying to help**, it names exactly what's missing.

              The one you're most likely to meet: `The following dependencies are imported but could not be resolved` 
              
              It appears when you've been building in Lovable, which added new building blocks your computer doesn't have yet. Run the install once more to add the missing dependencies:

              ```
              npm install --no-save
              ```

              Then start your app again:

              ```
              npm run dev
              ```
            imageUrl: /courses/vibe-coding-github-00/npm-missing-deps.webp
          subtitle: Things break sometimes (and that's okay)
        - type: text
          title: Windows only, the runtime Vite needs
          content:
            body: |-
              One more, and it's **Windows only**. If your app won't start and the error mentions a **missing `.dll`** (often `VCRUNTIME140.dll`) or **Visual C++**, you're just missing a small, free piece from Microsoft.

              The tool that runs your app, **Vite**, relies on Microsoft's **Visual C++ runtime**. Many Windows computers already have it. If yours doesn't, you'll add it in about two minutes:

              1. Open Microsoft's official download page: [Latest supported Visual C++ Redistributable](https://learn.microsoft.com/en-us/cpp/windows/latest-supported-vc-redist?view=msvc-170#latest-supported-redistributable-version). Under **Latest supported redistributable version**, download the **X64** version (the right one for almost every Windows computer).
              2. Run the installer and click through it. Then close and reopen your terminal.

              Start your app again with `npm run dev` and you're away. (On a Mac you'll never see this, the runtime is built in.)
            imageUrl: /courses/vibe-coding-github-00/install-cpp-windows.webp
          subtitle: A small, free piece from Microsoft
        - type: text
          title: For any other error
          content:
            body: |-
              Errors will pop up now and then, that's normal, and you won't need to memorise a fix for each one.

              For anything beyond the two before, on any computer, you'll soon have the perfect helper: **GitHub Copilot**, the AI agent you'll set up in VS Code later in this course. It reads the error and your files right where they are, and can even install what's missing for you. No copy-pasting into a chat assistant and ferrying answers back, that's the power of an AI agent with access to your files.
          subtitle: An AI agent will soon have your back
        - type: text
          title: Stopping, and picking up again
          content:
            body: |-
              Your app keeps running for as long as that terminal window stays open. When you're done for now, you can **stop it**: click the terminal, then press **Ctrl + C** (on a Mac too, not Cmd). Or simply close the window.

              Next time you want to work on your app, there's no cloning or installing again, those were one-time jobs. You bring it back to life in two steps:

              1. Open your terminal and step into your app's folder, for example `cd Projects/book-club-pick` (use your own folder name).
              2. Type `npm run dev`, press Enter, and open `localhost:8080` in your browser again.

              That's your whole start-up from now on. (If you'd been building in Lovable since last time and the app complains that something's missing, run `npm install --no-save` once more first, then `npm run dev`.)
          subtitle: Your app, on your own schedule
        - type: quiz-question
          title: 'Quiz: Who can see it?'
          content:
            question: Dalmie's app is running at `http://localhost:8080` on her laptop. She excitedly texts the address to Sarah, who opens it on her own laptop at home. What will Sarah see?
            options:
              - Dalmie's app, since the address is the same everywhere
              - Dalmie's app, but a little slower because it travels further
              - Nothing of Dalmie's, because localhost points to Sarah's own computer
              - The published version of Dalmie's app
            explanation: |-
              `localhost` means "this computer" for whoever types it, so on Sarah's laptop it points at Sarah's own computer, where nothing is running. Dalmie's local copy is hers alone.

              That's the beauty of it: a completely private sandbox stage. When Dalmie wants Sarah to see her changes, she'll push them to GitHub and press Publish in Lovable, which is exactly what's coming up.
            correctAnswer: 2
        - type: challenge-end
          title: "Your app is running on your computer! \U0001F389"
          content:
            description: You cloned your app, installed its pieces, and started it locally.
            nextModule: "**Next challenge:** Now the part you've been waiting for, making a real change. You'll edit a piece of copy in your app's code and watch it update on your screen instantly, then save it back to Lovable."
            subDescription: |-
              This is a real milestone. Most people never see their own app running on their computer, and you just did it.

              **Reusable tool:** [**Run Your App on Your Computer**](https://littleparrot.app/nest/toolkit/6cdb24bd-b8c1-4d3b-8154-bbfd703da608) lists the three commands (`git clone`, `npm install --no-save`, `npm run dev`) so you never have to remember them.
      title: Run Your App on Your Computer
      isFree: false
      skills:
        - Cloning
        - Terminal
        - Running Locally
      description: Clone your app's code, install its pieces, and run it on your own computer with three commands.
      completionTime: 14:00
    - steps:
        - type: text
          title: Now for the fun part
          content:
            body: |-
              Your app is running on your computer. Let's change something and watch it update, for free, in seconds.

              We'll start with changing a piece of **website copy**.
          subtitle: Edit, and see it instantly
        - type: text
          title: Open your project in VS Code
          content:
            body: |-
              Open **VS Code**, choose **File → Open Folder**, and pick the folder Git created when you cloned your app. You'll see all your app's files listed down the left side.

              It can look busy at first. You don't need to understand it all, you only ever touch the small part you came for.
            imageUrl: /courses/vibe-coding-github-00/vscode-open-folder.webp
          subtitle: Your app's code, in an editor
        - type: text
          title: Always start by pulling the latest
          content:
            body: |-
              One habit to begin every editing session with: **pull**. It fetches the newest version of your app from GitHub, including anything that changed in Lovable since you last worked locally. Starting from the latest keeps your copy up-to-date and saves you from clashes when you go to save.

              To pull in VS Code, open the **Source Control** panel (the branch icon on the left, or **Ctrl + Shift + G**), click the **...** menu next to **Changes** on the top, and choose **Pull**.

              Right now there's nothing new, you only just cloned, so it'll simply say you're up to date. But make pulling your opening move every single time you sit down to edit.
            imageUrl: /courses/vibe-coding-github-00/vscode-pull.webp
          subtitle: Your opening move, every time
        - type: text
          title: Find the words you want to change
          content:
            body: |-
              Click the **Search** icon in the left sidebar (the magnifying glass), or press **Ctrl/Cmd + Shift + F**. This searches every file at once.

              Type the words exactly as they appear in your app, for example `Suggest a book`. The results are grouped by file. Click a result to jump straight to that line.

              Two things that *make the open file easier to read:*
              
              1. The **numbers down the left edge** are **line numbers**: every line of a file has one, like verse numbers in a poem, so any spot can be pointed to exactly (an error or your AI agent will say things like "line 24"). 
              2. If some lines stretch off the screen, turn on **Word Wrap** (in the **View** menu, or press **Alt + Z** / **Option + Z**): long lines fold to fit your window, so nothing hides off to the right.
            imageUrl: /courses/vibe-coding-github-00/vscode-search.webp
          subtitle: Search across all your files
        - type: text
          title: Change it and watch it update
          content:
            body: |-
              Edit the words right there, just like any document. Then save with **Cmd + S** (Mac) or **Ctrl + S** (Windows).

              Now glance at your app on `localhost` in the browser. It updates **on its own, instantly**. That's the live preview from `npm run dev` doing its job.
            imageUrl: /courses/vibe-coding-github-00/vscode-update.webp
          subtitle: This is the magic moment
        - type: text
          title: Review your change before sending
          content:
            body: |-
              Your change is on your computer, but not yet on GitHub, and Lovable. To send it, open the **Source Control** panel in VS Code (the branch-like icon on the left, or **Ctrl + Shift + G**). Your edited file is listed there, under **Changes**.

              You might also see a file you never opened, like `routeTree.gen.ts`. Your app rewrites that one automatically as it runs, so it's nothing you did, and you can simply leave it out of your save.

              Before sending anything, take a quick look at what you changed: click the file name and a **diff** opens. A diff shows the old version and the new side by side, removed text in red, added text in green. It's how you confirm you changed exactly what you meant.
            imageUrl: /courses/vibe-coding-github-00/github-diff.webp
          subtitle: Open Source Control and read the diff
        - type: text
          title: Commit and push your change
          content:
            body: |-
              Happy with it? Hover your file and click the **+** beside it to pick it for this save, type a short note describing your change (the **commit message**), click the **Commit** button, then **Sync** (or push) to send it to GitHub.

              A good commit message is short and specific, like `Fix typo on the book suggestion button`. A simple trick if you're not sure what to write: finish the sentence *"This change will..."*
            imageUrl: /courses/vibe-coding-github-00/vscode-commit.webp
          subtitle: Commit, then push to GitHub
        - type: text
          title: How it reaches your live app
          content:
            body: |-
              Once it's on GitHub, your change syncs back into your Lovable project automatically, usually within seconds.

              One thing to remember: this updates your project, **not the live app your visitors see**. To update that, press **Publish** in Lovable, as you always have. So the full path is: **edit in VS Code → commit → push → it syncs into Lovable → publish**.
            imageUrl: /courses/vibe-coding-github-00/lovable-commit.webp
          subtitle: Commit, sync, then publish
        - type: text
          title: The four words of Git
          content:
            body: |-
              You've just used a handful of Git words. Here's what each one means, think of posting a parcel:

              **Stage** is packing the box: choosing which changed files go into your next save. In VS Code, the **+** beside a file stages it. Staging just the file you changed is how you keep an auto-generated one like `routeTree.gen.ts`, which your app rewrites on its own, out of the save.

              **Commit** is sealing the box and labelling it: saving the staged changes with your short message. It becomes one entry in your app's history.

              **Push** is sending the parcel: your commits travel up to GitHub. Now they are safe online and flowing on into Lovable.

              **Pull** is receiving a parcel: fetching the latest changes down from GitHub, like the ones Lovable made since you last looked. VS Code's **Sync** button does both at once, it pulls and pushes.
          subtitle: Stage, commit, push, pull
        - type: quiz-question
          title: 'Quiz: It is not live yet'
          content:
            question: Dalmie edits her website copy in VS Code, commits, and pushes. It shows up in her Lovable project, but her friends still see the old text on the live app. Why?
            options:
              - The push failed and she needs to redo it
              - VS Code and GitHub are not connected
              - She hasn't pressed Publish in Lovable yet
              - Local changes never reach the live app
            explanation: |-
              Pushing updates the code in your repository and syncs it into Lovable, but the live app only changes when you press Publish. Publishing (also called deploying) takes the current code, packages it into the running app, and puts that fresh version on Lovable's servers, so it's what your visitors get when they open your app's address.

              Editing and publishing are two separate steps, on purpose. You can make several changes, then publish once when you're happy with them all.
            correctAnswer: 2
        - type: free-text-exercise
          title: Write your next commit message
          content:
            description: |-
              Think of the next copy change you want to make in your app, maybe a heading that could be warmer, or a button label that could be clearer.

              Write the commit message you'd use for it, in a short, clear line. Remember the trick: finish the sentence *"This change will..."*
            subDescription: Once you submit, you'll get instant AI feedback on your commit message, so you'll know it's clear before you use it.
            placeholder: e.g. Shorten the welcome heading on the home page
            systemPrompt: 'You are a friendly mentor for a curious non-technical app builder. The learner pastes a commit message for the next copy change they plan to make in VS Code. Give warm, concise feedback in British English (max 4 short bullet points) on whether it is short, clear, and describes a single change. If it is vague (like "update" or "changes"), suggest a clearer version. Celebrate that they can now make these changes for free. Do not use em dashes. End encouragingly. Reply in a markdown format.'
            checkerPrompt: 'Check whether the commit message clearly describes a single, specific change in a few words. Flag it only if it is vague (e.g. "update", "changes") or bundles several unrelated changes. This is the commit message:'
        - type: challenge-end
          title: "You changed your app for free! \U0001F4AB"
          content:
            description: You edited copy in VS Code, saw it update live, and pushed it to GitHub and Lovable.
            nextModule: "**Next challenge:** Copy was the warm-up. Next you'll change an **icon**, which works a little differently because an icon is code."
            subDescription: |-
              That's the whole loop, and you'll use it for everything: find, edit, save, commit, push. The credit counter didn't budge.

              **Reusable tool:** [**The Credit-Free Edit Loop**](https://littleparrot.app/nest/toolkit/38d10b44-0e16-4460-8f59-ba8e74f7ffb7) lays out every step (find, edit, save, commit, push, publish) so it becomes second nature.
