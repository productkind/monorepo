    - steps:
        - type: text
          title: Icons are code
          content:
            body: |-
              Here's something surprising: most icons in your app are tiny pieces of code from an icon set (Lovable apps usually use one called **Lucide**).

              That's good news. It means you can swap an icon by changing its name in the code, in two places, as you'll see.
            imageUrl: /courses/vibe-coding-github-00/bird-icon.webp
          subtitle: A small, satisfying change
        - type: text
          title: Find the icon's name
          content:
            body: |-
              An icon shows up in the code by its name. The quickest way to find an icon's name is to check it in the browser.

              In the browser tab where your app is running, **right-click the icon** and choose **Inspect**. A side panel opens on the **Elements** tab, showing the page's building blocks. (In Safari, first turn on developer features under Settings → Advanced.)

              To pinpoint the icon exactly, click the **selection tool** in the panel's top left corner (a small arrow in a square), then **hover over the icon** on your page. A little label appears right over it, reading something like `svg.lucide.lucide-book-open`, and there's your icon's name: **book-open**. Click the icon and the Elements tab jumps to its line too, if you fancy a closer look.

            imageUrl: /courses/vibe-coding-github-00/inspect-icon.webp
          subtitle: Check it in the browser
        - type: text
          title: Track it down in your code
          content:
            body: |-
              Now that you know the icon's name, search for it in VS Code (**Ctrl/Cmd + Shift + F**). 
              
              *One twist:* in the code the name is written in **upper camel case**, each word capitalised and the dashes removed, so `book-open` becomes `BookOpen`.

              You'll spot it at least **twice** in the file: once at the very top, in an `import` line (the file's list of which icons it borrows from the set), and once at each spot where it's used. And if your app uses the same icon in *several places*, it'll turn up even more times, sometimes across several files. The file names in the search results help you tell which one belongs to the part of the app you're changing.
            imageUrl: /courses/vibe-coding-github-00/icon-in-code.webp
          subtitle: From book-open to BookOpen
        - type: text
          title: Pick a new icon
          content:
            body: |-
              Browse [**lucide.dev**](https://lucide.dev/icons/) to find an icon you like, there are well over a thousand, and you can just search for an item like "book" or "calendar".

              The site shows every icon's name in its dashed form, like `book-marked`. To get the version your code needs, click the icon and choose **"See it in action"**: the code sample under the **React** tab shows the **upper camel case** name, `BookMarked`, ready to copy straight into your file.
            imageUrl: /courses/vibe-coding-github-00/lucide-find-icon.webp
          subtitle: lucide.dev is your icon menu
        - type: text
          title: Add it into your code
          content:
            body: |-
              Start at the **top of the file**, with the `import` line. It's the file's list of every icon it uses, so your new icon needs to join it. Add it alongside the existing one, separated with a comma and space: `import { BookOpen, BookMarked } from "lucide-react";`.

              Then scroll down to the **usage spots**, the actual icons on screen, and change only the one you mean. In Dalmie's Book Club Organiser, `BookOpen` is used twice on the home page; to swap just one of them, change that `<BookOpen />` to `<BookMarked />` and leave the other as it is.

              One tidy-up at the end: if no spot uses the old icon any more, remove its name from the `import` line too.

              Save, and your app updates instantly in the browser. If you ever see an error naming an icon, that icon is missing from the `import` line, add it there and you're back in business.
            imageUrl: /courses/vibe-coding-github-00/lucide-swap.webp
          subtitle: Swap only the one you mean
        - type: quiz-question
          title: 'Quiz: Changing an icon'
          content:
            question: Dalmie wants to change the heart icon to a star on the book vote button. What's her best move?
            options:
              - Search every file for "heart" in VS Code and replace each match she finds
              - Inspect the heart in the browser for its name, then rename that spot in the code
              - Edit the icon right in the browser's Elements tab, where she can already see it
              - Ask Lovable to swap the icon for her, it's only a credit or two
            explanation: |-
              Inspect gives her the icon's name, and finding that one usage in the code and renaming it (with the `import` line also updated) changes it for real, for free.

              The others are tempting for a reason, and each has a catch. Replace-all on "heart" can change matches she never meant, like other heart icons or even words in her copy. Edits in the Elements tab vanish the moment the page reloads, the browser displays the app but doesn't store it. And Lovable would do it happily, for credits she doesn't need to spend.
            correctAnswer: 1
        - type: quiz-question
          title: 'Quiz: Get the star to Sarah'
          content:
            question: Dalmie's new star icon looks great at `localhost:8080`. But when Sarah opens the live app, she still sees the heart. What does Dalmie still need to do?
            options:
              - Nothing, the change will reach the live app by itself in a little while
              - Just press Publish in Lovable, it takes whatever is saved on her computer
              - Run `npm run dev` once more so the change properly registers
              - Commit and push her change, then press Publish in Lovable
            explanation: |-
              Her swap so far lives only on her computer, the private sandbox stage. To get it to Sarah and other users, it needs to travel the full path: commit and push sends it to GitHub, which syncs it into her Lovable project, and Publish puts it in the live app.

              Publish alone wouldn't do it: Lovable can only publish what code change has reached it, and a change that was never pushed is still sitting on Dalmie's laptop.
            correctAnswer: 3
        - type: challenge-end
          title: "Icons hold no mystery for you now ⭐"
          content:
            description: You found an icon in your code and swapped it.
            nextModule: "**Next challenge:** You've made changes by hand. Now you'll get some help, GitHub Copilot, an AI agent with a free tier living right inside VS Code, for the changes that need actual code written."
            subDescription: |-
              Knowing that icons are just code is a small superpower. Names like `<Star />` and `<Bell />` aren't scary, they're switches you can flip.

              Keep **lucide.dev** bookmarked, it's your menu of every icon name you can use.
      title: Change an Icon
      isFree: false
      skills:
        - Icons
        - Editing Code
        - Components
      description: Swap an icon by changing its name in the code, without spending credits.
      completionTime: 9:00
    - steps:
        - type: text
          title: Meet your AI agent
          content:
            body: |-
              Some changes are bigger than a word or two, and that's where an AI agent shines. **GitHub Copilot** is an AI agent that lives right inside VS Code. You describe what you want, it opens your files and makes the change, then you can review it.

              This way the AI is working directly in your files, no copy-pasting. And there's a **free plan**, no payment needed, and it doesn't touch your Lovable credits.
            imageUrl: /courses/vibe-coding-github-00/github-copilot.webp
          subtitle: A free AI agent inside VS Code
        - type: text
          title: Sign in and open the chat
          content:
            body: |-
              Since you've already signed in with your GitHub account, you have access to Copilot, the AI agent. To chat with it, open the **Chat panel**:

              - on the top right in the VS Code window, click the sidebar icon, or

              - press **Ctrl + Alt + i** (Windows) or **Ctrl + Cmd + i** (Mac). 
              
              A chat opens beside your code, that's where you and your agent will talk.

              One thing to know about the free plan: it includes about **50 chat requests a month** (plus thousands of inline code completions). That's plenty when each request is a clear one, and you're about to learn how to make them count.
            imageUrl: /courses/vibe-coding-github-00/copilot-open.webp
          subtitle: No payment, just your GitHub login
        - type: text
          title: Pick the right mode
          content:
            body: |-
              At the bottom of the chat there's a small **mode picker**, and choosing the right one is half the skill. Three to know:

              - **Ask** answers questions and explains, without changing any files. It's your built-in tutor: *"What happens when a member votes for a book? Can they vote more than once?"*
              - **Plan** is for a bigger or fuzzier change: it asks you a few clarifying questions, then writes up a plan you can read and adjust. Nothing changes until you approve it.
              - **Agent** takes a clear task and runs with it: it finds the right files, makes the changes, fixes its own slips along the way, and shows you everything to review.

              The change in this challenge is small and clear, so pick **Agent**. (Keep **Plan** in mind for the day you want something bigger, like identifying the root cause of an annoying bug.)
            imageUrl: /courses/vibe-coding-github-00/copilot-modes.webp
          subtitle: Ask, Plan, or Agent
        - type: quiz-question
          title: 'Quiz: Which mode?'
          content:
            question: Dalmie wonders whether a member can edit a book suggestion after they've added it. She just wants to find out, she's not ready to change anything yet. Which mode fits that moment?
            options:
              - Ask, it explains things without changing any files
              - Plan, it writes a step-by-step plan for changing the file
              - Agent, it digs into the files and starts making changes
              - Any of them, the mode only changes how the reply is worded
            explanation: |-
              Ask is the reading mode: it answers and explains, and is guaranteed to change nothing, ideal when you just want to understand. Plan is careful too, but its job is to map out a change you're about to make, not to explain code for its own sake. Agent is the doing mode.

              A handy habit: Ask to understand, Plan for a big or fuzzy change, Agent to get a clear one done.
            correctAnswer: 0
        - type: text
          title: Dalmie's request
          content:
            body: |-
              Sarah mentioned she'd love to see at a glance how many books the club has suggested. That's a perfect agent task: small and clear, but it needs a bit of new code written, not just a word swapped, and writing code is exactly what the agent is for.

              First, the usual habit: Dalmie **pulls** the latest version of her code before she starts. An agent can touch several files at once, so she wants it building on what's current.

              Then she switches the Copilot chat to **Agent** and writes:

              ```
              On the home page, under the "On the shelf" heading, add a small line that shows how many books are on the list, for example "5 books suggested so far".
              ```

              Notice the recipe: **what** to add, **where** it goes, and an **example** of the result. With about 50 requests a month, one well-aimed ask beats three vague ones.

              It's the same mental model as prompting Lovable, so everything you've learned there carries over. For a deeper dive, our [Build Your First App with Lovable](https://littleparrot.app/5e86e580-264c-442c-8cc4-be5645f13e87/course-overview) course covers crafting prompts in detail, and its [toolkit](https://littleparrot.app/nest/toolkit?course=Build+Your+First+App+With+Lovable) has ready-made prompt templates you can lean on here too.
          subtitle: What, where, and an example
        - type: text
          title: Watch it work, then review
          content:
            body: |-
              Copilot gets to work: you'll see it read files, think, and make edits. When it finishes, the chat lists **every file it changed**.

              Click a file and a **diff** opens, the red and green view you know. Use **Keep** to accept or **Undo** to reject, file by file or all at once. And glance at your app in the browser: the change is already showing at your localhost address, so you can judge it live before deciding.

              The rule stays the same as ever: **don't keep what you haven't tested.** You're in charge, the agent is the helper.
            imageUrl: /courses/vibe-coding-github-00/copilot-review.webp
          subtitle: Keep or undo, file by file
        - type: text
          title: When it's not right, you're covered
          content:
            body: |-
              Three situations you'll meet, and the easy way out of each:

              **The app shows an error.** Copy the error text into the chat and send it. Copilot reads your files, finds its own mistake, and fixes it. This is the agent advantage: no ferrying code back and forth.

              **It works, but it's not what you pictured.** Say so in a follow-up: "make the text smaller", "move it below the list". Or click **Undo** and send a sharper request.

              **You want out entirely.** Nothing is committed until you commit. The **Source Control** panel lists every file the agent touched, and **Discard Changes** returns any file to exactly how it was. You can experiment without fear.
            imageUrl: /courses/vibe-coding-github-00/copilot-discard-change.webp
          subtitle: Errors, tweaks, and the escape hatch
        - type: quiz-question
          title: 'Quiz: The error overlay'
          content:
            question: Copilot's change is in, but the browser now shows a red error message instead of Dalmie's app. What's her best first move?
            options:
              - Undo all the changes and drop the idea for now
              - Commit and push anyway, the error will sort itself out once it syncs to Lovable
              - Close VS Code, reopen it, and run the install command again
              - Copy the error into the chat and ask Copilot to fix it
            explanation: |-
              The agent can read the error and her files together, so it usually finds and fixes its own mistake in one go. That's the cheapest fix available, and it's how builders work with agents every day.

              Undo is a fine plan B if she'd rather rewind. Pushing a broken change forward, though, just moves the problem closer to her app's users.
            correctAnswer: 3
        - type: text
          title: Make it stick
          content:
            body: |-
              Happy with the change? Then move it along the path you know:

              1. **Commit** it with a clear message, like `Add suggestion counter to home page`.
              2. **Push** to send it to GitHub.
              3. Pop into **Lovable** and check the change has arrived in your project (it takes a couple of seconds to sync). Once you can see it there, press **Publish** to put it live for your users.

              Committing each change keeps your history readable, and you can undo any change easily on its own.
          subtitle: Commit, push, publish
        - type: free-text-exercise
          title: Anything still unclear? Ask here
          content:
            description: |-
              This challenge covered a lot, so let's make sure none of it is left fuzzy. If anything is still unclear, about the modes, reviewing changes, recovering from errors, or anything earlier in the course, ask it right here, and you'll get an answer.

              No question is too small. Getting unstuck is exactly how confidence grows.
            subDescription: Type your question and you'll get a clear answer right back.
            placeholder: e.g. How do I know whether to use Ask or Agent for what I want to do?
            systemPrompt: 'You are a warm, knowledgeable mentor for a curious non-technical app builder taking a course on editing their Lovable app on their own computer with VS Code, GitHub, and GitHub Copilot. The learner asks a question about anything from the course: VS Code, the terminal, Git and GitHub, pull, commit, push and publish, Copilot''s Ask, Plan, and Agent modes, reviewing changes, recovering from errors, or the local setup. Answer it clearly and warmly in British English, in plain language for someone non-technical, in at most a few short sentences or bullets. If it falls outside the course, gently point them to where they could find out (they can ask Kinga and Tamas in the Discord community). Reassure them it was a good question to ask. Do not use em dashes. End on an encouraging note, and encourage them to ask in our Discord community if anything is unclear. Reply in a markdown format.'
            checkerPrompt: 'The learner is asking a question or sharing something they are unsure about. Accept any genuine question or comment. Only flag clearly empty or nonsense input. This is their message:'
        - type: challenge-end
          title: "You've got an AI agent now \U0001F916"
          content:
            description: You've met your AI agent, and you know how to ask it for a change, review what it does, and recover when something breaks.
            nextModule: "**Next challenge:** The last piece, a simple rule for when to edit on your computer, when to ask Copilot, and when to go back to Lovable."
            subDescription: |-
              Describe, review, keep, and when something breaks, hand the error straight back to the agent. With that loop and the Source Control escape hatch, there's no situation you can't work your way out of.

              **Reusable tool:** [**Asking Copilot for Changes**](https://littleparrot.app/nest/toolkit/343b4217-d4bc-4163-bc50-020d8e2ad772) gives you a set of example requests for common changes, each written with the what-where-example recipe, ready to adapt to your own app.
      title: Make a Bigger Change with Copilot
      isFree: false
      skills:
        - GitHub Copilot
        - AI Agents
        - Reviewing Changes
        - Troubleshooting
      description: Put GitHub Copilot to work on your app, review its changes, and recover confidently when something goes wrong.
