    - steps:
        - type: text
          title: Meet your AI agent
          content:
            body: |-
              Some changes are bigger than a word or two, and that's where an AI agent shines. **GitHub Copilot** is an AI agent that lives right inside VS Code. You describe what you want in normal language, and it writes the change for you to review.

              The best part: there's a **free plan**, no payment needed, and it doesn't touch your Lovable credits.
          subtitle: A free AI agent inside VS Code
        - type: text
          title: Turn on Copilot Free
          content:
            body: |-
              In VS Code, click the **Copilot icon** near the top, then choose **Sign up for Copilot Free**. Since you signed in with your GitHub account back when you set up VS Code, this takes seconds, and you're ready.

              The free plan gives you a generous monthly allowance, plenty for the kind of small changes you'll make here.
            imageUrl: /courses/vibe-coding-github-00/copilot-signin.webp
          subtitle: No payment, just your GitHub login
        - type: text
          title: Ask it for a change
          content:
            body: |-
              Open **Copilot Chat** (the chat panel in VS Code) and describe what you want in plain, specific language. The more precise you are, the better the result.

              For example: *"On the book list, add a small label that shows how many books are in the club's list."* Copilot will suggest the changes and show you what it wants to edit.
          subtitle: Describe it, don't code it
        - type: text
          title: Review before you accept
          content:
            body: |-
              This part matters: **don't accept blindly**. Copilot shows you a diff of what it wants to change, red for removed, green for added. Read it, then watch your app in the browser to check it does what you hoped.

              If it's not right, you can undo it (Cmd/Ctrl + Z) or ask Copilot to try again differently. You're the one in charge, Copilot is the helper.
          subtitle: You're in charge, it's the helper
        - type: quiz-question
          title: 'Quiz: Working with Copilot'
          content:
            question: Copilot suggests a change to Dalmie's app. What's the wise thing to do before keeping it?
            options:
              - Accept it straight away, AI is always right
              - Delete the file and start over
              - Publish to the live app immediately to test it there
              - Read the diff and check the app still works before keeping it
            explanation: |-
              Always review the diff and check your app in the browser first. Copilot is brilliant but not perfect, and a quick look catches anything off before it goes anywhere.

              This habit, review then keep, is exactly how you'll work with bigger AI agents too.
            correctAnswer: 3
        - type: free-text-exercise
          title: Plan a Copilot request
          content:
            description: |-
              Think of one change that's a bit too fiddly to do by hand. Write the request you'd give Copilot, as clearly and specifically as you can.

              Remember: name what you want and where it should go.
            placeholder: e.g. On the home page, add a friendly empty state that says "No books suggested yet" when the list is empty
            systemPrompt: 'You are a friendly mentor for a curious non-technical app builder learning to use GitHub Copilot. The learner writes a request they would give Copilot. Respond warmly in British English (max 5 short bullet points): if the request is specific (names what and where), affirm it; if it is vague, suggest how to make it more precise (what should change, where it appears, what it should say or do). Remind them to review Copilot''s diff and check the app before keeping it. Do not use em dashes. End encouragingly.'
            checkerPrompt: 'Check whether the request names a reasonably specific change (what to change and where). Flag it only if it is extremely vague (for example "make it better"). This is their request:'
        - type: challenge-end
          title: "You've got an AI agent now \U0001F916"
          content:
            description: You set up Copilot Free and know how to ask for a change and review it.
            nextModule: "**Next challenge:** The last piece, a simple rule for when to edit on your computer, when to ask Copilot, and when to go back to Lovable."
            subDescription: |-
              Describe, review, keep. That's the rhythm of working with AI well, and it's the same rhythm you'll use with any AI agent from here.

              **Reusable tool:** the **Copilot Starter Prompts** give you a few ready-made request shapes for common changes.
