<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  html,body{margin:0;background:#f4e9cf;}
</style>
</helmet>
<div style="width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4e9cf;padding:24px;box-sizing:border-box;">
<svg viewBox="0 0 1400 840" width="100%" style="max-width:1360px;height:auto;display:block;" fill="none" stroke="#2b241f" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">

  <!-- background -->
  <rect x="0" y="0" width="1400" height="840" fill="#f4e9cf" stroke="none"/>
  <line x1="60" y1="726" x2="1340" y2="726"/>
  <ellipse cx="330" cy="726" rx="290" ry="22" fill="#e6d5ac" stroke="none"/>
  <ellipse cx="1075" cy="726" rx="230" ry="22" fill="#e6d5ac" stroke="none"/>

  <!-- ============ TELEPHONE LINE on two wooden poles, building to building ============ -->
  <!-- bracket on bakery -->
  <rect x="470" y="360" width="56" height="13" rx="5" fill="#cf9a55"/>
  <circle cx="520" cy="354" r="6" fill="#2b241f"/>
  <!-- left pole -->
  <rect x="592" y="326" width="20" height="400" fill="#e0b378"/>
  <rect x="566" y="352" width="72" height="15" rx="5" fill="#cf9a55"/>
  <circle cx="576" cy="348" r="6" fill="#2b241f"/>
  <circle cx="628" cy="348" r="6" fill="#2b241f"/>
  <!-- right pole -->
  <rect x="828" y="326" width="20" height="400" fill="#e0b378"/>
  <rect x="802" y="352" width="72" height="15" rx="5" fill="#cf9a55"/>
  <circle cx="812" cy="348" r="6" fill="#2b241f"/>
  <circle cx="864" cy="348" r="6" fill="#2b241f"/>
  <!-- bracket on mill -->
  <rect x="960" y="470" width="56" height="13" rx="5" fill="#cf9a55"/>
  <circle cx="966" cy="464" r="6" fill="#2b241f"/>
  <!-- wire (sag) across brackets and poles -->
  <path d="M520 354 Q548 372 576 348" fill="none"/>
  <path d="M628 348 Q728 400 812 348" fill="none"/>
  <path d="M864 348 Q915 388 966 464" fill="none"/>

  <!-- ============ OLD KEY (on the ground under the line) ============ -->
  <g>
    <circle cx="700" cy="676" r="24" fill="#fdd825"/>
    <circle cx="700" cy="676" r="10" fill="#f4e9cf"/>
    <rect x="722" y="669" width="104" height="15" rx="7.5" fill="#fdd825"/>
    <rect x="800" y="684" width="13" height="18" rx="4" fill="#fdd825"/>
    <rect x="818" y="684" width="13" height="26" rx="4" fill="#fdd825"/>
  </g>

  <!-- ============ BAKERY (left) ============ -->
  <!-- body -->
  <rect x="120" y="360" width="420" height="366" rx="10" fill="#fbf4e2"/>
  <!-- roof -->
  <polygon points="96,362 330,224 564,362" fill="#ffb65b"/>
  <rect x="90" y="346" width="480" height="28" rx="13" fill="#f3a63f"/>
  <!-- chimney + smoke -->
  <rect x="250" y="252" width="44" height="56" rx="5" fill="#f3a63f"/>
  <circle cx="278" cy="240" r="11" fill="#fbf4e2"/>
  <circle cx="296" cy="222" r="14" fill="#fbf4e2"/>
  <circle cx="318" cy="202" r="17" fill="#fbf4e2"/>
  <!-- awning -->
  <path d="M140 470 L420 470 L400 512 L160 512 Z" fill="#8efd23"/>
  <line x1="196" y1="470" x2="184" y2="512"/>
  <line x1="252" y1="470" x2="244" y2="512"/>
  <line x1="308" y1="470" x2="304" y2="512"/>
  <line x1="364" y1="470" x2="364" y2="512"/>
  <!-- shop window -->
  <rect x="150" y="540" width="160" height="150" rx="8" fill="#fbfbf3"/>
  <line x1="230" y1="540" x2="230" y2="690"/>
  <line x1="150" y1="615" x2="310" y2="615"/>
  <!-- pretzel emblem in window -->
  <circle cx="230" cy="578" r="18" fill="#ffb65b"/>
  <circle cx="230" cy="578" r="8" fill="#fbfbf3"/>
  <!-- door -->
  <rect x="360" y="556" width="130" height="134" rx="8" fill="#ffb65b"/>
  <rect x="378" y="576" width="94" height="60" rx="6" fill="#f3a63f"/>
  <circle cx="380" cy="662" r="6" fill="#2b241f"/>
  <!-- round window above door -->
  <circle cx="425" cy="410" r="26" fill="#fdd825"/>
  <line x1="399" y1="410" x2="451" y2="410"/>
  <line x1="425" y1="384" x2="425" y2="436"/>

  <!-- ============ WINDMILL FLOUR MILL (right) ============ -->
  <!-- tapered tower -->
  <polygon points="1000,726 1150,726 1120,430 1030,430" fill="#fbf4e2"/>
  <!-- cap roof -->
  <path d="M1018 430 Q1075 350 1132 430 Z" fill="#00ed70"/>
  <!-- window band -->
  <rect x="1046" y="500" width="58" height="46" rx="7" fill="#fdd825"/>
  <line x1="1075" y1="500" x2="1075" y2="546"/>
  <line x1="1046" y1="523" x2="1104" y2="523"/>
  <!-- door -->
  <path d="M1050 726 L1050 640 Q1075 612 1100 640 L1100 726 Z" fill="#ffb65b"/>
  <circle cx="1058" cy="686" r="5" fill="#2b241f"/>
  <!-- sack of flour at door -->
  <path d="M1168 724 C1150 724 1148 660 1172 642 C1163 632 1168 622 1177 626 C1183 616 1198 622 1195 634 C1219 646 1222 692 1204 724 Z" fill="#efe2c0"/>
  <rect x="1160" y="686" width="46" height="14" fill="#ffb65b"/>

  <!-- sails -->
  <circle cx="1075" cy="410" r="16" fill="#f3a63f"/>
  <g stroke-width="6.5">
    <!-- blade up -->
    <rect x="1063" y="248" width="24" height="150" rx="4" fill="#fbfbf3"/>
    <line x1="1075" y1="252" x2="1075" y2="394"/>
    <!-- blade down -->
    <rect x="1063" y="422" width="24" height="150" rx="4" fill="#fbfbf3"/>
    <line x1="1075" y1="426" x2="1075" y2="568"/>
    <!-- blade left -->
    <rect x="913" y="398" width="150" height="24" rx="4" fill="#fbfbf3"/>
    <line x1="917" y1="410" x2="1059" y2="410"/>
    <!-- blade right -->
    <rect x="1087" y="398" width="150" height="24" rx="4" fill="#fbfbf3"/>
    <line x1="1091" y1="410" x2="1233" y2="410"/>
  </g>
  <circle cx="1075" cy="410" r="16" fill="#f3a63f"/>

</svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1360,&quot;height&quot;:840}}"></script>
</body>
</html>
